version: "1.1"
manifest_id: frida-bootstrap-package-manifest
assets_root: "."
entries:
  - id: frida_root
    target: ".frida"
    kind: dir
    ownership_class: engine_static
    apply_mode: ensure_dir
    modes:
      - warm
      - cold-engine

  - id: frida_contract_root
