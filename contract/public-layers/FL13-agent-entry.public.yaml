FRIDA_AGENT_ENTRY_PROTOCOL:
  id: frida-agent-entry-protocol
  version: 1.0.0
  purpose: Defines the only valid entry flow for agent execution in Frida-managed repositories.
  entrypoint:
    clause_ref: FL13:1
    rule: Root AGENTS.md is the single mandatory entrypoint for any agent session.
  dispatch_chain:
    - id: audit_dispatch
      clause_ref: FL13:2.1
      rule: Audit/readiness/deployment/diagnostics intents route to FRIDA_INTERFACE_AUDIT before standard routing.
    - id: load_router
      clause_ref: FL13:2.2
      rule: Agent MUST read `.frida/contract/specs/ROUTER.xml` before interface or profile resolution.
    - id: resolve_interface
      clause_ref: FL13:2.3
      rule: Interface resolution happens before profile resolution.
    - id: resolve_profile
      clause_ref: FL13:2.4
      rule: Profile id MUST be resolved only from the repository-scoped profile block allowed for the selected interface.
    - id: resolve_zone_antitask
      clause_ref: FL13:2.5
      rule: After interface and profile selection, agent MUST resolve the repository-scoped zone block and load the
        contractual zone AGENTS.md.
  execution_rules:
    - id: repository_scoped_zone_block
      clause_ref: FL13:3.1
      rule: Repo `frida` resolves zones only from its private internal zone block; target app repos resolve zones only from
        `ZONES`.
    - id: repository_scoped_profile_block
      clause_ref: FL13:3.2
      rule: Repo `frida` resolves profiles only from `FRIDA_TASK_PROFILES`; target app repos resolve profiles only from
        `TASK_PROFILES`.
    - id: antitask_gate
      clause_ref: FL13:3.3
      rule: If contractual zone AGENTS.md is missing, execution MUST HALT.
    - id: interface_authority
      clause_ref: FL13:3.4
      rule: Selected interface determines the allowed mutation scope, task output policy, and admissible profile set.
  completion_rules:
    - id: report_required
      clause_ref: FL13:4.1
      rule: Every run MUST emit FRIDA Run Report on success and halt.
    - id: summary_required
      clause_ref: FL13:4.2
      rule: Human-readable summary MUST follow the report.
  development_sequence:
    clause_ref: FL13:5
    rule: CONTRACT -> ANTITASK -> DEVELOPMENT remains the mandatory execution sequence.
FRIDA_INTERFACE_ROUTING:
  id: frida-interface-routing
  version: 1.0.0
  purpose: Routes user intent to management interfaces before repository-scoped profile selection.
  default_profile_source:
    clause_ref: FL13:6.1
    value: repository_scoped_profile_block
  selector_model:
    clause_ref: FL13:6.1
    primary_signal: intent_family
    fallback_signal: selector_keywords
    additional_signal_sets:
      - selector_phrases
    rule: Routing resolves intent families first, uses explicit phrase matches next, and falls back to keyword matches only
      when phrase-level intent remains ambiguous.
  routes:
    - id: audit
      clause_ref: FL13:6.2
      interface_ref: FRIDA_INTERFACE_AUDIT
      intent_family: audit
      selector_keywords:
        - audit
        - deployment
        - readiness
        - diagnostics
        - health-check
      selector_phrases:
        - readiness check
        - deployment audit
        - health check
        - аудит развёртывания
        - проверка готовности
      allowed_profiles:
        frida_repo:
          - frida_readonly_observer
        target_app_repo:
          - app_readonly_observer
    - id: task_intake
      clause_ref: FL13:6.3
      interface_ref: FRIDA_INTERFACE_TASK_INTAKE
      intent_family: task_intake
      selector_keywords:
        - task
        - intake
        - triage
        - inbox
        - clarification
      selector_phrases:
        - create task request
        - triage this request
        - route to architect inbox
        - route to contract editor
        - постановка задачи
        - разберись с запросом
        - отправь в inbox
        - нужно уточнение по задаче
      allowed_profiles:
        target_app_repo:
          - app_task_intake
    - id: task_setter
      clause_ref: FL13:6.3.1
      interface_ref: FRIDA_INTERFACE_TASK_SETTER
      intent_family: task_setter
      selector_keywords:
        - task pack
        - task setter
        - executable task
        - publish task
      selector_phrases:
        - create executable task pack
        - publish task pack
        - make this into a task
        - оформи task pack
        - создай исполнимую задачу
      allowed_profiles:
        target_app_repo:
          - app_task_setter
    - id: task_validation
      clause_ref: FL13:6.3.2
      interface_ref: FRIDA_INTERFACE_TASK_VALIDATION
      intent_family: task_validation
      selector_keywords:
        - validate task
        - task validation
        - collision
        - task collision
      selector_phrases:
        - validate task against contract
        - run contract collision scan
        - проверь задачу на коллизию с контрактом
        - task collision scan
      allowed_profiles:
        target_app_repo:
          - app_task_validator
    - id: task_tracking
      clause_ref: FL13:6.3.3
      interface_ref: FRIDA_INTERFACE_TASK_TRACKING
      intent_family: task_tracking
      selector_keywords:
        - task tracking
        - task status
        - update task status
        - session telemetry
      selector_phrases:
        - update task registry
        - sync task status
        - update tasks index
        - обнови статус задачи
        - синхронизируй tasks index
      allowed_profiles:
        target_app_repo:
          - app_task_tracker
    - id: update_app_by_spec
      clause_ref: FL13:6.4
      interface_ref: FRIDA_INTERFACE_UPDATE_APP_BY_SPEC
      intent_family: app_contract_update_by_spec
      selector_keywords:
        - spec
        - specification
        - update app contract
        - extend app contract
        - change app contract
        - repair app contract
      selector_phrases:
        - update app contract by specification
        - extend app contract
        - измени app contract
      allowed_profiles:
        target_app_repo:
          - app_contract_editor
    - id: update_app_by_code
      clause_ref: FL13:6.5
      interface_ref: FRIDA_INTERFACE_UPDATE_APP_BY_CODE
      intent_family: app_contract_update_by_code
      selector_keywords:
        - code outpaces contract
        - update contract by code
        - extract contract from code
        - sync contract from code
      selector_phrases:
        - update app contract from code
        - sync contract from code
        - код обогнал контракт
      allowed_profiles:
        target_app_repo:
          - app_contract_editor
    - id: target_toolchain_upgrade
      clause_ref: FL13:6.6
      interface_ref: FRIDA_INTERFACE_TARGET_TOOLCHAIN_UPGRADE
      intent_family: target_toolchain_upgrade
      selector_keywords:
        - frida upgrade
        - toolchain upgrade
        - package-lock
        - align app-contract
        - upgrade @sistemado/frida
      selector_phrases:
        - upgrade frida and align app-contract
        - upgrade frida package and app contract
        - bump @sistemado/frida and align app-contract
        - апгрейд frida и выровняй app-contract
      allowed_profiles:
        target_app_repo:
          - frida_toolchain_upgrade
FRIDA_CLAUSE_INDEX:
  id: frida-clause-index
  version: 1.0.0
  purpose: Defines stable clause reference format used by contract-backed instructions and playbooks.
  format:
    clause_ref: FL13:8.1
    layer_prefixes:
      - FL
      - AL
    grammar: <layer_prefix><two_digit_number>:<n>(.<n>)*
    stability: explicit_only
    note: Clause refs are declared in contract source and must not be re-derived from file order.
  usage_rules:
    - id: cited_normative_lines_only
      clause_ref: FL13:8.2
      rule: Every normative instruction line in engine-invariant instruction surfaces (AGENTS surfaces, router, profiles,
        generated contractual zone instructions) MUST cite at least one clause_ref.
    - id: interface_instruction_surface_linking
      clause_ref: FL13:8.2
      rule: User-owned interface-instruction surfaces MUST declare their backing FRIDA_INTERFACE_* authority explicitly via
        interface_ref or interface_refs, but their prose shape and line-by-line clause citation remain adaptable.
    - id: legalization_before_citation
      clause_ref: FL13:8.3
      rule: If a normative instruction has no backing clause, create or clarify the clause in contract before citing it.
    - id: repository_visibility
      clause_ref: FL13:8.4
      rule: Public instructions may cite only public clauses; self-repo-only instructions may cite private clauses that remain
        undistributed.
