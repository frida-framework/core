      requires_role: ARCHITECT_AGENT
FRIDA_INTERFACE_TARGET_TOOLCHAIN_UPGRADE:
  id: frida-interface-target-toolchain-upgrade
  version: 1.0.0
  purpose: Upgrade the Frida package/toolchain in a target application repository and align the active app-contract source
    without repo-local workaround profiles or manual generated-surface patches.
  repository_scope: target_app_repo_only
  mutation_scope: target_app_toolchain_and_contract
  forbidden_targets:
    - frida_core_contract
    - frida_core_repo_sources
    - frida_tasks_directory
    - generated_frida_contract_surfaces
  deployment_scope: public
  playbook_ref: templates/management/AGENT-frida-toolchain-upgrade.md
  deployed_playbook_ref: .frida/contract/playbooks/AGENT-frida-toolchain-upgrade.md
  instruction_contract:
    interface_id: FRIDA_INTERFACE_TARGET_TOOLCHAIN_UPGRADE
    repository_scope: target_app_repo_only
    mutation_scope: target_app_toolchain_and_contract
    ownership_model: seed_then_user_owned
    form_policy:
      exact_markdown_shape: user_adaptable
      accepted_declaration_forms:
        - yaml_front_matter
        - fenced_yaml_metadata_block
        - canonical_textual_interface_ref_line
      required_normative_link: explicit_interface_ref_or_interface_refs
    required_concepts:
      - target_app_repo_only
      - target_app_toolchain_and_contract
      - frida_toolchain_upgrade
      - package.json
      - package-lock.json
      - .frida/inbox/app-contract/**
      - scripts/**
      - docs/**
      - .temp/**
      - canonical_upgrade_path
      - no repo-local workaround profile
      - no manual edits under .frida/contract/**
      - FRIDA_VERSION_POLICY
      - npm run frida:migration-report
      - npm run frida:check:contract-set
    required_rules_refs:
      - FRIDA_INTERFACE_TARGET_TOOLCHAIN_UPGRADE
      - FRIDA_VERSION_POLICY
    required_invariants:
      - app_update_interfaces_non_inventive
      - interface_instruction_surfaces_seed_then_user_owned
      - target_delivery_no_internal_authoring_surfaces
    required_guard_refs: []
    required_verification:
      - npm install
      - npm run frida:migration-report
      - npm run frida:bootstrap
      - npm run frida:gen
      - npm run frida:check:zone
      - npm run frida:check:contract-set
    required_report_fields:
      - frida_report
      - profile_id
      - verification
      - summary
    forbidden_claims:
      - This instruction authorizes manual edits under .frida/contract/**.
      - This instruction authorizes repo-local temporary profiles or router patches.
      - This instruction authorizes mutation of the Frida core contract.
    baseline_reset_command: frida-core bootstrap --component interface-instructions-reset --target <dir>
    authoring_surface:
      source_of_truth:
        - package.json
        - package-lock.json
        - .frida/inbox/app-contract/**
      read_context:
        - .frida/**
        - package.json
        - package-lock.json
        - scripts/**
        - docs/**
        - .temp/**
      edit_scope:
        - package.json
        - package-lock.json
        - .frida/inbox/app-contract/**
        - scripts/**
        - docs/**
        - .temp/**
      derived_mirror:
        - .frida/contract/**
      required_profile_id: frida_toolchain_upgrade
    instruction_surfaces:
      upgrade:
        deployed_playbook_ref: .frida/contract/playbooks/AGENT-frida-toolchain-upgrade.md
  canonical_upgrade_path:
    description: Canonical Frida target-repo upgrade path for package/toolchain + app-contract alignment.
    steps:
      - npm install
      - npm run frida:migration-report
      - npm run frida:bootstrap
      - npm run frida:gen
      - npm run frida:check:zone
      - npm run frida:check:contract-set
    rule: Upgrade MUST either converge through this path or halt with an explicit actionable reason.
  migration_guardrails:
    generated_surface_rule: Generated `.frida/contract/**` remains derived output and MUST NOT be patched manually during upgrade.
    missing_profile_halt:
      error_code: target_toolchain_upgrade_profile_missing
      reason: Target app contract does not yet define `frida_toolchain_upgrade`.
      remediation:
        - Align `.frida/inbox/app-contract/layers/AL02-agent-framework.yaml` to the shipped baseline.
        - Do not invent repo-local temporary profiles or patch generated `.frida/contract/**`.
        - Rerun `npm run frida:gen` after the source app-contract alignment.
  version_impact:
    evaluate: always
    rule: After applying target toolchain or app-contract changes, determine affected version domains (contract, schema,
      package) and bump per FRIDA_VERSION_POLICY.
    ref: FRIDA_VERSION_POLICY
  protocols:
    upgrade:
      description: Align target package manifests, tooling wrappers, and app-contract source during a Frida package upgrade.
      playbook_ref: templates/management/AGENT-frida-toolchain-upgrade.md
      deployed_playbook_ref: .frida/contract/playbooks/AGENT-frida-toolchain-upgrade.md
      requires_role: ARCHITECT_AGENT
  halt_conditions:
    - Generated `.frida/contract/**` would need manual edits.
    - Repository lacks `frida_toolchain_upgrade` and the app-contract source has not been aligned yet.
    - Upgrade depends on a repo-local temporary profile, router patch, or governance workaround.
FRIDA_INTERFACE_TASK_INTAKE:
  id: frida-interface-task-intake
  version: 1.0.0
  purpose: Normalize raw requests into executable task-setting decisions, inbox routing, clarification requests, or rejection.
  repository_scope: target_app_repo_only
  mutation_scope: target_task_intake_only
  forbidden_targets:
    - frida_core_contract
    - frida_core_repo_sources
    - target_app_contract
    - target_app_repo_code
  deployment_scope: public
  playbook_ref: templates/management/AGENT-task-intake.md
  deployed_playbook_ref: .frida/contract/playbooks/AGENT-task-intake.md
  instruction_contract:
    interface_id: FRIDA_INTERFACE_TASK_INTAKE
    repository_scope: target_app_repo_only
    mutation_scope: target_task_intake_only
    ownership_model: seed_then_user_owned
    form_policy:
      exact_markdown_shape: user_adaptable
      accepted_declaration_forms:
        - yaml_front_matter
        - fenced_yaml_metadata_block
        - canonical_textual_interface_ref_line
      required_normative_link: explicit_interface_ref_or_interface_refs
    required_concepts:
      - target_app_repo_only
      - .frida/contract/app/**
      - tasks/inbox/**
      - tasks/index.yaml
      - create_task_pack
      - route_to_architect_inbox
      - route_to_contract_editor
      - request_clarification
      - reject_as_invalid
      - insufficient_contract_context
    required_rules_refs:
      - FRIDA_INTERFACE_TASK_INTAKE
      - FRIDA_INTERFACE_TASK_SETTER
      - FRIDA_INTERFACE_TASK_VALIDATION
      - FRIDA_INTERFACE_TASK_TRACKING
    required_invariants:
      - task_validation_mirror_only
      - task_validation_requires_mirror_integrity
      - task_triage_routes_before_publication
    required_guard_refs: []
    required_verification:
      - frida-core check task-set
    required_report_fields:
      - frida_report
      - profile_id
      - verification
      - summary
    forbidden_claims:
      - This instruction authorizes mutation of the target app contract.
      - This instruction authorizes direct code changes in src/**.
    baseline_reset_command: frida-core bootstrap --component interface-instructions-reset --target <dir>
    contract_read_surface:
      source_of_truth: .frida/contract/app/**
      mirror_integrity_gate: required
      forbidden_source:
        - .frida/inbox/app-contract/**
    instruction_surfaces:
      intake:
        deployed_playbook_ref: .frida/contract/playbooks/AGENT-task-intake.md
  triage:
    outcomes:
      - create_task_pack
      - route_to_architect_inbox
      - route_to_contract_editor
      - request_clarification
      - reject_as_invalid
    halt_or_redirect_conditions:
      - App contract mirror unavailable, invalid, or stale.
      - Acceptance criteria cannot be made observable.
      - Request crosses multiple zones without explicit bounded scope.
      - Request implies app-contract mutation or architectural choice.
    normalized_output_statuses:
      - task_created
      - task_rejected_contract_collision
      - task_rejected_insufficient_input
      - task_rerouted_to_architect_inbox
      - task_rerouted_to_contract_editor
      - task_waiting_for_clarification
  inbox_item_definition:
    term: Persisted intake artifact for requests that are not ready for task-pack publication.
    path: tasks/inbox/**
    required_fields:
      - id: Stable inbox item id.
      - title: Human-readable label.
      - source_request: Original request or normalized restatement.
      - triage_outcome: One of the non-publication triage outcomes.
      - reroute_target: architect_inbox | contract_editor | clarification.
      - reason: Why task-pack publication did not happen.
  halt_conditions:
    - Task intake would require editing `.frida/inbox/app-contract/**`.
    - Task intake would publish a task pack without contract validation.
FRIDA_INTERFACE_TASK_SETTER:
  id: frida-interface-task-setter
  version: 1.0.0
  purpose: Publish immutable task packs only after mirror-only contract validation succeeds.
  repository_scope: target_app_repo_only
  mutation_scope: target_task_spec_only
  forbidden_targets:
    - frida_core_contract
    - frida_core_repo_sources
    - target_app_contract
  deployment_scope: public
  playbook_ref: templates/management/AGENT-task-setter.md
  deployed_playbook_ref: .frida/contract/playbooks/AGENT-task-setter.md
  instruction_contract:
    interface_id: FRIDA_INTERFACE_TASK_SETTER
    repository_scope: target_app_repo_only
    mutation_scope: target_task_spec_only
    ownership_model: seed_then_user_owned
    form_policy:
      exact_markdown_shape: user_adaptable
      accepted_declaration_forms:
        - yaml_front_matter
        - fenced_yaml_metadata_block
        - canonical_textual_interface_ref_line
      required_normative_link: explicit_interface_ref_or_interface_refs
    required_concepts:
      - target_app_repo_only
      - .frida/contract/app/**
      - tasks/TASK-*.md
      - tasks/index.yaml
      - contract_collision_scan
      - contract_validation_status
      - task_created
      - valid
    required_rules_refs:
      - FRIDA_INTERFACE_TASK_SETTER
      - FRIDA_INTERFACE_TASK_VALIDATION
      - FRIDA_INTERFACE_TASK_TRACKING
    required_invariants:
      - task_pack_immutable
      - task_pack_no_live_status
      - task_validation_mirror_only
      - task_validation_contract_collision_is_error
      - task_validation_artifact_required
    required_guard_refs: []
    required_verification:
      - frida-core check task-collision --task <path>
      - frida-core check task-set
    required_report_fields:
      - frida_report
      - profile_id
      - verification
      - summary
    forbidden_claims:
      - This instruction authorizes direct edits to `.frida/inbox/app-contract/**`.
      - This instruction authorizes live status storage inside TASK-*.md.
    baseline_reset_command: frida-core bootstrap --component interface-instructions-reset --target <dir>
    contract_read_surface:
      source_of_truth: .frida/contract/app/**
      mirror_integrity_gate: required
      forbidden_source:
        - .frida/inbox/app-contract/**
    instruction_surfaces:
      setter:
        deployed_playbook_ref: .frida/contract/playbooks/AGENT-task-setter.md
  task_pack_definition:
    term: An immutable specification artifact that describes one bounded executable task.
    principle: CONTRACT → ANTITASK → DEVELOPMENT
    required_frontmatter_fields:
      - id: Stable task id matching the file name.
      - title: Short task title.
      - source_request: Source request or intake reference.
      - goal: Observable outcome.
      - scope: Bounded implementation scope.
      - non_goals: Explicit exclusions.
      - target_paths: Concrete paths or zones affected.
      - target_profile: One primary repository-scoped execution profile.
      - interface_ref: Must be `FRIDA_INTERFACE_TASK_SETTER`.
      - constraints: Embedded contract constraints.
      - dependencies: Blocking prerequisites or predecessor tasks.
      - acceptance_criteria: Observable, testable criteria.
      - verification: Verification commands or checks.
      - contract_validation_status: Must be `valid` for published task packs.
      - escalate_if: Explicit escalation conditions.
    forbidden_fields:
      - status
      - current_status
      - progress
    publication_rules:
      - Write only new `tasks/TASK-*.md` files; never mutate an existing task pack.
      - Do not publish when validation decision is not `valid`.
      - Do not reference `.frida/inbox/app-contract/**` as task-setting context.
  output_bindings:
    target_app:
      interface_ref: FRIDA_INTERFACE_TASK_SETTER
      repository_scope: target_app_repo_only
      file_pattern: tasks/TASK-*.md
      registry_path: tasks/index.yaml
      validation_artifact_path: .frida/reports/*.yaml
      telemetry_path: tasks/sessions/*.md
  halt_conditions:
    - Validation decision is not `valid`.
    - Task would require direct app-contract mutation.
    - Task would publish live status inside the task pack.
FRIDA_INTERFACE_TASK_VALIDATION:
  id: frida-interface-task-validation
  version: 1.0.0
  purpose: Perform contract-collision validation for task packs against the app contract mirror before publication or
    status promotion.
  repository_scope: target_app_repo_only
  mutation_scope: target_task_validation_only
  forbidden_targets:
    - frida_core_contract
    - frida_core_repo_sources
    - target_app_contract
  deployment_scope: public
  playbook_ref: templates/management/AGENT-task-validation.md
  deployed_playbook_ref: .frida/contract/playbooks/AGENT-task-validation.md
  instruction_contract:
    interface_id: FRIDA_INTERFACE_TASK_VALIDATION
    repository_scope: target_app_repo_only
    mutation_scope: target_task_validation_only
    ownership_model: seed_then_user_owned
    form_policy:
      exact_markdown_shape: user_adaptable
      accepted_declaration_forms:
        - yaml_front_matter
        - fenced_yaml_metadata_block
        - canonical_textual_interface_ref_line
      required_normative_link: explicit_interface_ref_or_interface_refs
    required_concepts:
