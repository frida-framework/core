FRIDA_INTERFACE_VERIFY:
  id: frida-interface-verify
  version: 1.0.0
  purpose: Validate contract against schema, check ref consistency, report issues.
  operations:
    audit:
      description: Validate contract against schema and report issues.
      protocol: frida-core migration-report
    schema_check:
      description: Validate assembled contract against frida-contract.schema.json.
    ref_check:
      description: Resolve all Ref/Refs and report broken references.
    generate:
      description: Run full generation pipeline.
      protocol: frida-core gen
    visual_check:
      description: Check visual overlay freshness, boundary-first overlay contract consistency, and strict determinism after
        volatile-field normalization.
      protocol: frida-core visual check
    component_boundary_check:
      description: Check boundary-first component contract semantics, legacy-term bans, and drill-in/exit enforcement.
      protocol: node templates/tooling/verify/check-component-boundary-contract.mjs
    quality_check:
      description: Compute contract quality metrics per internal self-contract management policy.
FRIDA_INTERFACE_AUDIT:
  id: frida-interface-audit
  version: 1.0.0
  purpose: "Deployment readiness audit: validate contract structure, routing, and Frida surface integrity."
  playbook_ref: templates/management/AGENT-repo-audit.md
  deployed_playbook_ref: .frida/contract/playbooks/AGENT-repo-audit.md
  requires_profile_source: repository_scoped_profile_block
  requires_profiles:
    frida_repo:
      - frida_readonly_observer
    target_app_repo:
      - app_readonly_observer
  repository_scoped_surfaces:
    frida_repo:
      playbook_ref: templates/management/AGENT-repo-audit.md
      core_contract_ref: PATHS.contract.coreCanonFile
    target_app_repo:
      playbook_ref: .frida/contract/playbooks/AGENT-repo-audit.md
      core_contract_ref: PATHS.fridaContract.fridaMirrorIndexFile
      app_contract_ref: PATHS.fridaInbox.contractIndexFile
  operations:
    deployment_check:
      description: Verify Frida deployment structure (.frida/ layout, markers, config).
      steps:
        - "Resolve repository scope first: `frida_repo` uses contract/contract.index.yaml; `target_app_repo` uses
          .frida/inbox/app-contract/contract.index.yaml plus .frida/contract/frida/contract.index.yaml"
        - Validate index against FRIDA_SCHEMA_SUPPORT.schema_version
        - Verify AGENTS.md contract-set completeness
    contract_consistency:
      description: Check app contract against core contract format invariants.
      checks:
        - index_format_symmetric
        - refs_resolve_via_exports
        - schema_version_fixed
    routing_check:
      description: Verify AGENTS.md routing chain completeness and correctness.
      steps:
        - Verify root AGENTS.md exists and references correct paths
        - Verify ROUTER.xml exists at .frida/contract/specs/
        - Verify profile XMLs exist at .frida/contract/profiles/
        - Verify zone AGENTS.md files match the repository-scoped zone block (`ZONES` in target repos, private
          internal-zone block in repo `frida`).
        - In target repos, verify the audit playbook is deployed under `.frida/contract/playbooks/` and no routing
          surface references undeployed management template paths.
    cli_diagnostics:
      description: Run automated CLI diagnostics.
      commands:
        - frida-core migration-report
        - frida-core check zone --path .
        - frida-core check contract-set
  output:
    format: report
    includes:
      - deployment_status
      - contract_issues
      - routing_issues
      - cli_results
      - readiness_verdict
  keywords:
    - audit
    - deployment
    - readiness
    - diagnostics
    - health-check
FRIDA_INTERFACE_UPDATE_APP_BY_SPEC:
  id: frida-interface-update-app-by-spec
  version: 1.0.0
  purpose: Extend or modify the target application contract based on specification / task description, using only baseline
    template semantics and already-designed app extensions.
  repository_scope: target_app_repo_only
  mutation_scope: target_app_contract_only
  forbidden_targets:
    - frida_core_contract
    - frida_core_repo_sources
    - frida_tasks_directory
  deployment_scope: public
  instruction_contract:
    interface_id: FRIDA_INTERFACE_UPDATE_APP_BY_SPEC
    repository_scope: target_app_repo_only
    mutation_scope: target_app_contract_only
    ownership_model: seed_then_user_owned
    form_policy:
      exact_markdown_shape: user_adaptable
      accepted_declaration_forms:
        - yaml_front_matter
        - fenced_yaml_metadata_block
        - canonical_textual_interface_ref_line
      required_normative_link: explicit_interface_ref_or_interface_refs
    required_concepts:
      - target_app_repo_only
      - target_app_contract_only
      - interface-scoped contract editor profile
      - shipped but inactive extension
      - requires_new_frida_extension
      - FRIDA_VERSION_POLICY
      - frida-core check contract-set
    required_rules_refs:
      - FRIDA_INTERFACE_UPDATE_APP_BY_SPEC
      - FRIDA_VERSION_POLICY
    required_invariants:
      - app_update_interfaces_non_inventive
      - interface_instruction_surfaces_seed_then_user_owned
      - target_delivery_no_internal_authoring_surfaces
    required_guard_refs: []
    required_verification:
      - frida-core check contract-set
      - frida-core check zone --path .frida/inbox/app-contract
    required_report_fields:
      - frida_report
      - profile_id
      - verification
      - summary
    forbidden_claims:
      - This instruction authorizes mutation of the Frida core contract.
      - This instruction authorizes changes under templates/management.
    baseline_reset_command: frida-core bootstrap --component interface-instructions-reset --target <dir>
    authoring_surface:
      source_of_truth: .frida/inbox/app-contract/**
      read_context:
        - .frida/**
      edit_scope:
        - .frida/inbox/app-contract/**
        - .temp/**
      derived_mirror: .frida/contract/app/**
      required_profile_id: app_contract_editor
    instruction_surfaces:
      update:
        deployed_playbook_ref: .frida/contract/playbooks/AGENT-app-contract-update.md
      repair:
        deployed_playbook_ref: .frida/contract/playbooks/AGENT-app-contract-repair.md
  input:
    format: natural_language
    context:
      - current_app_contract
      - target_block
      - schema_ref
  output:
    format: yaml
    requires_approval: true
  extension_resolution:
    source_of_truth: target app contract index links plus Frida-shipped extension layers
    known_inactive_extension:
      action: HALT
      rule: If the requested capability is covered by a shipped but inactive extension, do not invent its structure. Return
        the exact extension ids and layer links required for activation.
    unknown_extension_need:
      action: HALT
      error_code: requires_new_frida_extension
      rule: If no shipped extension covers the requested capability or implementation, stop instead of synthesizing new
        backend/vendor structures.
    invention_forbidden:
      - vendor_specific_zones
      - vendor_specific_profiles
      - backend_path_models
      - implementation_specific_tooling_bindings
  version_impact:
    evaluate: always
    rule: After applying changes, determine affected version domains (contract, schema, package) and bump per
      FRIDA_VERSION_POLICY.
    ref: FRIDA_VERSION_POLICY
  protocols:
    update:
      description: Apply changes to the target app contract via structured patch.
      playbook_ref: templates/management/AGENT-app-contract-update.md
      deployed_playbook_ref: .frida/contract/playbooks/AGENT-app-contract-update.md
      requires_role: ARCHITECT_AGENT
    repair:
      description: Fix target app contract inconsistencies (broken refs, missing blocks).
      playbook_ref: templates/management/AGENT-app-contract-repair.md
      deployed_playbook_ref: .frida/contract/playbooks/AGENT-app-contract-repair.md
      requires_role: ARCHITECT_AGENT
