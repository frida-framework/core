      - frida-core check task-set
    required_report_fields:
      - frida_report
      - profile_id
      - verification
      - summary
    forbidden_claims:
      - This instruction authorizes reading `.frida/inbox/app-contract/**` as task-setting ground truth.
      - This instruction authorizes publishing a task pack after contract collision.
    baseline_reset_command: frida-core bootstrap --component interface-instructions-reset --target <dir>
    contract_read_surface:
      source_of_truth: .frida/contract/app/**
      mirror_integrity_gate: required
      forbidden_source:
        - .frida/inbox/app-contract/**
    instruction_surfaces:
      validation:
        deployed_playbook_ref: .frida/contract/playbooks/AGENT-task-validation.md
  collision_validation:
    command: frida-core check task-collision --task <path>
    required_decisions:
      - valid
      - invalid_contract_collision
      - requires_contract_change
      - requires_architectural_review
      - insufficient_contract_context
    collision_scan_status_mapping:
      valid: task_created
      invalid_contract_collision: task_rejected_contract_collision
      requires_contract_change: task_rerouted_to_contract_editor
      requires_architectural_review: task_rerouted_to_architect_inbox
      insufficient_contract_context: task_rejected_insufficient_input
  validation_artifact:
    path: .frida/reports/*.yaml
    required_fields:
      - task_id
      - validation_time
      - contract_sources
      - collision_scan_result
      - conflicts
      - decision
      - reroute_target
      - notes
    artifact_rule:
      - Every published task pack has exactly one latest validation artifact referenced by `tasks/index.yaml`.
      - Validation artifact path stays outside `tasks/**`.
  halt_conditions:
    - App contract mirror is unavailable, invalid, or stale.
    - Validation would rely on `.frida/inbox/app-contract/**` instead of `.frida/contract/app/**`.
FRIDA_INTERFACE_TASK_TRACKING:
  id: frida-interface-task-tracking
  version: 1.0.0
  purpose: Maintain the normative task status registry separately from immutable task specs and append-only session telemetry.
  repository_scope: target_app_repo_only
  mutation_scope: target_task_status_only
  forbidden_targets:
    - frida_core_contract
    - frida_core_repo_sources
    - target_app_contract
  deployment_scope: public
  playbook_ref: templates/management/AGENT-task-tracking.md
  deployed_playbook_ref: .frida/contract/playbooks/AGENT-task-tracking.md
  instruction_contract:
    interface_id: FRIDA_INTERFACE_TASK_TRACKING
    repository_scope: target_app_repo_only
    mutation_scope: target_task_status_only
    ownership_model: seed_then_user_owned
    form_policy:
      exact_markdown_shape: user_adaptable
      accepted_declaration_forms:
        - yaml_front_matter
        - fenced_yaml_metadata_block
        - canonical_textual_interface_ref_line
      required_normative_link: explicit_interface_ref_or_interface_refs
    required_concepts:
      - target_app_repo_only
      - tasks/index.yaml
      - tasks/TASK-*.md
      - tasks/sessions/**
      - draft
      - validated
      - ready
      - in_progress
      - blocked
      - done
      - rejected
      - superseded
    required_rules_refs:
      - FRIDA_INTERFACE_TASK_TRACKING
      - FRIDA_INTERFACE_TASK_VALIDATION
    required_invariants:
      - task_status_registry_separate_from_sessions
      - task_pack_immutable
      - task_session_logs_append_only
    required_guard_refs: []
    required_verification:
      - frida-core check task-set
    required_report_fields:
      - frida_report
      - profile_id
      - verification
      - summary
    forbidden_claims:
      - This instruction authorizes using `tasks/sessions/**` as the normative status source.
      - This instruction authorizes editing published task packs.
    baseline_reset_command: frida-core bootstrap --component interface-instructions-reset --target <dir>
    contract_read_surface:
      source_of_truth: .frida/contract/app/**
      mirror_integrity_gate: required
      forbidden_source:
        - .frida/inbox/app-contract/**
    instruction_surfaces:
      tracking:
        deployed_playbook_ref: .frida/contract/playbooks/AGENT-task-tracking.md
  status_registry:
    path: tasks/index.yaml
    required_entry_fields:
      - id
      - status
      - spec_path
      - validation_artifact
      - latest_session_ref
      - supersedes
      - superseded_by
      - updated_at
    allowed_status:
      - draft
      - validated
      - ready
      - in_progress
      - blocked
      - done
      - rejected
      - superseded
    status_semantics:
      validated: Contract collision scan passed, but execution may still wait on dependencies or prerequisites.
      ready: Contract collision scan passed and the task is executable with prerequisites satisfied.
  session_telemetry:
    path: tasks/sessions/*.md
    rule:
      - Sessions are append-only execution evidence.
      - Sessions do not determine current normative task status.
      - Tracking updates `tasks/index.yaml`; executors append new session files.
  halt_conditions:
    - Tracking would infer normative status from narrative session logs alone.
    - Tracking would mutate an immutable task pack.
FRIDA_VERSION_POLICY:
  id: frida-version-policy
  version: 1.0.0
  purpose: Defines version domains, their sources of truth, and bump rules.
  domains:
    package:
      source_of_truth: package.json → version
      format: semver
      bump_rules:
        major: Breaking change in public API (exports, CLI arguments, contract-mirror interface).
        minor: New feature, new contract block, new CLI command, non-breaking API addition.
        patch: Bug fix, documentation, internal refactor with no API change.
    contract:
      source_of_truth: contract/contract.index.yaml → version
      mirror: contract/public-layers/FL01-identity.public.yaml → CONTRACT_META.version
      format: semver
      consistency_rule: contract.index.yaml version MUST equal CONTRACT_META.version.
      bump_rules:
        major: New required top-level block, removal of existing block, structural incompatibility.
        minor: New optional block, new layer, new interface, new guard/invariant.
        patch: Wording fix, metadata update, non-structural clarification.
    schema:
      source_of_truth: schemas/frida-contract.schema.json → title (version suffix)
      mirror: contract/contract.index.yaml → schema_version
      mirror_2: contract/public-layers/FL01-identity.public.yaml → meta.schemaVersion
      format: MAJOR.MINOR
      consistency_rule: All three locations MUST declare the same version.
      bump_rules:
        major: New required property, removal of property, type change.
        minor: New optional property, relaxed constraint, enum extension.
  invariants:
    - id: version.contract_meta_sync
    - id: version.schema_sync
      text: schema title, schema_version, and meta.schemaVersion MUST be identical.
    - id: version.bump_on_mutation
      text: Any interface that mutates contract or code MUST evaluate version_impact.
