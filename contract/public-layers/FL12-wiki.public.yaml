FRIDA_WIKI_MECHANICS:
  purpose: Defines Single Source of Truth runtime-config mode for application contracts and associated wiki
    synchronization mechanics.
  config_flag:
    key: APP_CONTRACT_SSOT
    location: .frida/config.yaml (runtime config file, top-level key)
    values:
      - REPO.LOCAL: Application contract is maintained locally in the repository. Wiki synchronization and wiki-driven
          consistency controls are disabled/skipped.
      - REPO.WIKI: Application contract behavior is wiki-driven. Wiki sync mechanisms and consistency controls remain active.
  local_ssot:
    app_contract_source: .frida/inbox/app-contract/**
    frida_consumer_source: .frida/inbox/app-contract/**
    working_copy: .frida/contract/app/**
  repo_wiki_sync:
    raw_sync_target: .frida/inbox/wiki-raw/**
    normalized_local_ssot: .frida/inbox/app-contract/**
    frida_consumer_source: .frida/inbox/app-contract/**
    working_copy: .frida/contract/app/**
    writer: GitHub Actions workflow
    note: Wiki sync writes into inbox; Frida generation/bootstrap reads only inbox app-contract source.
  schema_blocks:
    DOCS:
      description: Optional block in application contract storing wiki definitions used when APP_CONTRACT_SSOT=REPO.WIKI.
      properties:
        humanWiki: Wiki pages definition
        sourcesModel: Tiered specification of source authorities
        procedures: SYNC triggers to refresh artifacts from wiki
  ownership_rule:
    rule: APP_CONTRACT_SSOT and Frida wiki mechanics are core-owned. Application contracts MAY store wiki-specific app data
      only.
  forbidden_duplicate_mechanics:
    structured_fields:
      - META.sourceOfTruth
      - DOCS.sourceOfTruth
      - DOCS.sourcesModel
    rule: These mechanics are invalid in active app contract structured data because they duplicate core-owned SSOT/wiki
      behavior.
