# ─── FRIDA CANON INDEX ────────────────────────────────────────────────────────
# Modular entry point for the Frida core canon.
# Each layer is a separate YAML file in contract/layers/.
# Blocks list declares all top-level keys exported by the layer.
# ──────────────────────────────────────────────────────────────────────────────

schema_version: "1.0"
canon_id: "FRIDA_CORE_CANON"
version: "2.0.0"

layers:
  - id: identity
    path: contract/layers/identity.yaml
    visibility: private
    keywords:
      - canon-meta
      - uniqueness
      - core-assembly
    blocks:
      - CANON_META
      - CANON_UNIQUENESS
      - meta
      - core

  - id: architecture
    path: contract/layers/architecture.yaml
    visibility: private
    keywords:
      - adr
      - principles
      - schema-support
    blocks:
      - FRIDA_SCHEMA_SUPPORT
      - FRIDA_ARCHITECTURE_DECISIONS
      - FRIDA_FOUNDATION_PRINCIPLES

  - id: infrastructure
    path: contract/layers/infrastructure.yaml
    visibility: mixed
    keywords:
      - paths
      - config
      - zones
      - assembly
      - refs
      - routing
    blocks:
      - FRIDA_CONFIG_SPEC
      - FRIDA_ASSEMBLY_PROTOCOL
      - FRIDA_REFS
      - PATHS
      - FRIDA_CONFIG
      - FRIDA_RUNTIME_CONFIG
      - ZONES

  - id: agent-framework
    path: contract/layers/agent-framework.yaml
    visibility: private
    keywords:
      - profiles
      - enforcement
      - lifecycle
    blocks:
      - FRIDA_TASK_PROFILES
      - FRIDA_ENFORCEMENT
      - FRIDA_AGENT_LIFECYCLE
      - FRIDA_ENFORCEMENT_TYPES
      - FRIDA_VALIDATION_RULES

  - id: reporting
    path: contract/layers/reporting.yaml
    visibility: private
    keywords:
      - reporting
      - validation
    blocks:
      - FRIDA_REPORTING
      - FRIDA_VALIDATION_CHECKLIST

  - id: cli
    path: contract/layers/cli.yaml
    visibility: public
    keywords:
      - cli
      - integrity
      - integration
    blocks:
      - FRIDA_TEMPLATE_INTEGRITY
      - FRIDA_CLI

  - id: buildtime
    path: contract/layers/buildtime.yaml
    visibility: public
    keywords:
      - buildtime
      - generator
      - mapper
      - scaffold
    blocks:
      - FRIDA_GENERATOR
      - FRIDA_MAPPER_MODEL
      - FRIDA_SCAFFOLD

  - id: visualization
    path: contract/layers/visualization.yaml
    visibility: public
    keywords:
      - visual
      - overlay
      - lod
    blocks:
      - FRIDA_VISUAL

  - id: management
    path: contract/layers/management.yaml
    visibility: mixed
    keywords:
      - management
      - translation
      - guard-spec
      - antitask
    blocks:
      - FRIDA_GUARD_SPEC
      - FRIDA_INVARIANT_SPEC
      - FRIDA_ANTITASK_SPEC
      - FRIDA_INTERFACE_VERIFY
      - FRIDA_INTERFACE_UPDATE_SPEC
      - FRIDA_INTERFACE_UPDATE_CODE
      - FRIDA_INTERFACE_TASKSET
