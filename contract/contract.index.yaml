# ─── FRIDA CONTRACT INDEX ────────────────────────────────────────────────────────
# Modular entry point for the Frida core contract.
# Each layer is a separate YAML file in contract/layers/.
# Blocks list declares all top-level keys exported by the layer.
# ──────────────────────────────────────────────────────────────────────────────

schema_version: "1.0"
contract_id: "FRIDA_CORE_CONTRACT"
version: "2.2.0"

layers:
  - id: identity
    path: contract/layers/identity.yaml
    visibility: private
    keywords:
      - contract-meta
      - uniqueness
      - core-assembly
    blocks:
      - CONTRACT_META
      - CONTRACT_UNIQUENESS
      - meta
      - core

  - id: architecture
    path: contract/layers/architecture.yaml
    visibility: private
    keywords:
      - adr
      - principles
      - schema-support
    blocks:
      - FRIDA_SCHEMA_SUPPORT
      - FRIDA_ARCHITECTURE_DECISIONS
      - FRIDA_FOUNDATION_PRINCIPLES

  - id: infrastructure
    path: contract/layers/infrastructure.yaml
    visibility: mixed
    keywords:
      - zones
      - assembly
      - refs
      - routing
    blocks:
      - FRIDA_ASSEMBLY_PROTOCOL
      - FRIDA_REFS
      - ZONES

  - id: core-configuration
    path: contract/layers/core-configuration.yaml
    visibility: mixed
    keywords:
      - config
      - settings
      - paths
      - runtime-config
      - docs
    blocks:
      - PATHS
      - FRIDA_CONFIG_SPEC
      - FRIDA_CONFIG
      - FRIDA_RUNTIME_CONFIG
      - FRIDA_ROOT_LAYOUT_POLICY
      - FRIDA_CONFIG_FIELD_DOCS

  - id: agent-framework
    path: contract/layers/agent-framework.yaml
    visibility: private
    keywords:
      - profiles
      - enforcement
      - lifecycle
    blocks:
      - FRIDA_TASK_PROFILES
      - FRIDA_ENFORCEMENT
      - FRIDA_AGENT_LIFECYCLE
      - FRIDA_ENFORCEMENT_TYPES
      - FRIDA_VALIDATION_RULES

  - id: reporting
    path: contract/layers/reporting.yaml
    visibility: private
    keywords:
      - reporting
      - validation
    blocks:
      - FRIDA_REPORTING
      - FRIDA_VALIDATION_CHECKLIST

  - id: cli
    path: contract/layers/cli.yaml
    visibility: public
    keywords:
      - cli
      - integrity
      - integration
    blocks:
      - FRIDA_TEMPLATE_INTEGRITY
      - FRIDA_CLI

  - id: buildtime
    path: contract/layers/buildtime.yaml
    visibility: public
    keywords:
      - buildtime
      - generator
      - mapper
    blocks:
      - FRIDA_GENERATOR
      - FRIDA_MAPPER_MODEL

  - id: bootstrap
    path: contract/layers/bootstrap.yaml
    visibility: public
    keywords:
      - bootstrap
      - reconcile
      - warm
      - deploy
      - package-manifest
    blocks:
      - FRIDA_CONTRACT_BOOTSTRAP
      - FRIDA_BOOTSTRAP_SURFACE_POLICY
      - FRIDA_BOOTSTRAP_PACKAGE_MANIFEST

  - id: visualization
    path: contract/layers/visualization.yaml
    visibility: public
    keywords:
      - visual
      - overlay
      - lod
    blocks:
      - FRIDA_VISUAL

  - id: management
    path: contract/layers/management.yaml
    visibility: mixed
    keywords:
      - management
      - guard-spec
      - antitask
    blocks:
      - FRIDA_GUARD_SPEC
      - FRIDA_INVARIANT_SPEC
      - FRIDA_ANTITASK_SPEC
      - FRIDA_INTERFACE_VERIFY
      - CONTRACT_MANAGEMENT_INTERFACE
      - FRIDA_INTERFACE_UPDATE_SPEC
      - FRIDA_INTERFACE_UPDATE_CODE
      - FRIDA_INTERFACE_TASKSET

  - id: wiki
    path: contract/layers/wiki.yaml
    visibility: public
    keywords:
      - wiki
      - ssot
      - synchronization
    blocks:
      - FRIDA_WIKI_MECHANICS
