# ─── FRIDA LAYER FL04: CORE-CONFIGURATION ───────────────────────────────────
# Purpose: Single core-configuration layer for engine contract configuration details.
# All concrete settings live here; other contract layers should use dry references only.

PATHS:
  _visibility: public
  id: frida-paths
  version: 1.0.0
  contract:
    coreCanonFile: "contract/contract.index.yaml"
  agents:
    bootloaderFile: "AGENTS.md"
  specs:
    rootDir: ".frida/contract/specs"
  profiles:
    rootDir: ".frida/contract/profiles"
  docs:
    policyDir: ".frida/contract/docs/policy"
    referenceDir: ".frida/contract/docs/reference"
  frida:
    contractDir: ".frida/contract"
    internalDir: ".frida/contract/internal"
    inboxDir: ".frida/inbox"
    reportsDir: ".frida/reports"
    configFile: ".frida/config.yaml"
    configTemplateFile: ".frida/templates/config.template.yaml"
    ir: ".frida/contract/artifacts/frida.ir.json"
    permissions: ".frida/contract/artifacts/frida.permissions.json"
    graph: ".frida/contract/artifacts/frida.graph.mmd"
    adapterIndex: ".frida/contract/artifacts/frida.adapter.generated.json"
    visualOverlayFile: ".frida/contract/visual/canon-overlay.json"
  fridaContract:
    rootDir: ".frida/contract"
    appMirrorDir: ".frida/contract/app"
    fridaMirrorDir: ".frida/contract/frida"
    specsDir: ".frida/contract/specs"
    profilesDir: ".frida/contract/profiles"
    docsDir: ".frida/contract/docs"
    docsPolicyDir: ".frida/contract/docs/policy"
    docsReferenceDir: ".frida/contract/docs/reference"
    internalDir: ".frida/contract/internal"
    playbooksDir: ".frida/contract/playbooks"
    cacheDir: ".frida/contract/cache"
    visualDir: ".frida/contract/visual"
    visualOverlayFile: ".frida/contract/visual/canon-overlay.json"
    artifactsDir: ".frida/contract/artifacts"
    irFile: ".frida/contract/artifacts/frida.ir.json"
    permissionsFile: ".frida/contract/artifacts/frida.permissions.json"
    graphFile: ".frida/contract/artifacts/frida.graph.mmd"
    adapterIndexFile: ".frida/contract/artifacts/frida.adapter.generated.json"
    bootloaderFile: ".frida/contract/AGENTS.md"
  fridaInbox:
    rootDir: ".frida/inbox"
    appContractDir: ".frida/inbox/app-contract"
    wikiRawDir: ".frida/inbox/wiki-raw"
    metaDir: ".frida/inbox/meta"
  templates:
    fridaDir: "templates/frida"
    docsDir: "templates/docs-gen"
    appBasicDir: "templates/template_app_basic"
  bootstrap:
    assetsRootDir: "templates/template_app_basic"
    manifestFile: "contract/bootstrap-package.manifest.yaml"
    manifestSchemaFile: "schemas/frida-bootstrap-package-manifest.schema.json"
    stateFile: ".frida/contract/internal/bootstrap-state.yaml"
  visual:
    overlayDir: ".frida/contract/visual"
    overlayFile: ".frida/contract/visual/canon-overlay.json"
  scopes:
    fridaManagedAll: ".frida/**"
    templatesAll: "templates/**"
    nonTemplatesAll: "**"
  normalization:
    rules:
      - id: posix_format
        text: "All paths in contract MUST use POSIX separators (forward slash)."
      - id: no_leading_slash
        text: "Paths are relative to repository root; no leading slash."
      - id: glob_wildcards
        text: "Glob wildcards use POSIX grammar only. No regex."
        grammar: "POSIX glob"
        supported_patterns:
          - "**"
          - "*"
          - "?"
      - id: ref_dominance
        text: "If both literal path and Ref-suffixed key exist, Ref takes precedence."
      - id: typed_suffix_mapping
        text: "Keys MUST use typed suffixes to indicate path semantics."
        suffixes:
          Dir: "directory path"
          File: "exact file path"
          All: "glob pattern"
          Ref: "reference to PATHS block"
      - id: status_model
        text: "PATH entries MAY carry status. Default is ACTIVE."
        statuses:
          - ACTIVE
          - DEPRECATED
          - PLANNED

FRIDA_CONFIG_SPEC:
  _visibility: private
  id: frida-config-spec
  version: 1.0.0
  config_shape:
    root_key: CONFIG
    required_fields:
      - sources
  source_item_shape:
    required_fields:
      - id
      - index
    optional_fields:
      - text
  invariants:
    - id: sources_not_empty
      text: "CONFIG.sources MUST be non-empty."
    - id: core_present_once
      text: "CONFIG.sources MUST contain exactly one item with id=core."
    - id: app_present_once
      text: "CONFIG.sources MUST contain exactly one item with id=app."
    - id: source_ids_unique
      text: "All CONFIG.sources[].id MUST be unique."
    - id: source_indexes_unique
      text: "All CONFIG.sources[].index MUST be unique."
    - id: source_index_path_valid
      text: "All CONFIG.sources[].index MUST pass FRIDA_SCHEMA_SUPPORT.path_rules."
  guards:
    - id: sources_missing
      trigger: sources_missing
      action: HALT
      error_code: SOURCES_MISSING
    - id: core_missing
      trigger: core_missing
      action: HALT
      error_code: CORE_MISSING
    - id: app_missing
      trigger: app_missing
      action: HALT
      error_code: APP_MISSING
    - id: duplicate_source_id
      trigger: duplicate_source_id
      action: HALT
      error_code: DUPLICATE_SOURCE_ID
    - id: duplicate_source_index
      trigger: duplicate_source_index
      action: HALT
      error_code: DUPLICATE_SOURCE_INDEX
    - id: invalid_source_index_path
      trigger: invalid_source_index_path
      action: HALT
      error_code: INVALID_SOURCE_INDEX_PATH

FRIDA_CONFIG:
  _visibility: private
  id: frida-frida-config
  version: 1.0.0
  paths:
    canon_inputFileRef: "PATHS.contract.coreCanonFile"
    agents_bootloaderFileRef: "PATHS.agents.bootloaderFile"
    specs_rootRef: "PATHS.fridaContract.specsDir"
    profiles_rootRef: "PATHS.fridaContract.profilesDir"
    docs_policyDirRef: "PATHS.fridaContract.docsPolicyDir"
    docs_referenceDirRef: "PATHS.fridaContract.docsReferenceDir"
    frida_internalRef: "PATHS.fridaContract.internalDir"
    templates_fridaRef: "PATHS.templates.fridaDir"
    templates_docsRef: "PATHS.templates.docsDir"
  reporting:
    collect_in_repo: true
    repo_path: ".frida/reports"
    file_ext: ".yaml"
    filename_pattern: "<unixtime_ms>_<profile_id>_<task_or_run>.yaml"
    exists_check: false
    access_validation:
      enabled: true
      on_disabled: warn_only_skip_fail
      repo_policies:
        frida_core:
          read_allow_required: []
          read_allow_governance_required:
            - "frida-tasks/**"
            - "contract/**"
            - "schemas/**"
            - "src/**"
            - "templates/**"
            - "README.md"
            - "package.json"
            - ".frida/AGENTS.md"
            - ".frida/config.yaml"
            - ".frida/templates/config.template.yaml"
            - ".frida/contract/**"
            - ".frida/reports/*.yaml"
          read_allow_task_setter_required:
            - "frida-tasks/**"
            - "contract/**"
            - "schemas/**"
            - "templates/management/**"
          edit_allow_architect_required:
            - "contract/**"
            - "schemas/**"
            - "src/**"
            - "templates/**"
            - "README.md"
            - "package.json"
          edit_allow_architect_allowed_only:
            - "contract/**"
            - "schemas/**"
            - "src/**"
            - "templates/**"
            - "README.md"
            - "package.json"
            - "frida-tasks/README.md"
          edit_allow_non_architect_required: []
          edit_forbid_required:
            - "frida-tasks/TASK-*.md"
            - "frida-tasks/**/TASK-*.md"
            - ".frida/reports/*.yaml"
          forbid_must_include:
            - ".frida/inbox/**"
            - "tasks/**"
          forbid_must_not_include:
            - "frida-tasks/**"
            - "frida-tasks/TASK-*.md"
            - "frida-tasks/**/TASK-*.md"
          create_allow_required_all_profiles:
            - ".frida/reports/*.yaml"
          create_allow_non_task_setter_allowed_only:
            - ".frida/reports/*.yaml"
          create_allow_task_setter_required:
            - "frida-tasks/TASK-*.md"
          create_allow_task_setter_forbidden:
            - "frida-tasks/**"
            - "tasks/**"
        target_app:
          read_allow_required:
            - "tasks/**"
          read_allow_governance_required:
            - ".frida/AGENTS.md"
            - ".frida/config.yaml"
            - ".frida/templates/config.template.yaml"
            - ".frida/contract/**"
            - ".frida/reports/*.yaml"
          edit_allow_architect_required:
            - "tasks/inbox/**"
          edit_allow_non_architect_required:
            - "tasks/README.md"
            - "tasks/**/README.md"
          edit_forbid_required:
            - "tasks/TASK-*.md"
            - "tasks/**/TASK-*.md"
            - ".frida/reports/*.yaml"
          forbid_must_include:
            - ".frida/inbox/**"
          forbid_must_not_include:
            - "tasks/**"
            - "tasks/README.md"
            - "tasks/**/README.md"
            - "tasks/TASK-*.md"
            - "tasks/**/TASK-*.md"
          create_allow_required_all_profiles:
            - ".frida/reports/*.yaml"
          create_allow_non_task_setter_allowed_only:
            - "tasks/sessions/*.md"
            - "tasks/sessions/[0-9]*-*.md"
            - ".frida/reports/*.yaml"
          create_allow_task_setter_required:
            - "tasks/TASK-*.md"
          create_allow_task_setter_forbidden:
            - "tasks/**"
  visual:
    overlay_pathRef: "PATHS.fridaContract.visualOverlayFile"
    generation_mode: on_demand
    determinism: required
  naming:
    convention: snake_case
    ref_suffix: "Ref"
    list_ref_suffix: "Refs"
    path_typed_suffixes:
      - Dir
      - File
      - All

FRIDA_RUNTIME_CONFIG:
  _visibility: private
  id: frida-frida-runtime-config
  version: 1.0.0
  file: ".frida/config.yaml"
  template_file: ".frida/templates/config.template.yaml"
  source_of_truth: contract
  generated_from: "FRIDA_CONFIG.reporting"
  ownership:
    runtime_config_file: user_owned
    template_file: engine_owned
  update_policy:
    mode: template_only_plus_warnings
    rule: "Engine writes/updates .frida/templates/config.template.yaml and creates .frida/config.yaml only when missing. Existing runtime config file values MUST NOT be overwritten."

FRIDA_ROOT_LAYOUT_POLICY:
  _visibility: public
  id: frida-root-layout-policy
  version: 1.0.0
  scope: ".frida root directory only"
  exact_files:
    - "AGENTS.md"
    - "config.yaml"

  allowed_dirs:
    - "contract"
    - "reports"
    - "inbox"
    - "templates"
    - "cache"
  validation_modes:
    warn: "Used by gen/init during rollout to report violations without stopping."
    fail: "Used by warm/cold-engine bootstrap post-gen to guarantee clean Frida layout in one command."
  inbox_access_policy:
    path: ".frida/inbox/**"
    agent_access: forbidden
    work_surface_redirect: ".frida/contract/app/**"
    note: "Inbox stores inbound/SSOT app-contract material and raw sync payloads; agents operate on working copies."

FRIDA_CONFIG_FIELD_DOCS:
  _visibility: public
  id: frida-config-field-docs
  version: 1.0.0
  purpose: "Line-level documentation for core contract configuration blocks in the core-configuration layer (not the runtime config file)."
  scope:
    blocks:
      - PATHS
      - FRIDA_CONFIG_SPEC
      - FRIDA_CONFIG
      - FRIDA_RUNTIME_CONFIG
      - FRIDA_ROOT_LAYOUT_POLICY
    self_described_exceptions:
      - "PATHS.normalization.rules[*].text already explains the rule."
      - "PATHS.normalization.rules[*].supported_patterns, suffixes, and statuses are literal enumerations for the parent rule."
      - "FRIDA_CONFIG_SPEC.invariants[*].text and guards[*] entries are self-describing."
      - "Glob list items under FRIDA_CONFIG.reporting.access_validation.policy_paths.* are literal patterns described by the parent key."
  entries:
    - path: "PATHS.contract"
      what: "Namespace for contract artifact locations."
      purpose: "Groups paths used to locate canonical assembled contract files."
    - path: "PATHS.contract.coreCanonFile"
      what: "Relative file path to the canonical contract artifact."
      purpose: "Provides the contract index path used by generators and validators."
    - path: "PATHS.agents"
      what: "Namespace for agent bootstrapping files."
      purpose: "Keeps agent entry-point paths centralized."
    - path: "PATHS.agents.bootloaderFile"
      what: "Root AGENTS bootloader file path."
      purpose: "Defines where the generated primary agent instructions are written."
    - path: "PATHS.specs"
      what: "Namespace for generated specs outputs."
      purpose: "Groups router/spec artifact locations used by generation and routing."
    - path: "PATHS.specs.rootDir"
      what: "Root directory for generated routing specs."
      purpose: "Defines the canonical router output location under `.frida/contract/specs`."
    - path: "PATHS.profiles"
      what: "Namespace for generated profile outputs."
      purpose: "Groups profile artifact locations in one contract-defined section."
    - path: "PATHS.profiles.rootDir"
      what: "Root directory for generated profile XML files."
      purpose: "Defines the canonical profile XML output location under `.frida/contract/profiles`."
    - path: "PATHS.docs"
      what: "Namespace for generated documentation outputs."
      purpose: "Groups policy/reference doc destinations."
    - path: "PATHS.docs.policyDir"
      what: "Directory for generated policy docs."
      purpose: "Defines the canonical policy-doc output location under `.frida/contract/docs/policy`."
    - path: "PATHS.docs.referenceDir"
      what: "Directory for generated reference docs."
      purpose: "Defines the canonical reference-doc output location under `.frida/contract/docs/reference`."
    - path: "PATHS.frida"
      what: "Namespace for `.frida` runtime/service artifacts."
      purpose: "Splits `.frida` root into runtime config, reports, and canonical engine-managed contract bucket paths."
    - path: "PATHS.frida.contractDir"
      what: "Canonical root directory for engine-managed Frida artifacts."
      purpose: "Keeps generated Frida artifacts under `.frida/contract` instead of scattering them in `.frida/` root."
    - path: "PATHS.frida.internalDir"
      what: "Internal Frida working directory."
      purpose: "Stores engine-owned internal artifacts under the canonical `.frida/contract/internal` subtree."
    - path: "PATHS.frida.inboxDir"
      what: "Protected inbox root directory for inbound/SSOT application contract data."
      purpose: "Reserves `.frida/inbox` as the single inbound container for app-contract SSOT and sync payloads."
    - path: "PATHS.frida.reportsDir"
      what: "Directory for FRIDA run/job reports."
      purpose: "Defines the default runtime report/audit history path (`.frida/reports`)."
    - path: "PATHS.frida.configFile"
      what: "Runtime config file produced by the engine."
      purpose: "Defines the canonical location for generated `.frida/config.yaml`."
    - path: "PATHS.frida.configTemplateFile"
      what: "Engine-managed runtime config template/reference file."
      purpose: "Defines the canonical location for `.frida/templates/config.template.yaml` in the strict `.frida` root layout."
    - path: "PATHS.frida.ir"
      what: "Canonical FRIDA IR artifact file path."
      purpose: "Pins machine-readable IR export under `.frida/contract/artifacts`."
    - path: "PATHS.frida.permissions"
      what: "Canonical FRIDA permissions snapshot artifact path."
      purpose: "Pins permissions export under `.frida/contract/artifacts`."
    - path: "PATHS.frida.graph"
      what: "Canonical FRIDA graph (Mermaid) artifact path."
      purpose: "Pins graph export under `.frida/contract/artifacts`."
    - path: "PATHS.frida.adapterIndex"
      what: "Canonical adapter-generated index artifact path."
      purpose: "Reserves the adapter output location inside `.frida/contract/artifacts`."
    - path: "PATHS.frida.visualOverlayFile"
      what: "Compatibility alias for the visual overlay output file path."
      purpose: "Keeps older consumers working while canonical visual output stays under `.frida/contract/visual`."
    - path: "PATHS.fridaContract"
      what: "Canonical engine-managed Frida artifact namespace."
      purpose: "Enumerates `.frida/contract/*` destinations by ownership domain and artifact type."
    - path: "PATHS.fridaContract.rootDir"
      what: "Canonical `.frida/contract` root directory."
      purpose: "Defines the engine-managed artifact bucket used by generator and bootstrap."
    - path: "PATHS.fridaContract.appMirrorDir"
      what: "Working-copy mirror directory for the application contract."
      purpose: "Stores the agent/tooling-facing app-contract copy derived from `.frida/inbox/app-contract/**`."
    - path: "PATHS.fridaContract.fridaMirrorDir"
      what: "Source mirror directory for the Frida engine contract."
      purpose: "Stores a deterministic copy of package `contract/**` under the target repo for inspection and tooling."
    - path: "PATHS.fridaContract.specsDir"
      what: "Canonical specs directory under `.frida/contract`."
      purpose: "Stores router XML and related canonical spec artifacts."
    - path: "PATHS.fridaContract.profilesDir"
      what: "Canonical profiles directory under `.frida/contract`."
      purpose: "Stores generated profile XML files in the canonical `.frida/contract/profiles` surface."
    - path: "PATHS.fridaContract.docsDir"
      what: "Canonical docs root directory under `.frida/contract`."
      purpose: "Groups engine-generated policy/reference docs in the canonical `.frida/contract/docs` surface."
    - path: "PATHS.fridaContract.docsPolicyDir"
      what: "Canonical policy docs directory under `.frida/contract/docs`."
      purpose: "Stores engine-generated policy docs in the canonical `.frida/contract/docs/policy` surface."
    - path: "PATHS.fridaContract.docsReferenceDir"
      what: "Canonical reference docs directory under `.frida/contract/docs`."
      purpose: "Stores engine-generated reference docs in the canonical `.frida/contract/docs/reference` surface."
    - path: "PATHS.fridaContract.internalDir"
      what: "Canonical internal working directory under `.frida/contract`."
      purpose: "Stores engine-managed internal state and generated internal files."
    - path: "PATHS.fridaContract.playbooksDir"
      what: "Canonical playbooks directory under `.frida/contract`."
      purpose: "Stores engine-managed static playbooks deployed by bootstrap."
    - path: "PATHS.fridaContract.cacheDir"
      what: "Canonical cache directory under `.frida/contract`."
      purpose: "Reserves a single cache subtree for engine-managed cache files."
    - path: "PATHS.fridaContract.visualDir"
      what: "Canonical visual artifacts directory under `.frida/contract`."
      purpose: "Groups visual overlay and related generated visualization artifacts."
    - path: "PATHS.fridaContract.visualOverlayFile"
      what: "Canonical visual overlay JSON file path."
      purpose: "Defines the primary visual overlay export location under `.frida/contract/visual`."
    - path: "PATHS.fridaContract.artifactsDir"
      what: "Canonical machine artifacts directory under `.frida/contract`."
      purpose: "Groups IR/permissions/graph/adapter-index exports."
    - path: "PATHS.fridaContract.irFile"
      what: "Canonical IR JSON export file path."
      purpose: "Defines the machine-readable graph/contract IR export location."
    - path: "PATHS.fridaContract.permissionsFile"
      what: "Canonical permissions snapshot export file path."
      purpose: "Defines the permissions projection export location."
    - path: "PATHS.fridaContract.graphFile"
      what: "Canonical Mermaid graph export file path."
      purpose: "Defines the human-readable graph export location."
    - path: "PATHS.fridaContract.adapterIndexFile"
      what: "Canonical adapter index export file path."
      purpose: "Defines where adapter-generated metadata indexes are written."
    - path: "PATHS.fridaContract.bootloaderFile"
      what: "Canonical internal bootloader mirror file path."
      purpose: "Stores the engine-managed `.frida/contract/AGENTS.md` bootloader mirror."
    - path: "PATHS.fridaInbox"
      what: "Namespace for protected inbox directories under `.frida/inbox`."
      purpose: "Declares SSOT and sync-payload inbox locations without exposing runtime logic in other layers."
    - path: "PATHS.fridaInbox.rootDir"
      what: "Protected inbox root directory."
      purpose: "Defines the root of the no-agent-access inbound/SSOT surface."
    - path: "PATHS.fridaInbox.appContractDir"
      what: "Application-contract SSOT source tree inside inbox."
      purpose: "Declares the only app-contract source path read by Frida generation/bootstrap on app-side repos."
    - path: "PATHS.fridaInbox.wikiRawDir"
      what: "Raw wiki synchronization payload directory."
      purpose: "Provides a staging area for REPO.WIKI sync payloads before normalization into app-contract SSOT tree."
    - path: "PATHS.fridaInbox.metaDir"
      what: "Inbox metadata directory."
      purpose: "Reserves a stable location for sync stamps, checksums, and other inbox control metadata."
    - path: "PATHS.templates.fridaDir"
      what: "Directory containing Frida generator templates."
      purpose: "Lets integrity checks and generation resolve template sources."
    - path: "PATHS.templates"
      what: "Namespace for template source directories."
      purpose: "Groups generator and docs template path settings."
    - path: "PATHS.templates.docsDir"
      what: "Directory containing docs-generation templates."
      purpose: "Separates docs templates from core Frida templates."
    - path: "PATHS.templates.appBasicDir"
      what: "Directory containing the neutral `template_app_basic` zero-start seed."
      purpose: "Defines the canonical package-local source for baseline app-template files and inactive app-extension layers."
    - path: "PATHS.bootstrap"
      what: "Namespace for bootstrap reconcile/package-manifest paths."
      purpose: "Centralizes bootstrap package reference assets and manifest metadata paths."
    - path: "PATHS.bootstrap.assetsRootDir"
      what: "Root directory containing package demo/bootstrap assets."
      purpose: "Provides the package-local root used by explicit demo bootstrap asset deployment."
    - path: "PATHS.bootstrap.manifestFile"
      what: "Bootstrap package manifest file path."
      purpose: "Declares the package-shipped manifest that enumerates Frida-managed bootstrap surfaces."
    - path: "PATHS.bootstrap.manifestSchemaFile"
      what: "Bootstrap package manifest schema path."
      purpose: "Declares the schema used to validate bootstrap package manifest structure before writes."
    - path: "PATHS.bootstrap.stateFile"
      what: "Advisory bootstrap state file path under `.frida/contract/internal`."
      purpose: "Reserves a stable state/telemetry location inside the canonical engine-managed contract bucket."
    - path: "PATHS.visual"
      what: "Namespace for visualization output paths."
      purpose: "Groups overlay artifact directory and file paths."
    - path: "PATHS.visual.overlayDir"
      what: "Directory for generated visual overlay artifacts."
      purpose: "Points the visual path namespace to the canonical `.frida/contract/visual` location."
    - path: "PATHS.visual.overlayFile"
      what: "Contract overlay JSON output path."
      purpose: "Points the visual path namespace to the canonical visual overlay file in `.frida/contract/visual`."
    - path: "PATHS.scopes.templatesAll"
      what: "Glob matching all template-zone files."
      purpose: "Feeds zone resolution and enforcement for template scope."
    - path: "PATHS.scopes"
      what: "Namespace for zone scope glob definitions."
      purpose: "Centralizes reusable scope globs for routing and enforcement."
    - path: "PATHS.scopes.fridaManagedAll"
      what: "Glob matching all Frida-managed runtime and generated surfaces."
      purpose: "Lets zone routing attach `.frida/**` work to the dedicated Frida-managed antitask surface."
    - path: "PATHS.scopes.nonTemplatesAll"
      what: "Fallback glob matching all repository files."
      purpose: "Supports non-template zone routing baseline."
    - path: "PATHS.normalization"
      what: "Path normalization and typing policy namespace."
      purpose: "Stores path-format rules used across the contract."
    - path: "PATHS.normalization.rules"
      what: "Ordered list of normalization rules and typing conventions."
      purpose: "Defines how path literals and path refs must be written."
    - path: "FRIDA_CONFIG_SPEC.config_shape"
      what: "Shape declaration for the root assembly config object."
      purpose: "Defines the contract-level schema expectations for `CONFIG`."
    - path: "FRIDA_CONFIG_SPEC.config_shape.root_key"
      what: "Top-level key name for assembly config documents."
      purpose: "Ensures assembly loader reads the same root object (`CONFIG`)."
    - path: "FRIDA_CONFIG_SPEC.config_shape.required_fields[]"
      what: "Required root fields in the assembly config."
      purpose: "Makes assembly input validation deterministic."
    - path: "FRIDA_CONFIG_SPEC.config_shape.required_fields[0]=sources"
      what: "List of contract sources to assemble."
      purpose: "Declares the only allowed source list consumed by assembly."
    - path: "FRIDA_CONFIG_SPEC.source_item_shape"
      what: "Shape declaration for each source descriptor in `CONFIG.sources[]`."
      purpose: "Keeps source records consistent across core/app assembly inputs."
    - path: "FRIDA_CONFIG_SPEC.source_item_shape.required_fields[]"
      what: "Required fields for each `CONFIG.sources[]` item."
      purpose: "Defines the minimum source descriptor shape."
    - path: "FRIDA_CONFIG_SPEC.source_item_shape.required_fields[id]"
      what: "Stable source identifier (for example `core`, `app`)."
      purpose: "Supports uniqueness checks and source-specific guards."
    - path: "FRIDA_CONFIG_SPEC.source_item_shape.required_fields[index]"
      what: "Path to the source contract index file."
      purpose: "Tells the assembly protocol which index document to load."
    - path: "FRIDA_CONFIG_SPEC.source_item_shape.optional_fields[]"
      what: "Optional fields allowed on a source item."
      purpose: "Allows descriptive metadata without affecting assembly logic."
