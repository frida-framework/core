# ─── FRIDA LAYER FL06: REPORTING & VALIDATION ────────────────────────────────

FRIDA_REPORTING:
  _visibility: private
  id: frida-reporting
  version: 1.0.0
  file_contractRef: "FRIDA_CONFIG.reporting"
  runtime_configRef: "FRIDA_RUNTIME_CONFIG"
  access:
    create_all_profiles: true
    read_only_profiles:
      - frida_readonly_observer
    update_delete_allowed_profiles: []
  run_report:
    required_on:
      - SUCCESS
      - HALTED
    schema_ref: "schemas/frida-job-report.schema.json"
    filename_prefix: unixtime_ms
    minimum_fields:
      - frida_report
      - status
      - profile_id
      - created_at
      - changes
      - verification
      - summary
    verification_required_sections:
      - antitask

FRIDA_VALIDATION_CHECKLIST:
  _visibility: private
  id: frida-validation-checklist
  version: 1.0.0
  contract_consistency:
    - "All Ref-suffixed keys resolve to existing PATHS entries."
    - "All required blocks listed in core.contracticalSourceBlocks exist as top-level keys."
    - "Concrete engine config details are defined in the core-configuration layer; other layers use refs only."
    - "Path refs resolve to valid filesystem targets."
    - "Component contract files use the canonical component boundary section ids and do not retain legacy aliases unless a declared temporary deprecation window exists."
    - "component_mount_point.mounted_child_boundaryRefs and component_output_interface.*boundaryRef fields resolve only to explicit component boundaries when present."
    - "Component-level contract examples and snippets use only the canonical component_* vocabulary."
    - "Mixed legacy/new component-boundary namespace use in active definitions is a hard failure."
    - "Parent component contracts do not inline mounted child internals where explicit drill-in is required."
  reporting_consistency:
    - "FRIDA_CONFIG.reporting is fixed and schema-valid."
    - "Runtime config validates against frida-runtime-config.schema.json."
    - "FRIDA root layout policy enforces exactly one root file (config.yaml) and only allowed root dirs (contract, reports, inbox, templates)."
  visual_consistency:
    - "Visual overlay is deterministic: same input → same output."
    - "Visual checks are fail-hard."
    - "FRIDA_VISUAL.component_projection is the authoritative source for component-boundary visual projection semantics."
    - "FRIDA_INTERFACE_SELF_CONTRACT_MANAGEMENT.component_contract_spec defines source-contract structure only and does not redefine topology/flow/specification mapping."
    - "For component-level contract files, visualization treats component boundary semantics as primary and YAML depth as secondary."
    - "A component-level contract file is the primary visual projection unit."
    - "Topology, flow, and specification are interpreted relative to the current component boundary."
    - "Parent specification view does not auto-expand mounted child internals; cross-component drill-in requires component_mount_point.mounted_child_boundaryRefs."
    - "Flow projection reads canonical exits, outcomes, and continuation/return targeting only from component_output_interface."
    - "component_shared_refs project dependency edges only and do not override ownership or boundary semantics."
    - "component_domain_blocks expand local detail only inside the already established current component boundary."
  template_integrity:
    - "Template-integrity manifest validates against schema."
    - "Hash drift returns non-zero exit code."
  session_consistency:
    - "Session token file is valid YAML with required fields."
    - "No concurrent tokens on same branch."
    - >-
      Run report MUST include verification.antitask (PASS/FAIL/SKIP) when status is
      SUCCESS or HALTED.
  bootstrap_seed_consistency:
    - "Bootstrap package manifest validates against schema and declared hash policy."
    - "Default bootstrap mode is warm reconcile and HALTs with redirect when Frida markers are absent."
    - "Warm/cold-engine bootstrap preserve user-owned runtime config and job reports while pruning unknown files only in declared managed scopes."
    - "Warm/cold-engine bootstrap preserve `.frida/inbox/**` and use inbox app-contract source only (no fallback to `contract/**`)."
    - "Warm/cold-engine bootstrap do not write app-contract files."
    - "Warm/cold-engine bootstrap post-generation MUST pass strict `.frida` root layout validation."
    - "Explicit demo mode is zero-deploy-only."
    - "Explicit bootstrap component-reconcile remains idempotent."
