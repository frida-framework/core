# ─── LAYER 1: IDENTITY & META ────────────────────────────────────────────────

CONTRACT_META:
  _visibility: private
  id: frida-contract-meta
  version: 2.0.0
  owner: frida-core
  updated_at: "2026-02-26"
  scope:
    repository: hanszel/frida
    package: "@hanszel/core"
    purpose: >-
      Schema-driven generation engine, zone enforcement, visual overlay extraction,
      agent session control, and warm-first Frida bootstrap/reconcile with explicit demo seeding mode.
  source_ref: FRIDA_CORE_CONTRACT

CONTRACT_UNIQUENESS:
  _visibility: private
  id: frida-contract-uniqueness-policy
  version: 1.0.0
  first_rule: true
  rule: "Any contract entity MUST be declared exactly once."
  control:
    enforcement: warn_only
    fail_on_duplicate: false
    warning_code: CONTRACT_DUPLICATE_ENTITY
  strictness_freeze:
    change_requires_explicit_owner_instruction: true
    note: "Strictness level changes require explicit owner approval."
  projection_rule:
    allow_projection_via_source_ref: true
    note: "Blocks may reference other blocks via source_ref without duplication."

meta:
  id: frida-meta
  version: 1.0.0
  schemaVersion: "2.0"
  mode: schema
  contractArtifactRef: "PATHS.contract.coreContractFile"

core:
  id: frida-assembly-core
  version: 1.0.0
  contracticalSourceBlocks:
    - CONTRACT_META
    - CONTRACT_UNIQUENESS
    - FRIDA_SCHEMA_SUPPORT
    - FRIDA_ARCHITECTURE_DECISIONS
    - FRIDA_FOUNDATION_PRINCIPLES
    - PATHS
    - FRIDA_CONFIG_SPEC
    - FRIDA_ASSEMBLY_PROTOCOL
    - FRIDA_REFS
    - FRIDA_CONFIG
    - FRIDA_RUNTIME_CONFIG
    - FRIDA_ROOT_LAYOUT_POLICY
    - FRIDA_CONFIG_FIELD_DOCS
    - ZONES
    - FRIDA_TASK_PROFILES
    - FRIDA_ENFORCEMENT
    - FRIDA_AGENT_LIFECYCLE
    - FRIDA_ENFORCEMENT_TYPES
    - FRIDA_REPORTING
    - FRIDA_VALIDATION_CHECKLIST
    - FRIDA_TEMPLATE_INTEGRITY
    - FRIDA_CLI
    - FRIDA_VISUAL
    - FRIDA_GUARD_SPEC
    - FRIDA_INVARIANT_SPEC
    - FRIDA_ANTITASK_SPEC
    - FRIDA_INTERFACE_VERIFY
    - FRIDA_INTERFACE_UPDATE_SPEC
    - FRIDA_INTERFACE_UPDATE_CODE
    - FRIDA_INTERFACE_TASKSET
    - FRIDA_CONTRACT_BOOTSTRAP
    - FRIDA_BOOTSTRAP_SURFACE_POLICY
    - FRIDA_BOOTSTRAP_PACKAGE_MANIFEST
  selectorGrammar: jsonpath-lite
  generatorPipelineContracts:
    - "schema-validate"
    - "normalize"
    - "resolve-selectors"
    - "run-legacy-generator"
    - "run-adapter-generators"
    - "emit-manifest"
  pathRefs:
    contractArtifact: "contract/core.contract.yaml"
    templatesFrida: "templates/frida"
    templatesDocs: "templates/docs-gen"
  outputContracts:
    - "AGENTS.md"
    - ".frida/contract/specs/ROUTER.xml"
    - ".frida/contract/profiles/*.xml"
    - ".frida/contract/AGENTS.md"
    - ".frida/contract/docs/policy/*.md"
    - ".frida/contract/docs/reference/*.md"
    - ".specs/ROUTER.xml"
    - ".specs/profiles/*.xml"
    - "docs/policy/*.md"
    - "docs/reference/*.md"
    - ".frida/config.yaml"
    - ".frida/config.template.yaml"
    - ".frida/contract/app/**"
    - ".frida/contract/frida/**"
    - ".frida/contract/artifacts/frida.ir.json"
    - ".frida/contract/artifacts/frida.permissions.json"
    - ".frida/contract/artifacts/frida.graph.mmd"
    - ".frida/contract/artifacts/frida.adapter.generated.json"
