# ─── LAYER 5: REPORTING & VALIDATION ─────────────────────────────────────────

FRIDA_REPORTING:
  _visibility: private
  id: frida-reporting
  version: 1.0.0
  file_contractRef: "FRIDA_CONFIG.reporting"
  runtime_configRef: "FRIDA_RUNTIME_CONFIG"
  access:
    create_all_profiles: true
    read_only_profiles:
      - governance
    update_delete_allowed_profiles: []
  run_report:
    required_on:
      - SUCCESS
      - HALTED
    schema_ref: "schemas/frida-job-report.schema.json"
    filename_prefix: unixtime_ms
    minimum_fields:
      - frida_report
      - status
      - profile_id
      - created_at
      - changes
      - verification
      - summary
    verification_required_sections:
      - antitask

FRIDA_VALIDATION_CHECKLIST:
  _visibility: private
  id: frida-validation-checklist
  version: 1.0.0
  contract_consistency:
    - "All Ref-suffixed keys resolve to existing PATHS entries."
    - "All required blocks listed in core.contracticalSourceBlocks exist as top-level keys."
    - "Concrete engine config details are defined in the core-configuration layer; other layers use refs only."
    - "Path refs resolve to valid filesystem targets."
  reporting_consistency:
    - "FRIDA_CONFIG.reporting is fixed and schema-valid."
    - "Runtime config validates against frida-runtime-config.schema.json."
    - "FRIDA root layout policy enforces exactly two root files (config.yaml, config.template.yaml) and only allowed root dirs (contract, reports, inbox)."
  visual_consistency:
    - "Visual overlay is deterministic: same input → same output."
    - "Visual checks are fail-hard."
  template_integrity:
    - "Template-integrity manifest validates against schema."
    - "Hash drift returns non-zero exit code."
  session_consistency:
    - "Session token file is valid YAML with required fields."
    - "No concurrent tokens on same branch."
    - >-
      Run report MUST include verification.antitask (PASS/FAIL/SKIP) when status is
      SUCCESS or HALTED.
  bootstrap_seed_consistency:
    - "Bootstrap package manifest validates against schema and declared hash policy."
    - "Default bootstrap mode is warm reconcile and HALTs with redirect when Frida markers are absent."
    - "Warm/cold-engine bootstrap preserve user-owned runtime config and job reports while pruning unknown files only in declared managed scopes."
    - "Warm/cold-engine bootstrap preserve `.frida/inbox/**` and use inbox app-contract source only (no fallback to `contract/**`)."
    - "Warm/cold-engine bootstrap do not write app-contract files."
    - "Warm/cold-engine bootstrap post-generation MUST pass strict `.frida` root layout validation."
    - "Explicit demo mode is zero-deploy-only."
    - "Explicit bootstrap component-reconcile remains idempotent."
