# ─── FRIDA LAYER FL03: INFRASTRUCTURE ────────────────────────────────────────

FRIDA_ASSEMBLY_PROTOCOL:
  _visibility: private
  id: frida-assembly-policy
  version: 1.0.0
  inputs:
    - id: sources
      text: "Use CONFIG.sources as the only input for assembly."
  outputs:
    - id: exports_registry
      text: "Build a merged exports registry: export.id -> {key, path, layer_id, source_id}."
  steps:
    - id: load_indexes
      text: "Load each CONFIG.sources[].index in order."
    - id: validate_indexes
      text: "Validate each index document: schema_version, layers[], guards."
    - id: merge_layers
      text: "Concatenate layers[] from all indexes in source order."
    - id: validate_layers
      text: "Validate merged layers: ids unique, paths unique, path rules."
    - id: build_exports_registry
      text: "For each merged layer, read layer.exports[] and merge into exports_registry."
    - id: validate_exports_registry
      text: "Validate exports_registry uniqueness: export.id."
  determinism:
    - id: stable_order
      text: "Order is CONFIG.sources[] then index.layers[] then layer.exports[]. No filesystem discovery."
  guards:
    - id: schema_version_missing
      trigger: schema_version_missing
      action: HALT
      error_code: SCHEMA_VERSION_MISSING
    - id: schema_version_not_supported
      trigger: schema_version_not_supported
      action: HALT
      error_code: SCHEMA_VERSION_NOT_SUPPORTED
    - id: schema_version_mismatch
      trigger: schema_version_mismatch
      action: HALT
      error_code: SCHEMA_VERSION_MISMATCH
    - id: duplicate_layer_id
      trigger: duplicate_layer_id
      action: HALT
      error_code: DUPLICATE_LAYER_ID
    - id: duplicate_layer_path
      trigger: duplicate_layer_path
      action: HALT
      error_code: DUPLICATE_LAYER_PATH
    - id: invalid_layer_path
      trigger: invalid_layer_path
      action: HALT
      error_code: INVALID_LAYER_PATH
    - id: missing_layer_exports
      trigger: missing_layer_exports
      action: HALT
      error_code: MISSING_LAYER_EXPORTS
    - id: duplicate_export_id
      trigger: duplicate_export_id
      action: HALT
      error_code: DUPLICATE_EXPORT_ID

FRIDA_REFS:
  _visibility: private
  id: frida-refs
  version: 1.0.0
  suffix:
    single: Ref
    list: Refs
  resolution:
    steps:
      - id: detect
        text: "Any key ending with Ref/Refs is a reference field."
      - id: normalize
        text: "Ref value MUST normalize to string id; no inference."
      - id: locate
        text: "Locate target by id in merged exports registry built from indexes."
      - id: load
        text: "Load only the target layer file and read the exported block key."
      - id: bind
        text: "Bind reference to exactly one target block."
  guards:
    - id: ref_value_not_string
      trigger: ref_value_not_string
      action: HALT
      error_code: REF_VALUE_NOT_STRING
    - id: ref_target_not_found
      trigger: ref_target_not_found
      action: HALT
      error_code: REF_TARGET_NOT_FOUND
    - id: ref_target_ambiguous
      trigger: ref_target_ambiguous
      action: HALT
      error_code: REF_TARGET_AMBIGUOUS

ZONES:
  _visibility: public
  id: frida-zones
  version: 1.0.0
  scope: target_app_repo_only
  scope_note: >
    ZONES are public routing entities outside the Frida core repository.
    Application repos define their own ZONES block in the app contract.
    The Frida core repository does not expose its private routing entities
    through this block; it uses a separate private internal-zone block instead.
  deployment_scope: public
  ownership_rule:
    - "Public zone entities belong to the target repository contract, not to the Frida core repo."
    - "Frida core MUST NOT describe its own private routing surfaces in ZONES."
  routing_rule:
    - "Target-repo routing resolves only against the target repo ZONES block."
    - "Private Frida-repo internal zones are never deployed to target repos."

INT_FRIDA_ZONES:
  _visibility: private
  id: int-frida-zones
  version: 1.0.0
  scope: frida_engine_repo_only
  scope_note: >
    These zones define routing surfaces for working WITHIN the Frida engine
    repository (frida-core package source). They are private engine entities
    and MUST NOT be projected into target application repos.
  templates:
    hard_zone: true
    pathGlobRef: "PATHS.scopes.templatesAll"
    agentsPath: "templates"
    purpose: "Template surface and template contract controls."
  frida_managed:
    name: "Frida Internal Artifacts"
    hard_zone: true
    pathGlobRef: "PATHS.scopes.fridaManagedAll"
    agentsPath: ".frida"
    agentsTemplate: "notouch"
    readOnly: true
    whyReadOnly: "Internal Frida inspection/telemetry artifacts generated by frida-core gen."
    consequence: "Manual edits are overwritten by generation or bootstrap reconcile."
    howToChange: "Update contract or generator inputs, then rerun Frida generation."
    purpose: "Protected Frida-managed runtime and generated artifacts."
  non_templates:
    hard_zone: false
    pathGlobRef: "PATHS.scopes.nonTemplatesAll"
    exclude_path_prefixes:
      - "templates/"
      - ".frida/"
    agentsPath: "."
    purpose: "Fallback non-template routing surface for current stage."
  zone_resolution:
    algorithm:
      - step: normalize
        action: "Convert working directory to POSIX-relative path."
      - step: match
        action: "Collect all zones whose pathGlob matches the normalized path. Exclude zones where path starts with exclude_path_prefixes."
      - step: rank
        action: "Sort matching zones by specificity (number of path segments, descending)."
      - step: select
        action: "Select the most specific zone. If tie, prefer hard_zone=true."
      - step: fallback
        action: "If no zone matches, HALT with error."
    invariants:
      - "Zone MUST NOT be inferred from profile keywords or working_dir heuristics."
      - "Zone is resolved ONLY by matching path against the repository-scoped zone block."
  verification_policy:
    rules:
      - "Verification commands MUST be one-shot and non-interactive."
      - "Verification commands MUST be deterministic."
      - "Verification exit code 0 = success, non-zero = failure."
  routing:
    stage: "wave-2-stable"
    classes:
      - id: templates
        match:
          pathPrefix: "templates/"
        zone: templates
        agentsRef: "INT_FRIDA_ZONES.templates.agentsPath"
      - id: frida_managed
        match:
          pathPrefix: ".frida/"
        zone: frida_managed
        agentsRef: "INT_FRIDA_ZONES.frida_managed.agentsPath"
      - id: non_templates
        match:
          default: true
        zone: non_templates
        agentsRef: "INT_FRIDA_ZONES.non_templates.agentsPath"
    rules:
      - "Profile routing uses zone-driven AGENTS.md lookup."
      - "No profile match MUST halt execution."
      - "Routing state is not persisted between sessions."
