ZONES:
  id: frida-zones
  version: 1.0.0
  scope: target_app_repo_only
  scope_note: >
    ZONES are public routing entities outside the Frida core repository. Application repos define their own ZONES block
    in the app contract. The Frida core repository does not expose its private routing entities through this block; it
    uses a separate private internal-zone block instead.
  deployment_scope: public
  ownership_rule:
    - Public zone entities belong to the target repository contract, not to the Frida core repo.
    - Frida core MUST NOT describe its own private routing surfaces in ZONES.
  routing_rule:
    - Target-repo routing resolves only against the target repo ZONES block.
    - Private Frida-repo internal zones are never deployed to target repos.
