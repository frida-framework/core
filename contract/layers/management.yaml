# ─── LAYER 8: MANAGEMENT ───────────────────────────────────────────────────
# Purpose: Interfaces for interacting with the contract — how to read, verify,
#          and change it. Specs, guards, antitasks, update/verify/taskset protocols.
#          Also defines version policy for package, contract, and schema.

FRIDA_VERSION_POLICY:
  _visibility: public
  id: frida-version-policy
  version: 1.0.0
  purpose: "Defines version domains, their sources of truth, and bump rules."
  domains:
    package:
      source_of_truth: package.json → version
      format: semver
      bump_rules:
        major: "Breaking change in public API (exports, CLI arguments, contract-mirror interface)."
        minor: "New feature, new contract block, new CLI command, non-breaking API addition."
        patch: "Bug fix, documentation, internal refactor with no API change."
    contract:
      source_of_truth: contract/contract.index.yaml → version
      mirror: contract/layers/identity.yaml → CONTRACT_META.version
      format: semver
      consistency_rule: "contract.index.yaml version MUST equal CONTRACT_META.version."
      bump_rules:
        major: "New required top-level block, removal of existing block, structural incompatibility."
        minor: "New optional block, new layer, new interface, new guard/invariant."
        patch: "Wording fix, metadata update, non-structural clarification."
    schema:
      source_of_truth: schemas/frida-contract.schema.json → title (version suffix)
      mirror: contract/contract.index.yaml → schema_version
      mirror_2: contract/layers/identity.yaml → meta.schemaVersion
      format: "MAJOR.MINOR"
      consistency_rule: "All three locations MUST declare the same version."
      bump_rules:
        major: "New required property, removal of property, type change."
        minor: "New optional property, relaxed constraint, enum extension."
  invariants:
    - id: version.contract_meta_sync
      text: "CONTRACT_META.version MUST equal contract.index.yaml version at all times."
    - id: version.schema_sync
      text: "schema title, schema_version, and meta.schemaVersion MUST be identical."
    - id: version.bump_on_mutation
      text: "Any interface that mutates contract or code MUST evaluate version_impact."

FRIDA_GUARD_SPEC:
  _visibility: private
  id: frida-guard-spec
  version: 1.0.0
  guard_format:
    required_fields:
      - id
      - trigger
      - action
      - error_code
    optional_fields:
      - text
      - scope
  actions:
    - id: HALT
    - id: WARN
  triggers:
    - id: schema_version_missing
      text: "schema_version is absent."
    - id: schema_version_not_supported
      text: "schema_version differs from supported version."
    - id: schema_version_mismatch
      text: "schema_version mismatch across required indexes."
    - id: unknown_top_level_key
      text: "Top-level key not allowed by schema."
    - id: duplicate_layer_id
      text: "layers[].id duplicates within one index or merged plan."
    - id: duplicate_layer_path
      text: "layers[].path duplicates within one index or merged plan."
    - id: invalid_layer_path
      text: "layers[].path violates path rules."
    - id: missing_layer_exports
      text: "layers[].exports missing."
    - id: duplicate_export_id
      text: "exports[].id duplicates across merged exports registry."
    - id: missing_config_file
      text: "configFile field is missing."
    - id: sources_missing
      text: "CONFIG.sources missing or empty."
    - id: core_missing
      text: "No source with id=core."
    - id: app_missing
      text: "No source with id=app."
    - id: duplicate_source_id
      text: "CONFIG.sources[].id duplicates."
    - id: duplicate_source_index
      text: "CONFIG.sources[].index duplicates."
    - id: invalid_source_index_path
      text: "CONFIG.sources[].index violates path rules."
    - id: ref_value_not_string
      text: "Ref/Refs value is not a string id."
    - id: ref_target_not_found
      text: "Ref/Refs target id not found in exports registry."
    - id: ref_target_ambiguous
      text: "Ref/Refs resolves to more than one export id."
    - id: id_contains_profanity
      text: "id violates neutral naming policy."
    - id: version_not_semver
      text: "version is not semver (MAJOR.MINOR.PATCH)."

FRIDA_INVARIANT_SPEC:
  _visibility: private
  id: frida-invariant-spec
  version: 1.0.0
  invariant_format:
    required_fields:
      - id
      - text
    optional_fields:
      - scope
      - applies_to

FRIDA_ANTITASK_SPEC:
  _visibility: private
  id: frida-antitask-spec
  version: 1.0.0
  antitask_term: >-
    An antitask is any forbidden or disallowed action/pattern that MUST
    be stopped or redirected.
  antitask_format:
    required_fields:
      - id
      - pattern
      - reaction
    optional_fields:
      - text
      - scope
      - redirect_to
      - source
  reactions:
    - id: HALT
    - id: REDIRECT
    - id: WARN
  sources:
    - id: contractical_catalog
      source_ref: "FRIDA_ENFORCEMENT.antitasks"
    - id: execution_protocol_forbidden_actions
      source_ref: "FRIDA_AGENT_LIFECYCLE.forbidden_actions_ref"
    - id: enforcement_guards
      source_ref: "FRIDA_ENFORCEMENT.guards"
  antitasks:
    - id: ANTITASK_edit_contract_files_without_architect_role
      pattern: "Edit contract files without architect role"
      reaction: HALT
    - id: ANTITASK_write_outside_zone_boundaries
      pattern: "Write outside zone boundaries"
      reaction: HALT
    - id: ANTITASK_skip_verification_phase
      pattern: "Skip verification phase"
      reaction: HALT
    - id: ANTITASK_modify_generated_artifacts
      pattern: "Modify generated artifacts"
      reaction: REDIRECT
      redirect_to: "Regenerate via frida-core gen"
  report_proof:
    required: true
    path: "verification.antitask"
    required_fields:
      - status
      - checked_at
      - summary
    allowed_status:
      - PASS
      - FAIL
      - SKIP

FRIDA_INTERFACE_VERIFY:
  _visibility: public
  id: frida-interface-verify
  version: 1.0.0
  purpose: "Validate contract against schema, check ref consistency, report issues."
  operations:
    audit:
      description: "Validate contract against schema and report issues."
      protocol: "frida-core migration-report"
    schema_check:
      description: "Validate assembled contract against frida-contract.schema.json."
    ref_check:
      description: "Resolve all Ref/Refs and report broken references."
    generate:
      description: "Run full generation pipeline."
      protocol: "frida-core gen"
    visual_check:
      description: "Check visual overlay freshness."
      protocol: "frida-core visual check"
    quality_check:
      description: "Compute quality metrics from CONTRACT_MANAGEMENT_INTERFACE."
      metrics_ref: CONTRACT_MANAGEMENT_INTERFACE.quality_metrics

FRIDA_INTERFACE_AUDIT:
  _visibility: public
  id: frida-interface-audit
  version: 1.0.0
  purpose: "Deployment readiness audit: validate contract structure, routing, and Frida surface integrity."
  playbook_ref: "templates/management/AGENT-repo-audit.md"
  requires_profile: readonly_observer
  operations:
    deployment_check:
      description: "Verify Frida deployment structure (.frida/ layout, markers, config)."
      steps:
        - "Read app contract index from .frida/inbox/app-contract/contract.index.yaml and mirrored core contract index from .frida/contract/frida/contract.index.yaml"
        - "Validate index against FRIDA_SCHEMA_SUPPORT.schema_version"
        - "Verify AGENTS.md contract-set completeness"
    contract_consistency:
      description: "Check app contract against core contract format invariants."
      checks:
        - index_format_symmetric
        - refs_resolve_via_exports
        - schema_version_fixed
    routing_check:
      description: "Verify AGENTS.md routing chain completeness and correctness."
      steps:
        - "Verify root AGENTS.md exists and references correct paths"
        - "Verify ROUTER.xml exists at .frida/contract/specs/"
        - "Verify profile XMLs exist at .frida/contract/profiles/"
        - "Verify zone AGENTS.md files match contract ZONES"
    cli_diagnostics:
      description: "Run automated CLI diagnostics."
      commands:
        - "frida-core migration-report"
        - "frida-core check zone --path ."
        - "frida-core check contract-set"
  output:
    format: report
    includes:
      - deployment_status
      - contract_issues
      - routing_issues
      - cli_results
      - readiness_verdict
  keywords:
    - audit
    - deployment
    - readiness
    - diagnostics
    - health-check

CONTRACT_MANAGEMENT_INTERFACE:
  _visibility: public
  id: contract-management-interface
  version: 1.0.0
  purpose: >-
    Engine-level contract management: change protocol language,
    quality metrics, consistency checks, diagnostic framework,
    contract fixer role, and audit format.
    Implementation details in engine playbooks (templates/management/).

  canon_composition:
    purpose: "Canon consists of two groups that must stay synchronized."
    groups:
      - id: contracts
        description: "Normative data (contract blocks)."
      - id: protocols
        description: "Rules for working with canon: routing, governance, playbooks."
    rule: "When contracts change, check if protocols need updating, and vice versa."

  change_protocol:
    purpose: "Normative language for structural contract changes."
    operations: [ADD, UPDATE, MOVE, DEPRECATE, REFCHECK, GUARDCHECK, PROFILECHECK, FENCECHECK, DUPCHECK, RESERVED_CHECK, CONTRACT-DIFF]
    playbook_ref: "templates/management/AGENT-contract-update.md"

  quality_metrics:
    purpose: "Definitions of contract quality measurements."
    blocking: [NON_ABS, ISSUES, WIKI_LINK_ISSUES, AGENT_DRIFT_ISSUES]
    issue_components: [PARSE_ERRORS, FENCE_ERRORS, DUP_BLOCKS, UNRESOLVED_REFS, PROFILE_CONFLICTS, ZONE_SCHEMA_ERRORS, BROKEN_NAV_LINKS, AGENT_DRIFT_ISSUES]
    diagnostic: [DEPRECATED_WITHOUT_REPLACEDBY, DANGLING_REPLACEDBY, TERM_GAPS, REDUNDANT_DESCRIPTIVE, REF_STYLE_MIX, UNUSED_GUARDS, UNUSED_INVARIANTS]
    quality_gate:
      rule: "All blocking metrics must equal 0 before finalization."

  consistency_checks:
    purpose: "Categories of consistency verification."
    categories: [terms, guards_invariants, profiles, zones, cross_refs, fences, uniqueness, ui_boundaries]
    playbook_ref: "templates/management/AGENT-contract-update.md"

  diagnostic_framework:
    purpose: "Pattern for contract issue diagnosis and repair."
    pattern: "symptom -> cause -> algorithm"
    categories: [missing_artifacts, metadata_mismatch, contract_drift, routing_error, guard_violation, generator_failure]
    playbook_ref: "templates/management/AGENT-contract-repair.md"

  contract_fixer_role:
    purpose: "Only role with write access to contract blocks."
    constraint: "Application only via PR and manual workflow."

  audit_format:
    purpose: "Structure for audit task packs generated per profile."
    sections: [scope, embedded_contract, checklist, undocumented, scoring, report]
    scoring_weights:
      surface: 25
      invariants: 30
      guards: 25
      undocumented: 10
      reproducibility: 10
    threshold:
      pass: 70
      rule: "Any COMPLIANCE.FAIL -> FAIL regardless of score."
    finding_tags: [COMPLIANCE.FAIL, COMPLIANCE.PARTIAL, UNVERIFIABLE, CONTRACT.GAP, RISK.NDETERMINISM, RISK.SCOPE]
    playbook_ref: "templates/management/AGENT-repo-audit.md"

  component_contract_spec:
    purpose: "Structure for component-level contract files."
    required_sections:
      - id: hierarchy_position
        description: "Where this component sits in the app: parent page, sibling components."
      - id: mount_point
        description: "Entry point: slot reference, mount kind (mapper-managed | host-static)."
      - id: input_props
        description: "Typed input interface: data + state provided by host."
      - id: output_callbacks
        description: "Output interface: callbacks/events emitted to host."
      - id: domain_blocks
        description: "Component-specific contract blocks (UI structure, behavior, data schema)."
      - id: shared_refs
        description: "References to shared blocks (GLOSSARY, DATABASE_SCHEMA, RESOURCES) — refs only, not copies."
    constraint: "Total file size MUST fit in agent context window for task formulation."

FRIDA_INTERFACE_UPDATE_SPEC:
  _visibility: public
  id: frida-interface-update-spec
  version: 1.0.0
  purpose: "Extend or modify contract based on specification / task description."
  input:
    format: natural_language
    context:
      - current_contract
      - target_block
      - schema_ref
  output:
    format: yaml
    requires_approval: true
  version_impact:
    evaluate: always
    rule: "After applying changes, determine affected version domains (contract, schema, package) and bump per FRIDA_VERSION_POLICY."
    ref: FRIDA_VERSION_POLICY
  protocols:
    update:
      description: "Apply changes to contract via structured patch."
      playbook_ref: "templates/management/AGENT-contract-update.md"
      requires_role: ARCHITECT_AGENT
    repair:
      description: "Fix contract inconsistencies (broken refs, missing blocks)."
      playbook_ref: "templates/management/AGENT-contract-repair.md"
      requires_role: ARCHITECT_AGENT

FRIDA_INTERFACE_UPDATE_CODE:
  _visibility: public
  id: frida-interface-update-code
  version: 1.0.0
  purpose: "Extract and extend contract specification from existing codebase."
  input:
    format: source_code
    supported_languages:
      - TypeScript
      - JavaScript
      - HTML
      - CSS
  output:
    format: yaml
    requires_approval: true
  version_impact:
    evaluate: always
    rule: "After extracting contract from code, compare with declared contract. If new blocks/fields added, bump contract version per FRIDA_VERSION_POLICY."
    ref: FRIDA_VERSION_POLICY
  use_cases:
    - "Onboard existing project to Frida."
    - "Background consistency loop: re-extract contract from code, diff against declared contract."

FRIDA_INTERFACE_TASKSET:
  _visibility: public
  id: frida-interface-taskset
  version: 1.0.0
  purpose: "Prepare self-contained task packs from contract for agent execution."
  playbook_ref: "templates/management/AGENT-task-formulation.md"
  task_pack_definition:
    term: >-
      A Task Pack is a self-contained instruction set for an agent-developer.
      It transfers contract requirements into an actionable scope without
      requiring the agent to interpret the wiki or contract directly.
    principle: "CONTRACT → ANTITASK → DEVELOPMENT"
    required_fields:
      - action: "What to do — concrete, unambiguous."
      - files: "Paths or zones affected."
      - profile_id: "Id from FRIDA_TASK_PROFILES."
      - contract_requirements: "Guards/invariants/terms embedded explicitly."
      - verification_command: "Usually 'npm run verify', may differ by zone."
    optional_fields:
      - specific_invariants: "Task-specific invariant checks."
    forbidden: "Referencing wiki or contract by link instead of embedding requirements."
  readiness_checklist:
    contract_ready:
      - "Feature described in the appropriate contract:* block."
      - "All terms used in the task defined in contract:GLOSSARY."
    frida_ready:
      - "Zone for target files exists in ZONES."
      - "Antitask generated after last contract update."
      - "Profile covers target paths via edit_allowGlobRefs."
      - "Profile invariants are current for the task."
    version_check:
      - "Contract version matches CONTRACT_META.version (FRIDA_VERSION_POLICY.invariants.version.contract_meta_sync)."
      - "Schema version consistent across all sources (FRIDA_VERSION_POLICY.invariants.version.schema_sync)."
    scope_check:
      - "Task does not add functionality beyond what is described in contract."
      - "If new functionality needed — update contract first."
  audit_task_format:
    scoring_ref: CONTRACT_MANAGEMENT_INTERFACE.audit_format
    playbook_ref: "templates/management/AGENT-repo-audit.md"
    determinism:
      - "Profiles sorted by name."
      - "Invariants within task sorted by id."
      - "Guards within task sorted by id."
      - "Zones within task sorted by zone name."
  halt_conditions:
    - "Contract does not describe the feature being tasked."
    - "Zone or profile does not cover target files."
    - "Antitask not regenerated after last contract update."
    - "Task requires agent to write outside edit_allowGlobRefs."


