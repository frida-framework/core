# ─── FRIDA LAYER FL10A: VISUAL REFERENCE COMPONENTS ───────────────────────────

visual_demo_root:
  component_hierarchy_position:
    local_role: "reference_root"
  component_mount_point:
    slotRef: "UI_STRUCTURE.visual_demo.root"
    mount_kind: "host-static"
    mounted_child_boundaryRefs:
      - "visual_demo_summary"
  component_input_interface:
    overlay_source: "frida_core_contract"
    active_view: "topology"
  component_output_interface:
    exits:
      - id: "close_demo"
        outcome: "exit"
  component_domain_blocks:
    reference_shell:
      purpose: "Root reference boundary for live visual overlay generation."
  component_shared_refs:
    refs:
      - "FRIDA_VISUAL.overlay_schema_v1"
      - "FRIDA_VISUAL.viewer_runtime_v1"

visual_demo_summary:
  component_hierarchy_position:
    parent_boundaryRef: "visual_demo_root"
    local_role: "reference_summary"
  component_mount_point:
    slotRef: "UI_STRUCTURE.visual_demo.root.summary_slot"
    mount_kind: "mapper-managed"
    mounted_child_boundaryRefs:
      - "visual_demo_details"
  component_input_interface:
    selected_projection_unit: "projection_unit_id"
    active_lod: "lod"
  component_output_interface:
    exits:
      - id: "open_details"
        outcome: "continue"
        target_boundaryRef: "visual_demo_details"
      - id: "return_to_root"
        outcome: "return"
        return_target_boundaryRef: "visual_demo_root"
  component_domain_blocks:
    summary_cards:
      purpose: "Boundary-local summary content for the live reference overlay."
  component_shared_refs:
    refs:
      - "FRIDA_VISUAL.component_projection"
      - "FRIDA_VISUAL.overlay_schema_v1"

visual_demo_details:
  component_hierarchy_position:
    parent_boundaryRef: "visual_demo_summary"
    local_role: "reference_detail"
  component_mount_point:
    slotRef: "UI_STRUCTURE.visual_demo.root.summary_slot.details_panel"
    mount_kind: "mapper-managed"
    mounted_child_boundaryRefs: []
  component_input_interface:
    focused_boundary: "boundary_id"
    trace_mode: "off|boundary|exit"
  component_output_interface:
    exits:
      - id: "back_to_summary"
        outcome: "return"
        return_target_boundaryRef: "visual_demo_summary"
      - id: "finish_demo"
        outcome: "return"
        return_target_boundaryRef: "visual_demo_root"
      - id: "dismiss_demo"
        outcome: "exit"
  component_domain_blocks:
    detail_stack:
      purpose: "Boundary-local detail content for the live reference overlay."
  component_shared_refs:
    refs:
      - "FRIDA_VISUAL.viewer_runtime_v1"
      - "FRIDA_VISUAL.reference_viewer"
