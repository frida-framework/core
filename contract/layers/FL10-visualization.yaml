# ─── FRIDA LAYER FL10: VISUALIZATION ─────────────────────────────────────────

FRIDA_VISUAL:
  _visibility: public
  id: frida-visual
  version: 1.0.0
  overlay_format: json
  overlay_pathRef: "PATHS.visual.overlayFile"
  lod_levels:
    topology:
      zoom: [0.0, 0.35]
      nodes: "top-level block keys"
      edges: "Ref-suffixed cross-block references"
      labels: block_id
    flow:
      zoom: [0.35, 0.65]
      nodes: "second-level keys (sections within blocks)"
      edges: "intra-block Ref links"
      labels: section_id
    specification:
      zoom: [0.65, 1.0]
      nodes: "leaf entries (rules, guards, invariants)"
      edges: "all Ref/Refs"
      labels: full_path
  determinism:
    rule: "Same contract input MUST produce identical visual overlay output (up to graph isomorphism)."
  ref_to_edge_mapping:
    rule: "Every Ref-suffixed value resolves to a directed edge source→target in overlay."
  generation_trigger: "on_demand"
  principles:
    - id: overlay_read_only
      text: "Overlay is read-only and derived from contract. Manual edits are forbidden."
    - id: lod_semantic_zoom
      text: "Zoom level determines Level-of-Detail. No user configuration needed."
    - id: edge_from_refs
      text: "Edges are extracted from Ref/Refs keys only. No inferred edges."
    - id: layout_not_prescribed
      text: "Contract does not prescribe layout algorithm. Any layout producing correct topology is valid."
    - id: progressive_disclosure
      text: "Low zoom = topology only. High zoom = full specification detail."
