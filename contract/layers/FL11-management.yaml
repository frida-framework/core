FRIDA_INTERFACE_TASKSET:
  _visibility: public
  id: frida-interface-taskset
  version: 1.0.0
  purpose: "Prepare self-contained task packs from contract for agent execution."
  playbook_ref: "templates/management/AGENT-task-formulation.md"
  source_playbook_ref: "templates/management/AGENT-task-formulation.md"
  deployed_playbook_ref: ".frida/contract/playbooks/AGENT-task-formulation.md"
  task_pack_definition:
    term: >-
      A Task Pack is a self-contained instruction set for an agent-developer.
      It transfers contract requirements into an actionable scope without
      requiring the agent to interpret the wiki or contract directly.
    principle: "CONTRACT → ANTITASK → DEVELOPMENT"
    required_fields:
      - action: "What to do — concrete, unambiguous."
      - files: "Paths or zones affected."
      - interface_ref: "Source interface that authorizes the task output."
      - profile_id: "Id from the repository-scoped profile block."
      - contract_requirements: "Guards/invariants/terms embedded explicitly."
      - verification_command: "Usually 'npm run verify', may differ by zone."
    optional_fields:
      - specific_invariants: "Task-specific invariant checks."
    forbidden: "Referencing wiki or contract by link instead of embedding requirements."
  output_bindings:
    frida_core:
      interface_ref: FRIDA_INTERFACE_SELF_CONTRACT_MANAGEMENT
      repository_scope: frida_repo_only
      file_pattern: "frida-tasks/TASK-*.md"
      rule: "This is the only allowed task output surface inside the Frida repo."
    target_app:
      interface_refs:
        - FRIDA_INTERFACE_UPDATE_APP_BY_SPEC
        - FRIDA_INTERFACE_UPDATE_APP_BY_CODE
      repository_scope: target_app_repo_only
      frida_repo_output: forbidden
  readiness_checklist:
    contract_ready:
      - "Feature described in the appropriate contract:* block."
      - "All terms used in the task defined in contract:GLOSSARY."
    frida_ready:
      - "Zone for target files exists in the repository-scoped zone block (`ZONES` in target repos, private internal-zone block in repo `frida`)."
      - "Antitask generated after last contract update."
      - "Repository-scoped profile covers target paths via edit_allow/edit_allowGlobRefs."
      - "Profile invariants are current for the task."
    version_check:
      - "Contract version matches CONTRACT_META.version (FRIDA_VERSION_POLICY.invariants.version.contract_meta_sync)."
      - "Schema version consistent across all sources (FRIDA_VERSION_POLICY.invariants.version.schema_sync)."
    scope_check:
      - "Task does not add functionality beyond what is described in contract."
      - "If new functionality needed — update contract first."
      - "If task semantics require a shipped but inactive app extension, task formulation MUST HALT and require explicit extension activation."
      - "Task output path matches the repository scope of interface_ref."
  audit_task_format:
    playbook_ref: "templates/management/AGENT-repo-audit.md"
    source_playbook_ref: "templates/management/AGENT-repo-audit.md"
    deployed_playbook_ref: ".frida/contract/playbooks/AGENT-repo-audit.md"
    determinism:
      - "Profiles sorted by name."
      - "Invariants within task sorted by id."
      - "Guards within task sorted by id."
      - "Zones within task sorted by zone name."
  halt_conditions:
    - "Contract does not describe the feature being tasked."
    - "Zone or profile does not cover target files."
    - "Antitask not regenerated after last contract update."
    - "Task requires agent to write outside edit_allowGlobRefs."


