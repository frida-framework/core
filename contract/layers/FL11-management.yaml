# ─── FRIDA LAYER FL11: MANAGEMENT ──────────────────────────────────────────
# Purpose: Interfaces for interacting with the contract — how to read, verify,
#          and change it. Specs, guards, antitasks, update/verify/taskset protocols.
#          Also defines version policy for package, contract, and schema.

FRIDA_VERSION_POLICY:
  _visibility: public
  id: frida-version-policy
  version: 1.0.0
  purpose: "Defines version domains, their sources of truth, and bump rules."
  domains:
    package:
      source_of_truth: package.json → version
      format: semver
      bump_rules:
        major: "Breaking change in public API (exports, CLI arguments, contract-mirror interface)."
        minor: "New feature, new contract block, new CLI command, non-breaking API addition."
        patch: "Bug fix, documentation, internal refactor with no API change."
    contract:
      source_of_truth: contract/contract.index.yaml → version
      mirror: contract/layers/identity.yaml → CONTRACT_META.version
      format: semver
      consistency_rule: "contract.index.yaml version MUST equal CONTRACT_META.version."
      bump_rules:
        major: "New required top-level block, removal of existing block, structural incompatibility."
        minor: "New optional block, new layer, new interface, new guard/invariant."
        patch: "Wording fix, metadata update, non-structural clarification."
    schema:
      source_of_truth: schemas/frida-contract.schema.json → title (version suffix)
      mirror: contract/contract.index.yaml → schema_version
      mirror_2: contract/layers/identity.yaml → meta.schemaVersion
      format: "MAJOR.MINOR"
      consistency_rule: "All three locations MUST declare the same version."
      bump_rules:
        major: "New required property, removal of property, type change."
        minor: "New optional property, relaxed constraint, enum extension."
  invariants:
    - id: version.contract_meta_sync
      text: "CONTRACT_META.version MUST equal contract.index.yaml version at all times."
    - id: version.schema_sync
      text: "schema title, schema_version, and meta.schemaVersion MUST be identical."
    - id: version.bump_on_mutation
      text: "Any interface that mutates contract or code MUST evaluate version_impact."

FRIDA_GUARD_SPEC:
  _visibility: private
  id: frida-guard-spec
  version: 1.0.0
  guard_format:
    required_fields:
      - id
      - trigger
      - action
      - error_code
    optional_fields:
      - text
      - scope
  actions:
    - id: HALT
    - id: WARN
  triggers:
    - id: schema_version_missing
      text: "schema_version is absent."
    - id: schema_version_not_supported
      text: "schema_version differs from supported version."
    - id: schema_version_mismatch
      text: "schema_version mismatch across required indexes."
    - id: unknown_top_level_key
      text: "Top-level key not allowed by schema."
    - id: duplicate_layer_id
      text: "layers[].id duplicates within one index or merged plan."
    - id: duplicate_layer_path
      text: "layers[].path duplicates within one index or merged plan."
    - id: invalid_layer_path
      text: "layers[].path violates path rules."
    - id: missing_layer_exports
      text: "layers[].exports missing."
    - id: duplicate_export_id
      text: "exports[].id duplicates across merged exports registry."
    - id: missing_config_file
      text: "configFile field is missing."
    - id: sources_missing
      text: "CONFIG.sources missing or empty."
    - id: core_missing
      text: "No source with id=core."
    - id: app_missing
      text: "No source with id=app."
    - id: duplicate_source_id
      text: "CONFIG.sources[].id duplicates."
    - id: duplicate_source_index
      text: "CONFIG.sources[].index duplicates."
    - id: invalid_source_index_path
      text: "CONFIG.sources[].index violates path rules."
    - id: ref_value_not_string
      text: "Ref/Refs value is not a string id."
    - id: ref_target_not_found
      text: "Ref/Refs target id not found in exports registry."
    - id: ref_target_ambiguous
      text: "Ref/Refs resolves to more than one export id."
    - id: id_contains_profanity
      text: "id violates neutral naming policy."
    - id: version_not_semver
      text: "version is not semver (MAJOR.MINOR.PATCH)."
    - id: component_boundary_section_missing
      text: "A required component_* boundary section is missing."
    - id: component_boundary_ref_unresolved
      text: "A declared mounted child boundary or continuation/return boundary ref does not resolve."
    - id: component_output_exit_outcome_missing
      text: "A component_output_interface exit entry is missing required outcome semantics."
    - id: component_parent_child_inline_violation
      text: "Parent specification inlines mounted child internals where explicit drill-in is required."
    - id: component_shared_refs_boundary_override
      text: "component_shared_refs is used to smuggle ownership, hierarchy, entry, or exit semantics."
    - id: component_legacy_term_detected
      text: "A legacy component-boundary section name appears in an active contract definition."
    - id: component_namespace_mixed
      text: "Old and new component-boundary namespaces coexist in an active contract definition."
    - id: component_visual_semantics_drift
      text: "Visualization semantics drift from the boundary-first component model."

FRIDA_INVARIANT_SPEC:
  _visibility: private
  id: frida-invariant-spec
  version: 1.0.0
  invariant_format:
    required_fields:
      - id
      - text
    optional_fields:
      - scope
      - applies_to

FRIDA_ANTITASK_SPEC:
  _visibility: private
  id: frida-antitask-spec
  version: 1.0.0
  antitask_term: >-
    An antitask is any forbidden or disallowed action/pattern that MUST
    be stopped or redirected.
  antitask_format:
    required_fields:
      - id
      - pattern
      - reaction
    optional_fields:
      - text
      - scope
      - redirect_to
      - source
  reactions:
    - id: HALT
    - id: REDIRECT
    - id: WARN
  sources:
    - id: contractical_catalog
      source_ref: "FRIDA_ENFORCEMENT.antitasks"
    - id: execution_protocol_forbidden_actions
      source_ref: "FRIDA_AGENT_LIFECYCLE.forbidden_actions_ref"
    - id: enforcement_guards
      source_ref: "FRIDA_ENFORCEMENT.guards"
  antitasks:
    - id: ANTITASK_edit_contract_files_without_architect_role
      pattern: "Edit contract files without architect role"
      reaction: HALT
    - id: ANTITASK_write_outside_zone_boundaries
      pattern: "Write outside zone boundaries"
      reaction: HALT
    - id: ANTITASK_skip_verification_phase
      pattern: "Skip verification phase"
      reaction: HALT
    - id: ANTITASK_modify_generated_artifacts
      pattern: "Modify generated artifacts"
      reaction: REDIRECT
      redirect_to: "Regenerate via frida-core gen"
  report_proof:
    required: true
    path: "verification.antitask"
    required_fields:
      - status
      - checked_at
      - summary
    allowed_status:
      - PASS
      - FAIL
      - SKIP

FRIDA_INTERFACE_VERIFY:
  _visibility: public
  id: frida-interface-verify
  version: 1.0.0
  purpose: "Validate contract against schema, check ref consistency, report issues."
  operations:
    audit:
      description: "Validate contract against schema and report issues."
      protocol: "frida-core migration-report"
    schema_check:
      description: "Validate assembled contract against frida-contract.schema.json."
    ref_check:
      description: "Resolve all Ref/Refs and report broken references."
    generate:
      description: "Run full generation pipeline."
      protocol: "frida-core gen"
    visual_check:
      description: "Check visual overlay freshness."
      protocol: "frida-core visual check"
    component_boundary_check:
      description: "Check boundary-first component contract semantics, legacy-term bans, and drill-in/exit enforcement."
      protocol: "node templates/tooling/verify/check-component-boundary-contract.mjs"
    quality_check:
      description: "Compute contract quality metrics per internal self-contract management policy."

FRIDA_INTERFACE_AUDIT:
  _visibility: public
  id: frida-interface-audit
  version: 1.0.0
  purpose: "Deployment readiness audit: validate contract structure, routing, and Frida surface integrity."
  playbook_ref: "templates/management/AGENT-repo-audit.md"
  requires_profile_source: repository_scoped_profile_block
  requires_profiles:
    frida_repo:
      - frida_readonly_observer
    target_app_repo:
      - app_readonly_observer
  operations:
    deployment_check:
      description: "Verify Frida deployment structure (.frida/ layout, markers, config)."
      steps:
        - "Read app contract index from .frida/inbox/app-contract/contract.index.yaml and mirrored core contract index from .frida/contract/frida/contract.index.yaml"
        - "Validate index against FRIDA_SCHEMA_SUPPORT.schema_version"
        - "Verify AGENTS.md contract-set completeness"
    contract_consistency:
      description: "Check app contract against core contract format invariants."
      checks:
        - index_format_symmetric
        - refs_resolve_via_exports
        - schema_version_fixed
    routing_check:
      description: "Verify AGENTS.md routing chain completeness and correctness."
      steps:
        - "Verify root AGENTS.md exists and references correct paths"
        - "Verify ROUTER.xml exists at .frida/contract/specs/"
        - "Verify profile XMLs exist at .frida/contract/profiles/"
        - "Verify zone AGENTS.md files match the repository-scoped zone block (`ZONES` in target repos, private internal-zone block in repo `frida`)."
    cli_diagnostics:
      description: "Run automated CLI diagnostics."
      commands:
        - "frida-core migration-report"
        - "frida-core check zone --path ."
        - "frida-core check contract-set"
  output:
    format: report
    includes:
      - deployment_status
      - contract_issues
      - routing_issues
      - cli_results
      - readiness_verdict
  keywords:
    - audit
    - deployment
    - readiness
    - diagnostics
    - health-check

FRIDA_INTERFACE_SELF_CONTRACT_MANAGEMENT:
  _visibility: private
  id: frida-interface-self-contract-management
  version: 1.0.0
  purpose: >-
    Repo-local Frida self-contract management: change protocol language,
    quality metrics, consistency checks, diagnostic framework,
    contract fixer role, audit format, and self-task output policy.
    Implementation details in engine playbooks (templates/management/).
  repository_scope: frida_repo_only
  mutation_scope: frida_contract_only
  forbidden_targets:
    - target_app_contract
    - target_app_repo_code
  deployment_scope: not_deployed_to_target_repo
  task_output_policy:
    output_dir: "frida-tasks"
    file_pattern: "frida-tasks/TASK-*.md"
    rule: "This is the only interface allowed to produce task files inside the Frida repo."

  contract_composition:
    purpose: "Contract consists of two groups that must stay synchronized."
    groups:
      - id: contracts
        description: "Normative data (contract blocks)."
      - id: protocols
        description: "Rules for working with contract: routing, interfaces, playbooks."
    rule: "When contracts change, check if protocols need updating, and vice versa."

  change_protocol:
    purpose: "Normative language for structural contract changes."
    operations: [ADD, UPDATE, MOVE, DEPRECATE, REFCHECK, GUARDCHECK, PROFILECHECK, FENCECHECK, DUPCHECK, RESERVED_CHECK, CONTRACT-DIFF]
    playbook_ref: "templates/management/AGENT-contract-update.md"
    maintenance_steps:
      - id: manifest_hash_sync
        tool_ref: "FRIDA_TEMPLATE_HASH_TOOL"
        rule: "If a self-contract patch changes any manifest-declared static asset, run the hash tool before final verification."
      - id: manual_hash_update
        tool_ref: "FRIDA_TEMPLATE_HASH_TOOL"
        rule: "The hash tool is verify-only. If it reports drift, update sha256 entries manually in the affected manifest(s) within the same patch."

  quality_metrics:
    purpose: "Definitions of contract quality measurements."
    blocking: [NON_ABS, ISSUES, WIKI_LINK_ISSUES, AGENT_DRIFT_ISSUES]
    issue_components: [PARSE_ERRORS, FENCE_ERRORS, DUP_BLOCKS, UNRESOLVED_REFS, PROFILE_CONFLICTS, ZONE_SCHEMA_ERRORS, BROKEN_NAV_LINKS, AGENT_DRIFT_ISSUES]
    diagnostic: [DEPRECATED_WITHOUT_REPLACEDBY, DANGLING_REPLACEDBY, TERM_GAPS, REDUNDANT_DESCRIPTIVE, REF_STYLE_MIX, UNUSED_GUARDS, UNUSED_INVARIANTS]
    quality_gate:
      rule: "All blocking metrics must equal 0 before finalization."

  consistency_checks:
    purpose: "Categories of consistency verification."
    categories: [terms, guards_invariants, profiles, zones, cross_refs, fences, uniqueness, ui_boundaries, component_boundaries, visualization_boundaries]
    component_boundaries:
      - id: boundary_sections_complete
        rule: "Component-level contract files MUST declare all canonical component_* sections defined by component_contract_spec.required_sections."
      - id: boundary_refs_resolve
        rule: "component_mount_point.mounted_child_boundaryRefs and component_output_interface.*boundaryRef targets MUST resolve when declared."
      - id: boundary_exit_semantics_complete
        rule: "component_output_interface exit entries MUST declare id and outcome and remain usable as the canonical source for flow and exit semantics."
      - id: boundary_namespace_clean
        rule: "Legacy section names and mixed old/new namespace use are forbidden in active component-boundary definitions."
      - id: boundary_non_duplication
        rule: "Parent component contracts MUST NOT inline mounted child internals when drill-in is required, and component_shared_refs MUST remain dependency-only."
    visualization_boundaries:
      - id: boundary_first_projection
        rule: "Visualization interprets topology, flow, and specification relative to the current component boundary before using YAML depth."
      - id: child_drill_in_explicit
        rule: "Cross-component drill-in MUST use explicit mounted child boundaries from component_mount_point.mounted_child_boundaryRefs."
      - id: child_non_auto_expand
        rule: "Parent specification view MUST NOT auto-expand mounted child internals."
      - id: exit_projection_canonical
        rule: "Flow projection reads canonical exits, outcomes, and continuation/return targeting only from component_output_interface."
    playbook_ref: "templates/management/AGENT-contract-update.md"

  diagnostic_framework:
    purpose: "Pattern for contract issue diagnosis and repair."
    pattern: "symptom -> cause -> algorithm"
    categories: [missing_artifacts, metadata_mismatch, contract_drift, routing_error, guard_violation, generator_failure]
    playbook_ref: "templates/management/AGENT-contract-repair.md"

  contract_fixer_role:
    purpose: "Only role with write access to contract blocks."
    constraint: "Application only via PR and manual workflow."

  audit_format:
    purpose: "Structure for audit task packs generated per profile."
    sections: [scope, embedded_contract, checklist, undocumented, scoring, report]
    scoring_weights:
      surface: 25
      invariants: 30
      guards: 25
      undocumented: 10
      reproducibility: 10
    threshold:
      pass: 70
      rule: "Any COMPLIANCE.FAIL -> FAIL regardless of score."
    finding_tags: [COMPLIANCE.FAIL, COMPLIANCE.PARTIAL, UNVERIFIABLE, CONTRACT.GAP, RISK.NDETERMINISM, RISK.SCOPE]
    playbook_ref: "templates/management/AGENT-repo-audit.md"

  component_contract_spec:
    purpose: "Normative structure for component-level contract files that define component boundary semantics."
    authoritative_rule: "This block is the authoritative source for component-level contract section names, field requirements, and source-contract semantics. Visual projection behavior is authoritative only via FRIDA_VISUAL.component_projection."
    visual_projection_authorityRef: "FRIDA_VISUAL.component_projection"
    required_sections:
      - id: component_hierarchy_position
        description: >-
          Topology placement of this component within the component-boundary
          model: host/page parent, sibling relation, and local nesting. This
          section MUST describe component placement only; it MUST NOT be read as
          global hierarchy, file hierarchy, scope hierarchy, or graph hierarchy.
      - id: component_mount_point
        description: >-
          Component entry boundary: slot reference and mount kind
          (mapper-managed | host-static). This section defines the component
          contract mount boundary only; it MUST NOT be read as a filesystem
          mount, a generic runtime mount, or portal semantics outside the
          component-boundary model. When present,
          mounted_child_boundaryRefs declare explicit mounted child component
          boundaries available for boundary-aware drill-in.
      - id: component_input_interface
        description: >-
          Typed inbound contract interface from host/caller into the component
          boundary. It covers data and state supplied through the component
          contract, not arbitrary runtime props outside the contract surface.
      - id: component_output_interface
        description: >-
          Typed outbound contract interface from the component boundary to the
          host/caller. It defines callbacks, emitted events, and canonical
          exits, and is the canonical source for exit semantics in visualization
          and flow projection. Exit entries MUST support stable outcome
          classification and may declare continuation or return targeting.
      - id: component_domain_blocks
        description: >-
          Internal projection content for the component boundary (UI structure,
          behavior, data schema) used after entry and exit interfaces are
          defined.
      - id: component_shared_refs
        description: >-
          Refs to shared contract blocks (GLOSSARY, DATABASE_SCHEMA, RESOURCES)
          for dependency reuse only. These refs MUST NOT override ownership
          boundaries or duplicate shared source-of-truth content.
    section_field_rules:
      component_mount_point:
        required_fields:
          - slotRef
          - mount_kind
        optional_fields:
          - mounted_child_boundaryRefs
        rule: >-
          mounted_child_boundaryRefs declare explicit mounted child component
          boundaries. Cross-component drill-in is allowed only through those
          refs; absent refs mean no child boundary drill-in target is declared
          at this mount boundary.
        example:
          mounted_child_boundaryRefs:
            - "route_details_panel"
      component_output_interface:
        required_exit_entry_fields:
          - id
          - outcome
        optional_exit_entry_fields:
          - target_boundaryRef
          - return_target_boundaryRef
        allowed_outcomes:
          - continue
          - return
          - exit
        outcome_target_rules:
          continue: "Requires target_boundaryRef and forbids return_target_boundaryRef."
          return: "Requires return_target_boundaryRef and forbids target_boundaryRef."
          exit: "Forbids target_boundaryRef and return_target_boundaryRef."
        rule: >-
          outcome classifies the canonical exit. target_boundaryRef and
          return_target_boundaryRef define continuation and return targeting for
          boundary-aware flow projection when present.
        example_exit:
          id: "open_details"
          outcome: "continue"
          target_boundaryRef: "route_details_panel"
      component_shared_refs:
        optional_fields:
          - refs
        rule: >-
          Dependency projection reads shared targets from refs and any nested
          *Ref/*Refs leaves under component_shared_refs only as shared
          dependencies. component_shared_refs MUST NOT target component
          boundaries or smuggle ownership, hierarchy, entry, exit, or mount
          semantics.
    example_component_contract:
      note: "Illustrative source-contract snippet. Visual projection is derived by FRIDA_VISUAL.component_projection."
      component_hierarchy_position:
        parent_boundaryRef: "dashboard_root"
        local_role: "screen_fragment"
      component_mount_point:
        slotRef: "UI_STRUCTURE.dashboard.root.summarySlot"
        mount_kind: "mapper-managed"
        mounted_child_boundaryRefs:
          - "route_details_panel"
      component_input_interface:
        selected_route_id: "string"
        selected_day: "date"
      component_output_interface:
        exits:
          - id: "open_details"
            outcome: "continue"
            target_boundaryRef: "route_details_panel"
          - id: "return_to_dashboard"
            outcome: "return"
            return_target_boundaryRef: "dashboard_root"
      component_domain_blocks:
        summary_stack:
          purpose: "Internal source-contract detail for the current component boundary."
      component_shared_refs:
        refs:
          - "GLOSSARY.route"
          - "RESOURCES.maps_api"
    consistency_rule: >-
      Component contract files MUST use only the canonical section ids listed
      here. Legacy aliases are forbidden unless an explicit versioned migration
      block declares a temporary deprecation window.
    constraint: >-
      Total file size MUST fit in agent context window for task formulation.
      Required sections are interpreted by component boundary semantics first;
      YAML depth and incidental key order are secondary.

FRIDA_INTERFACE_UPDATE_APP_BY_SPEC:
  _visibility: public
  id: frida-interface-update-app-by-spec
  version: 1.0.0
  purpose: "Extend or modify the target application contract based on specification / task description, using only baseline template semantics and already-designed app extensions."
  repository_scope: target_app_repo_only
  mutation_scope: target_app_contract_only
  forbidden_targets:
    - frida_core_contract
    - frida_core_repo_sources
    - frida_tasks_directory
  deployment_scope: public
  input:
    format: natural_language
    context:
      - current_app_contract
      - target_block
      - schema_ref
  output:
    format: yaml
    requires_approval: true
  extension_resolution:
    source_of_truth: "target app contract index links plus Frida-shipped extension layers"
    known_inactive_extension:
      action: HALT
      rule: "If the requested capability is covered by a shipped but inactive extension, do not invent its structure. Return the exact extension ids and layer links required for activation."
    unknown_extension_need:
      action: HALT
      error_code: requires_new_frida_extension
      rule: "If no shipped extension covers the requested capability or implementation, stop instead of synthesizing new backend/vendor structures."
    invention_forbidden:
      - vendor_specific_zones
      - vendor_specific_profiles
      - backend_path_models
      - implementation_specific_tooling_bindings
  version_impact:
    evaluate: always
    rule: "After applying changes, determine affected version domains (contract, schema, package) and bump per FRIDA_VERSION_POLICY."
    ref: FRIDA_VERSION_POLICY
  protocols:
    update:
      description: "Apply changes to the target app contract via structured patch."
      playbook_ref: "templates/management/AGENT-contract-update.md"
      requires_role: ARCHITECT_AGENT
    repair:
      description: "Fix target app contract inconsistencies (broken refs, missing blocks)."
      playbook_ref: "templates/management/AGENT-contract-repair.md"
      requires_role: ARCHITECT_AGENT

FRIDA_INTERFACE_UPDATE_APP_BY_CODE:
  _visibility: public
  id: frida-interface-update-app-by-code
  version: 1.0.0
  purpose: "Extend or repair the target application contract from implemented target application code when code outpaces contract, using only baseline template semantics and already-designed app extensions."
  repository_scope: target_app_repo_only
  mutation_scope: target_app_contract_only
  forbidden_targets:
    - frida_core_contract
    - frida_core_repo_sources
    - frida_tasks_directory
  deployment_scope: public
  input:
    format: source_code
    supported_languages:
      - TypeScript
      - JavaScript
      - HTML
      - CSS
  output:
    format: yaml
    requires_approval: true
  extension_resolution:
    source_of_truth: "target app contract index links plus Frida-shipped extension layers"
    known_inactive_extension:
      action: HALT
      rule: "If code implies a shipped but inactive extension, stop and require explicit extension activation instead of inventing a parallel contract structure."
    unknown_extension_need:
      action: HALT
      error_code: requires_new_frida_extension
      rule: "If code implies a capability with no shipped extension, stop and escalate to Frida self-contract management."
    invention_forbidden:
      - vendor_specific_zones
      - vendor_specific_profiles
      - backend_path_models
      - implementation_specific_tooling_bindings
  version_impact:
    evaluate: always
    rule: "After extracting app contract from code, compare with declared app contract. If new blocks/fields added, bump contract version per FRIDA_VERSION_POLICY."
    ref: FRIDA_VERSION_POLICY
  use_cases:
    - "Onboard existing project to Frida."
    - "Background consistency loop: re-extract app contract from code, diff against declared app contract."

FRIDA_INTERFACE_TASKSET:
  _visibility: public
  id: frida-interface-taskset
  version: 1.0.0
  purpose: "Prepare self-contained task packs from contract for agent execution."
  playbook_ref: "templates/management/AGENT-task-formulation.md"
  task_pack_definition:
    term: >-
      A Task Pack is a self-contained instruction set for an agent-developer.
      It transfers contract requirements into an actionable scope without
      requiring the agent to interpret the wiki or contract directly.
    principle: "CONTRACT → ANTITASK → DEVELOPMENT"
    required_fields:
      - action: "What to do — concrete, unambiguous."
      - files: "Paths or zones affected."
      - interface_ref: "Source interface that authorizes the task output."
      - profile_id: "Id from the repository-scoped profile block."
      - contract_requirements: "Guards/invariants/terms embedded explicitly."
      - verification_command: "Usually 'npm run verify', may differ by zone."
    optional_fields:
      - specific_invariants: "Task-specific invariant checks."
    forbidden: "Referencing wiki or contract by link instead of embedding requirements."
  output_bindings:
    frida_core:
      interface_ref: FRIDA_INTERFACE_SELF_CONTRACT_MANAGEMENT
      repository_scope: frida_repo_only
      file_pattern: "frida-tasks/TASK-*.md"
      rule: "This is the only allowed task output surface inside the Frida repo."
    target_app:
      interface_refs:
        - FRIDA_INTERFACE_UPDATE_APP_BY_SPEC
        - FRIDA_INTERFACE_UPDATE_APP_BY_CODE
      repository_scope: target_app_repo_only
      frida_repo_output: forbidden
  readiness_checklist:
    contract_ready:
      - "Feature described in the appropriate contract:* block."
      - "All terms used in the task defined in contract:GLOSSARY."
    frida_ready:
      - "Zone for target files exists in the repository-scoped zone block (`ZONES` in target repos, private internal-zone block in repo `frida`)."
      - "Antitask generated after last contract update."
      - "Repository-scoped profile covers target paths via edit_allow/edit_allowGlobRefs."
      - "Profile invariants are current for the task."
    version_check:
      - "Contract version matches CONTRACT_META.version (FRIDA_VERSION_POLICY.invariants.version.contract_meta_sync)."
      - "Schema version consistent across all sources (FRIDA_VERSION_POLICY.invariants.version.schema_sync)."
    scope_check:
      - "Task does not add functionality beyond what is described in contract."
      - "If new functionality needed — update contract first."
      - "If task semantics require a shipped but inactive app extension, task formulation MUST HALT and require explicit extension activation."
      - "Task output path matches the repository scope of interface_ref."
  audit_task_format:
