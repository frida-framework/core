name: Publish @sistemado/frida

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish package
        run: |
          VERSION=$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).version")
          if [[ "$VERSION" == *-* ]]; then
            npm publish --tag alpha
          else
            npm publish
          fi
