# ─── FRIDA CONTRACT INDEX ────────────────────────────────────────────────────────
# Modular entry point for the Frida core contract.
# Each layer is a separate YAML file in core-contract/layers/.
# Blocks list declares all top-level keys exported by the layer.
# ──────────────────────────────────────────────────────────────────────────────

schema_version: "6.1"
contract_id: "FRIDA_CORE_CONTRACT"
version: "5.2.0"

layers:
  - id: identity
    path: core-contract/layers/FL01-identity.yaml
    visibility: private
    keywords:
      - contract-meta
      - uniqueness
      - core-assembly
    blocks:
      - CONTRACT_META
      - CONTRACT_UNIQUENESS
      - meta
      - core

  - id: architecture
    path: core-contract/layers/FL02-architecture.yaml
    visibility: private
    keywords:
      - adr
      - principles
      - schema-support
    blocks:
      - FRIDA_SCHEMA_SUPPORT
      - FRIDA_ARCHITECTURE_DECISIONS
      - FRIDA_FOUNDATION_PRINCIPLES

  - id: infrastructure
    path: core-contract/layers/FL03-infrastructure.yaml
    visibility: mixed
    keywords:
      - zones
      - assembly
      - refs
      - routing
    blocks:
      - FRIDA_ASSEMBLY_PROTOCOL
      - FRIDA_REFS
      - ZONES
      - INT_FRIDA_ZONES

  - id: core-configuration
    path: core-contract/layers/FL04-core-configuration.yaml
    visibility: mixed
    keywords:
      - config
      - settings
      - paths
      - runtime-config
      - docs
    blocks:
      - PATHS
      - FRIDA_CONFIG_SPEC
      - FRIDA_CONFIG
      - FRIDA_RUNTIME_CONFIG
      - FRIDA_ROOT_LAYOUT_POLICY
      - FRIDA_CONFIG_FIELD_DOCS

  - id: agent-framework
    path: core-contract/layers/FL05-agent-framework.yaml
    visibility: private
    keywords:
      - profiles
      - enforcement
      - lifecycle
    blocks:
      - FRIDA_TASK_PROFILES
      - FRIDA_ENFORCEMENT
      - FRIDA_AGENT_LIFECYCLE
      - FRIDA_ENFORCEMENT_TYPES
      - FRIDA_VALIDATION_RULES

  - id: reporting
    path: core-contract/layers/FL06-reporting.yaml
    visibility: private
    keywords:
      - reporting
      - validation
    blocks:
      - FRIDA_REPORTING
      - FRIDA_VALIDATION_CHECKLIST

  - id: cli
    path: core-contract/layers/FL07-cli.yaml
    visibility: mixed
    keywords:
      - cli
      - integrity
      - integration
    blocks:
      - FRIDA_TEMPLATE_INTEGRITY
      - FRIDA_TEMPLATE_HASH_TOOL
      - FRIDA_CLI

  - id: buildtime
    path: core-contract/layers/FL08-buildtime.yaml
    visibility: public
    keywords:
      - buildtime
      - generator
      - mapper
    blocks:
      - FRIDA_GENERATOR
      - FRIDA_MAPPER_MODEL

  - id: bootstrap
    path: core-contract/layers/FL09-bootstrap.yaml
    visibility: public
    keywords:
      - bootstrap
      - reconcile
      - warm
      - deploy
      - package-manifest
    blocks:
      - FRIDA_CONTRACT_BOOTSTRAP
      - FRIDA_BOOTSTRAP_SURFACE_POLICY
      - FRIDA_BOOTSTRAP_PACKAGE_MANIFEST
      - FRIDA_APP_TEMPLATE_MODEL

  - id: visualization
    path: core-contract/layers/FL10-visualization.yaml
    visibility: public
    keywords:
      - visual
      - overlay
      - lod
    blocks:
      - FRIDA_VISUAL

  - id: management
    path: core-contract/layers/FL11-management.yaml
    visibility: mixed
    keywords:
      - management
      - interfaces
      - self-contract
      - app-contract
      - guard-spec
      - antitask
    blocks:
      - FRIDA_GUARD_SPEC
      - FRIDA_INVARIANT_SPEC
      - FRIDA_ANTITASK_SPEC
      - FRIDA_INTERFACE_VERIFY
      - FRIDA_INTERFACE_AUDIT
      - FRIDA_INTERFACE_SELF_CONTRACT_MANAGEMENT
      - FRIDA_INTERFACE_UPDATE_APP_BY_SPEC
      - FRIDA_INTERFACE_UPDATE_APP_BY_CODE
      - FRIDA_INTERFACE_TASKSET
      - FRIDA_VERSION_POLICY

  - id: agent-entry
    path: core-contract/layers/FL13-agent-entry.yaml
    visibility: mixed
    keywords:
      - agents
      - routing
      - entrypoint
      - clauses
      - profiles
    blocks:
      - FRIDA_AGENT_ENTRY_PROTOCOL
      - FRIDA_INTERFACE_ROUTING
      - FRIDA_INT_AGENT_ROUTING
      - FRIDA_CLAUSE_INDEX

  - id: wiki
    path: core-contract/layers/FL12-wiki.yaml
    visibility: public
    keywords:
      - wiki
      - ssot
      - synchronization
    blocks:
      - FRIDA_WIKI_MECHANICS
