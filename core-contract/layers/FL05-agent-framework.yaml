# ─── FRIDA LAYER FL05: AGENT FRAMEWORK ──────────────────────────────────────

FRIDA_TASK_PROFILES:
  _visibility: private
  id: frida-task-profiles
  version: 1.0.0
  frida_governance:
    role: ARCHITECT_AGENT
    keywords:
      - governance
      - contract
      - frida
      - self-contract
    invariants: []
    security:
      read_allow:
        - "core-tasks/**"
        - "contract/**"
        - "schemas/**"
        - "src/**"
        - "templates/**"
        - "README.md"
        - "package.json"
        - ".frida/AGENTS.md"
        - ".frida/config.yaml"
        - ".frida/templates/config.template.yaml"
        - ".frida/contract/**"
        - ".frida/reports/*.yaml"
      edit_allow:
        - "contract/**"
        - "schemas/**"
        - "src/**"
        - "templates/**"
        - "README.md"
        - "package.json"
        - "core-tasks/README.md"
      create_allow:
        - ".frida/reports/*.yaml"
      forbid:
        - ".frida/inbox/**"
        - "tasks/**"
      edit_forbid:
        - ".frida/**"
        - "core-tasks/TASK-*.md"
        - "core-tasks/**/TASK-*.md"
        - "tasks/**"
        - ".frida/reports/*.yaml"
  frida_task_setter:
    role: TASK_SETTER_AGENT
    keywords:
      - task
      - formulation
      - spec
      - core-tasks
    invariants:
      - no_scope_creep
    security:
      read_allow:
        - "core-tasks/**"
        - "contract/**"
        - "schemas/**"
        - "templates/management/**"
      create_allow:
        - "core-tasks/TASK-*.md"
        - ".frida/reports/*.yaml"
      edit_allow: []
      forbid:
        - ".frida/inbox/**"
        - "tasks/**"
      edit_forbid:
        - "core-tasks/TASK-*.md"
        - "core-tasks/**/TASK-*.md"
        - ".frida/reports/*.yaml"
        - "core-tasks/README.md"
        - "tasks/**"
  frida_readonly_observer:
    role: READONLY_AGENT
    keywords:
      - observe
      - review
      - audit
    invariants:
      - contract_not_runtime
    security:
      read_allow:
        - "**"
      edit_allow: []
      create_allow:
        - ".frida/reports/*.yaml"
      forbid:
        - ".frida/inbox/**"
        - "tasks/**"
      edit_forbid:
        - "core-tasks/TASK-*.md"
        - "core-tasks/**/TASK-*.md"
        - ".frida/reports/*.yaml"
        - "**"

FRIDA_ENFORCEMENT:
  _visibility: private
  id: frida-enforcement
  version: 1.0.0
  invariants:
    - id: contract_entity_single_declaration
      text: "Any active contract entity MUST be declared exactly once. Duplicate declarations and semantic aliases are forbidden."
      scope: kernel
    - id: visual_overlay_only
      text: "Visual artifacts are derived overlays and must not become source-of-truth contract state."
      scope: kernel
    - id: visual_on_demand
      text: "Visual artifacts are refreshed only by explicit visual commands."
      scope: kernel
    - id: visual_determinism
      text: "Same contract input MUST produce identical visual overlay output."
      scope: kernel
    - id: temp_dot_temp_only
      text: "Temporary files MUST reside in .temp/ directories and never in working tree root."
      scope: kernel
    - id: temp_ephemeral_session
      text: "Temporary artifacts are ephemeral to a single session; no cross-session dependency allowed."
      scope: kernel
    - id: error_explicit
      text: "Error conditions MUST be explicit. Silent failures are forbidden."
      scope: kernel
    - id: no_scope_creep
      text: "Agent MUST NOT exceed the scope defined by its profile security permissions."
      scope: kernel
    - id: contract_not_runtime
      text: "Contract is a build-time/design-time artifact. Runtime state MUST NOT be stored in contract."
      scope: kernel
    - id: agent_session_exclusive
      text: "Only one agent session token may be active per branch at any time."
      scope: kernel
    - id: bootstrap_component_restore_idempotent
      text: "Explicit bootstrap component-reconcile/component-restore mode is idempotent and restores or normalizes selected components without duplication."
      scope: kernel
    - id: bootstrap_manual_only
      text: "Contract bootstrap MUST run only via explicit bootstrap CLI invocation and MUST NOT be auto-invoked by other commands."
      scope: kernel
    - id: bootstrap_warm_first_default
      text: "Default contract bootstrap mode is warm reconcile for an existing Frida deployment; missing Frida markers must HALT with explicit cold/demo redirect."
      scope: kernel
    - id: bootstrap_demo_zero_deploy_only
      text: "Demo bootstrap mode is explicit-only and zero-deploy-only."
      scope: kernel
    - id: bootstrap_no_app_contract_writes
      text: "Warm and cold-engine bootstrap modes MUST NOT modify app-contract files."
      scope: kernel
    - id: frida_inbox_no_agent_access
      text: "Agents MUST NOT use `.frida/inbox/**` as a general-purpose work surface. Direct edits are allowed only under `.frida/inbox/app-contract/**` through `FRIDA_INTERFACE_UPDATE_APP_BY_SPEC` or `FRIDA_INTERFACE_UPDATE_APP_BY_CODE` using the interface-scoped `app_contract_editor` profile; all other consumers use `.frida/contract/app/**` or read-only Frida surfaces."
      scope: kernel
    - id: zone_resolution_path_only
      text: "Zone is resolved ONLY by path matching, never by profile keywords or heuristics."
      scope: kernel
    - id: guard_chain_structural
      text: "Guard chain enforcement verifies structural contract conformance, not runtime behavior."
      scope: kernel
    - id: report_on_every_run
      text: "Every agent run MUST produce a job report, regardless of outcome."
      scope: kernel
    - id: interfaces_default_public
      text: "FRIDA_INTERFACE_* blocks are public unless `_visibility: private` is explicitly declared."
      scope: kernel
    - id: private_interfaces_not_deployed
      text: "Private interfaces MUST NOT be projected into target-repo Frida contract mirrors."
      scope: kernel
    - id: frida_tasks_core_repo_only
      text: "`core-tasks/` is a Frida-core-only task surface. It MUST NOT be created or read outside the Frida repo."
      scope: kernel
    - id: tasks_dir_forbidden_in_frida_core
      text: "`tasks/` is forbidden as a task surface inside the Frida repo."
      scope: kernel
    - id: int_frida_zones_private
      text: "`INT_FRIDA_ZONES` is a private Frida-core-only routing block. It MUST NOT be projected into target repos."
      scope: kernel
    - id: layer_file_prefixes_repository_scoped
      text: "Frida core layer files MUST use `FL##-*.yaml`; Frida-managed app layer files MUST use `AL##-*.yaml`."
      scope: kernel
    - id: app_template_basic_neutral
      text: "`template_app_basic` MUST remain vendor-neutral and MUST NOT declare backend or implementation-specific app surfaces by default."
      scope: kernel
    - id: app_template_basic_derivative_only
      text: "`template_app_basic` is a shipped derivative baseline and MUST NOT define unique normative Frida semantics absent from core contract or bootstrap policy."
      scope: kernel
    - id: target_delivery_no_internal_authoring_surfaces
      text: "Target app delivery MUST NOT expose framework authoring surfaces or source-path refs except for the public runtime config template `.frida/templates/config.template.yaml` and the app-contract SSOT authoring surface `.frida/inbox/app-contract/**` used by the public app-contract update interfaces."
      scope: kernel
    - id: interface_instruction_surfaces_seed_then_user_owned
      text: "Public interface-instruction surfaces in target repos are seeded by Frida once and then remain user-owned in form; Frida validates only normative completeness against the backing interface."
      scope: kernel
    - id: engine_instruction_surfaces_strict
      text: "AGENTS.md, generated router/profile surfaces, and contractual zone AGENTS.md are engine-managed invariant instruction surfaces and remain overwriteable/regenerable by Frida."
      scope: kernel
    - id: app_extensions_link_driven
      text: "App extensions are active only when their AL## layer is linked in the target app contract index. Presence of inactive extension files alone has no effect."
      scope: kernel
    - id: app_update_interfaces_non_inventive
      text: "FRIDA_INTERFACE_UPDATE_APP_BY_SPEC and FRIDA_INTERFACE_UPDATE_APP_BY_CODE MUST operate only within baseline or already-designed app extensions and MUST NOT invent new backend/vendor structures."
      scope: kernel
    - id: strict_path_refs
      text: "Literal paths are forbidden outside the PATHS block. Keys MUST end in *Ref."
      scope: kernel
    - id: app_paths_filesystem_facts_only
      text: "In active app contracts, PATHS MUST store concrete filesystem facts only. Semantic roles, ownership, and lifecycle MUST live outside PATHS."
      scope: kernel
    - id: app_path_surfaces_required
      text: "Active app contracts MUST declare PATH_SURFACES as the ownership/lifecycle companion to PATHS."
      scope: kernel
    - id: app_path_alias_zero
      text: "Active app contracts MUST NOT declare the same concrete filesystem path under multiple active PATHS keys."
      scope: kernel
    - id: app_demote_or_split
      text: "If a top-level app entity cannot maintain a stable name -> boundary -> refs coupling, it MUST be demoted to a local/shared block or split into canonical entities."
      scope: kernel
    - id: app_wiki_mechanics_core_owned
      text: "App contracts MAY store wiki-specific app data, but FRIDA_WIKI_MECHANICS and APP_CONTRACT_SSOT remain core-owned and MUST NOT be re-declared in active app structured data."
      scope: kernel
    - id: schema_version_fixed
      text: >-
        All index documents MUST declare schema_version and it MUST equal
        FRIDA_SCHEMA_SUPPORT.schema_version.supported.
    - id: index_format_symmetric
      text: >-
        FRIDA_INDEX and APP_INDEX MUST use identical index format and the same
        schema.index/schema.assembled paths.
    - id: exports_are_authoritative
      text: >-
        Index layers[].exports MUST be the authoritative registry of defined blocks
        (id+key+path).
    - id: refs_resolve_via_exports
      text: >-
        Every Ref/Refs MUST resolve to exactly one exported id in the merged exports
        registry.
    - id: guard_format_uniform
      text: "Every guards[] entry MUST conform to FRIDA_GUARD_SPEC.guard_format."
    - id: invariant_format_uniform
      text: "Every invariants[] entry MUST conform to FRIDA_INVARIANT_SPEC.invariant_format."
    - id: ids_neutral
      text: >-
        Identifiers MUST be neutral snake_case and MUST NOT contain profanity or
        jokes.
    - id: no_secondary_id_fields
      text: >-
        Contract blocks MUST NOT contain secondary migration-only id fields; use
        source_ref if provenance must be preserved.
    - id: contract_uniformity
      text: "Contract MUST be structured and uniform across blocks."
    - id: rules_are_prominent
      text: "Guards and invariants MUST be explicit and easy to extract."
    - id: no_interface_spec
      text: "UI/CLI interfaces are out of contract scope and may evolve independently."
    - id: component_boundary_sections_complete
      text: "Component-level contracts MUST declare the full canonical component_* boundary surface."
      scope: kernel
    - id: component_boundary_refs_resolve
      text: "Mounted child boundary refs and continuation/return targets MUST resolve when declared."
      scope: kernel
    - id: component_root_parent_rule
      text: "Root boundaries MAY omit parent_boundaryRef; non-root boundaries MUST resolve a valid parent boundary when required by the model."
      scope: kernel
    - id: component_host_root_anchor
      text: "If a boundary declares local_role=host_root, it MUST be the unique null-parent depth=0 anchor and all other boundaries in that app baseline MUST resolve upward to it."
      scope: kernel
    - id: component_mounted_child_unique_non_self
      text: "mounted_child_boundaryRefs MUST be unique per boundary, MUST NOT target the current boundary, and MUST NOT create ambiguous drill-in declarations."
      scope: kernel
    - id: component_output_exit_semantics_canonical
      text: "component_output_interface exit entries MUST declare outcomes and remain the canonical source for exit semantics."
      scope: kernel
    - id: component_output_exit_target_matrix
      text: "continue requires target_boundaryRef, return requires return_target_boundaryRef, and exit forbids both."
      scope: kernel
    - id: component_child_non_auto_expand
      text: "Mounted child internals MUST remain collapsed in the parent specification view until explicit drill-in."
      scope: kernel
    - id: component_domain_blocks_selector_driven
      text: "component_domain_blocks MUST project only through explicit projection_domains selectors on top-level child blocks; heuristics are forbidden."
      scope: kernel
    - id: component_shared_refs_dependency_only
      text: "component_shared_refs MUST remain dependency-only and MUST NOT redefine ownership or boundary semantics."
      scope: kernel
    - id: component_authoritative_examples_runtime_free
      text: "Authoritative component-contract examples MUST remain runtime-free; viewer/session demo state is allowed only in explicit fixture-only surfaces."
      scope: kernel
    - id: component_legacy_namespace_forbidden
      text: "Legacy component-boundary section names are forbidden in active contract definitions unless explicitly historical/deprecated."
      scope: kernel
    - id: component_boundary_visual_primary
      text: "Component boundary semantics are the primary visual interpretation unit; YAML depth is secondary."
      scope: kernel
  policies:
    - id: GUARD_CONTRACT_SCHEMA_FIRST
      kind: chain
      statement: "Contract processing must remain schema-first."
      enforcement: hard
    - id: GUARD_CONTRACT_SOURCE_DECLARED
      kind: chain
      statement: "Contract source is limited to files declared in PATHS and contracticalSourceBlocks."
      enforcement: hard
    - id: GUARD_APP_PATHS_FILESYSTEM_ONLY
      kind: chain
      statement: "Active app PATHS must contain filesystem facts only and use canonical Dir/File/Glob/Pattern leaf names."
      enforcement: hard
    - id: GUARD_APP_PATH_SURFACES_REQUIRED
      kind: chain
      statement: "Active app contracts must declare PATH_SURFACES to separate authority/lifecycle from PATHS."
      enforcement: hard
    - id: GUARD_APP_PATH_ALIAS_ZERO
      kind: ban
      statement: "Active app contracts must not publish duplicate PATHS aliases for the same concrete filesystem path."
      enforcement: hard
    - id: GUARD_APP_WIKI_MECHANICS_CORE_OWNED
      kind: ban
      statement: "Active app contracts must not duplicate core-owned wiki/SSOT mechanics outside the permitted app wiki data surface."
      enforcement: hard
    - id: GUARD_CONTRACT_NOT_RUNTIME
      kind: ban
      statement: "Contract MUST NOT contain runtime state or mutable data."
      enforcement: hard
    - id: GUARD_ARTIFACT_NO_MANUAL_EDITS
      kind: nail
      statement: "Generated artifacts (.frida/contract/profiles/, .frida/contract/AGENTS.md, .frida/contract/docs/) must not be manually edited."
      enforcement: warn
    - id: GUARD_WORKSPACE_TEMP_ONLY
      kind: ban
      statement: "Temporary files must reside in .temp/ directories."
      enforcement: hard
    - id: GUARD_FRIDA_INTERNAL_NO_AGENT
      kind: ban
      statement: "Agent MUST NOT directly modify .frida/contract/internal/ contents."
      enforcement: hard
    - id: GUARD_FRIDA_INBOX_NO_AGENT
      kind: ban
      statement: "Agents MUST NOT directly access `.frida/inbox/**`; inbox is protected inbound/SSOT surface."
      enforcement: hard
    - id: GUARD_SESSION_REPORT_REQUIRED
      kind: chain
      statement: "Every agent run MUST produce a job report in .frida/reports/."
      enforcement: warn
    - id: GUARD_VISUAL_DETERMINISM
      kind: drift
      statement: "Visual overlay generation MUST be deterministic."
      enforcement: hard
    - id: GUARD_ZONE_AGENTS_MD
      kind: chain
      statement: "Each zone MUST have a contractical AGENTS.md at its agentsPath."
      enforcement: warn
    - id: GUARD_TEMPLATE_INTEGRITY
      kind: nail
      statement: "Template hash manifest must validate; drift returns non-zero."
      enforcement: hard
    - id: GUARD_BOOTSTRAP_EXPLICIT_ONLY
      kind: chain
      statement: "Bootstrap is manual-only and must not be invoked transitively by other commands."
      enforcement: hard
    - id: GUARD_BOOTSTRAP_ZERO_DEPLOY_ONLY
      kind: chain
      statement: "Demo bootstrap is explicit-only and zero-deploy-only; full bootstrap defaults to warm reconcile."
      enforcement: hard
    - id: GUARD_BOOTSTRAP_COMPONENT_RESTORE_IDEMPOTENT
      kind: chain
      statement: "Explicit bootstrap component-restore re-run must not duplicate existing components."
      enforcement: hard
    - id: GUARD_SESSION_EXCLUSIVE
      kind: session
      statement: "Only one active session token per branch."
      enforcement: hard
    - id: GUARD_ANTITASK_VALIDATE_PHASE
      kind: chain
      statement: >-
        VALIDATE_ANTITASK phase MUST run before EXECUTE. Run report MUST include
        verification.antitask per FRIDA_ANTITASK_SPEC.report_proof.
      enforcement: hard
      spec_ref: FRIDA_ANTITASK_SPEC
    - id: GUARD_COMPONENT_BOUNDARY_SECTIONS_COMPLETE
      kind: chain
      statement: "Component-level contracts MUST declare all canonical component_* boundary sections."
      enforcement: hard
    - id: GUARD_COMPONENT_BOUNDARY_REFS_RESOLVE
      kind: chain
      statement: "Mounted child boundary refs and continuation/return targets MUST resolve when declared."
      enforcement: hard
    - id: GUARD_COMPONENT_ROOT_PARENT_RULE
      kind: chain
      statement: "Root boundaries MAY omit parent_boundaryRef; non-root boundaries MUST resolve a valid parent boundary when required by the model."
      enforcement: hard
    - id: GUARD_COMPONENT_HOST_ROOT_ANCHOR
      kind: chain
      statement: "If local_role=host_root is present, it MUST be unique, MUST omit parent_boundaryRef, and MUST act as the single depth=0 anchor for the host baseline."
      enforcement: hard
    - id: GUARD_COMPONENT_MOUNTED_CHILD_UNIQUE_NON_SELF
      kind: ban
      statement: "mounted_child_boundaryRefs MUST be unique, MUST NOT self-target, and MUST NOT create ambiguous child drill-in declarations."
      enforcement: hard
    - id: GUARD_COMPONENT_EXIT_SEMANTICS_COMPLETE
      kind: chain
      statement: "component_output_interface exit entries MUST include required outcome semantics."
      enforcement: hard
    - id: GUARD_COMPONENT_EXIT_TARGET_MATRIX
      kind: chain
      statement: "continue requires target_boundaryRef, return requires return_target_boundaryRef, and exit forbids both."
      enforcement: hard
    - id: GUARD_COMPONENT_CHILD_BOUNDARY_NO_INLINE
      kind: chain
      statement: "Parent specification view MUST NOT inline mounted child internals; child expansion requires explicit drill-in."
      enforcement: hard
    - id: GUARD_COMPONENT_DOMAIN_BLOCK_SELECTOR_DRIVEN
      kind: drift
      statement: "component_domain_blocks projection MUST remain selector-driven on explicit projection_domains declarations and MUST NOT use heuristics."
      enforcement: hard
    - id: GUARD_COMPONENT_SHARED_REFS_DEPENDENCY_ONLY
      kind: ban
      statement: "component_shared_refs MUST remain dependency-only and MUST NOT carry ownership, hierarchy, entry, or exit semantics."
      enforcement: hard
    - id: GUARD_COMPONENT_AUTHORITATIVE_EXAMPLE_RUNTIME_FREE
      kind: ban
      statement: "Authoritative component-contract examples MUST remain runtime-free; viewer/session demo state is allowed only in explicit fixture-only reference surfaces."
      enforcement: hard
    - id: GUARD_COMPONENT_LEGACY_TERMS_FORBIDDEN
      kind: ban
      statement: "Legacy component-boundary section names are forbidden in active contract definitions."
      enforcement: hard
    - id: GUARD_COMPONENT_MIXED_NAMESPACE_FORBIDDEN
      kind: ban
      statement: "Mixed legacy/new component-boundary namespace usage is forbidden in active component contract definitions."
      enforcement: hard
    - id: GUARD_APP_DEMOTE_OR_SPLIT
      kind: chain
      statement: "If a top-level app entity cannot sustain canonical name -> boundary -> refs coupling, it must be demoted or split rather than retained as an ambiguous boundary."
      enforcement: hard
    - id: GUARD_COMPONENT_VISUAL_BOUNDARY_FIRST
      kind: drift
      statement: "Visualization semantics MUST remain boundary-first, with YAML depth secondary and exits sourced from component_output_interface."
      enforcement: hard
  triggers:
    - id: schema_version_missing
      trigger: schema_version_missing
      action: HALT
      error_code: SCHEMA_VERSION_MISSING
    - id: schema_version_not_supported
      trigger: schema_version_not_supported
      action: HALT
      error_code: SCHEMA_VERSION_NOT_SUPPORTED
    - id: schema_version_mismatch
      trigger: schema_version_mismatch
      action: HALT
      error_code: SCHEMA_VERSION_MISMATCH
    - id: invalid_layer_path
      trigger: invalid_layer_path
      action: HALT
      error_code: INVALID_LAYER_PATH
    - id: duplicate_layer_id
      trigger: duplicate_layer_id
      action: HALT
      error_code: DUPLICATE_LAYER_ID
    - id: duplicate_layer_path
      trigger: duplicate_layer_path
      action: HALT
      error_code: DUPLICATE_LAYER_PATH
    - id: missing_layer_exports
      trigger: missing_layer_exports
      action: HALT
      error_code: MISSING_LAYER_EXPORTS
    - id: duplicate_export_id
      trigger: duplicate_export_id
      action: HALT
      error_code: DUPLICATE_EXPORT_ID
    - id: unknown_top_level_key
      trigger: unknown_top_level_key
      action: HALT
      error_code: UNKNOWN_TOP_LEVEL_KEY
    - id: ref_target_not_found
      trigger: ref_target_not_found
      action: HALT
      error_code: REF_TARGET_NOT_FOUND
    - id: ref_target_ambiguous
      trigger: ref_target_ambiguous
      action: HALT
      error_code: REF_TARGET_AMBIGUOUS
    - id: id_contains_profanity
      trigger: id_contains_profanity
      action: HALT
      error_code: ID_CONTAINS_PROFANITY
    - id: version_not_semver
      trigger: version_not_semver
      action: HALT
      error_code: VERSION_NOT_SEMVER
    - id: antitask_verification_missing
      trigger: antitask_verification_missing
      action: HALT
      error_code: ANTITASK_VERIFICATION_MISSING
    - id: component_boundary_section_missing
      trigger: component_boundary_section_missing
      action: HALT
      error_code: COMPONENT_BOUNDARY_SECTION_MISSING
    - id: component_boundary_ref_unresolved
      trigger: component_boundary_ref_unresolved
      action: HALT
      error_code: COMPONENT_BOUNDARY_REF_UNRESOLVED
    - id: component_output_exit_outcome_missing
      trigger: component_output_exit_outcome_missing
      action: HALT
      error_code: COMPONENT_OUTPUT_EXIT_OUTCOME_MISSING
    - id: component_parent_child_inline_violation
      trigger: component_parent_child_inline_violation
      action: HALT
      error_code: COMPONENT_PARENT_CHILD_INLINE_VIOLATION
    - id: component_shared_refs_boundary_override
      trigger: component_shared_refs_boundary_override
      action: HALT
      error_code: COMPONENT_SHARED_REFS_BOUNDARY_OVERRIDE
    - id: component_legacy_term_detected
      trigger: component_legacy_term_detected
      action: HALT
      error_code: COMPONENT_LEGACY_TERM_DETECTED
    - id: component_namespace_mixed
      trigger: component_namespace_mixed
      action: HALT
      error_code: COMPONENT_NAMESPACE_MIXED
    - id: component_visual_semantics_drift
      trigger: component_visual_semantics_drift
      action: HALT
      error_code: COMPONENT_VISUAL_SEMANTICS_DRIFT
  antitask_spec_ref: FRIDA_ANTITASK_SPEC

FRIDA_AGENT_LIFECYCLE:
  _visibility: private
  id: frida-agent-lifecycle
  version: 1.0.0
  phases:
    - id: LOAD_ROUTER
      action: "Load the root routing contract from ROUTER.xml before selecting interface or profile."
    - id: RESOLVE_INTERFACE
      action: "Resolve the management interface first, using repository-scoped routing rules."
    - id: LOAD_PROFILE
      action: "Resolve the repository-scoped profile block allowed for the selected interface, then load permissions and invariants."
    - id: ROUTE_ZONE
      action: "Resolve zone from working directory path using the repository-scoped zone block. Load contractual zone AGENTS.md."
    - id: VALIDATE_ANTITASK
      action: "Verify that the task does not violate invariants or guards."
    - id: EXECUTE
      action: "Execute within permission boundaries (read/edit/create/forbid paths)."
    - id: VERIFY
      action: "Run deterministic verification commands. Check zone-scoped changes."
    - id: REPORT
      action: "Emit job report for SUCCESS or HALT."
  phase_invariants:
    - "no_profile_match MUST HALT"
    - "Interface resolution happens before profile resolution"
    - "Contractical zone AGENTS.md path resolution is zone-driven"
    - "No writes outside explicit edit/create permissions"
  session:
    purpose: "Enforce synchronous sequential development through exclusive agent access."
    token_mechanism:
      acquire:
        precondition: "Clean branch, no uncommitted changes."
        action: "Create session token file at .frida/contract/internal/session.lock"
        content:
          - agent_id
          - branch
          - acquired_at
          - zone_id
          - timeout_minutes
      release:
        action: "Remove session token file."
        final_action: "Create PR or explicit release."
      timeout:
        default_minutes: 30
        recovery: "If token not released within timeout, trigger routing regeneration and release."
    zone_scope_hard_check:
      enabled: true
      action: "After execution, verify that all file changes are within the target zone pathGlob."
      on_violation: "Rollback changes outside target zone. Emit HALT report."
    lifecycle:
      - step: acquire_token
        precondition: "No active token on branch."
      - step: execute_within_zone
        constraint: "All mutations scoped to zone pathGlob."
      - step: verify
        action: "Run zone-specific verification."
      - step: create_pr
        action: "Open PR with session report attached."
      - step: release_token
        action: "Remove session lock."
  interaction_modes:
    architect:
      description: "Full access to contract management, visual loop, and contract interfaces."
      allowed_operations:
        - contract_update
        - visual_build
        - contract_manage
        - contract_bootstrap
    developer:
      description: "Scoped access to implementation within zone boundaries."
      allowed_operations:
        - execute_within_zone
        - verify
        - report
  forbidden_actions_ref: FRIDA_ANTITASK_SPEC.antitasks
  antitask_spec_ref: FRIDA_ANTITASK_SPEC

FRIDA_ENFORCEMENT_TYPES:
  _visibility: public
  id: frida-enforcement-types
  version: 2.0.0
  types:
    nail: "Tamper-evidence via signatures and hash manifests."
    chain: "Structural contract conformance verification."
    ban: "Forbidden pattern scan and rejection."
    drift: "Generated output freshness and determinism drift checks."
    session: "Token-based exclusive access enforcement."

FRIDA_VALIDATION_RULES:
  _visibility: private
  id: frida-validation-rules
  version: 1.0.0
  purpose: "Domain-grouped guard references for structured validation."
  contract_consistency:
    - GUARD_CONTRACT_SCHEMA_FIRST
    - GUARD_CONTRACT_SOURCE_DECLARED
    - GUARD_CONTRACT_NOT_RUNTIME
    - GUARD_COMPONENT_BOUNDARY_SECTIONS_COMPLETE
    - GUARD_COMPONENT_BOUNDARY_REFS_RESOLVE
    - GUARD_COMPONENT_ROOT_PARENT_RULE
    - GUARD_COMPONENT_HOST_ROOT_ANCHOR
    - GUARD_COMPONENT_MOUNTED_CHILD_UNIQUE_NON_SELF
    - GUARD_COMPONENT_EXIT_SEMANTICS_COMPLETE
    - GUARD_COMPONENT_EXIT_TARGET_MATRIX
    - GUARD_COMPONENT_SHARED_REFS_DEPENDENCY_ONLY
    - GUARD_COMPONENT_AUTHORITATIVE_EXAMPLE_RUNTIME_FREE
    - GUARD_COMPONENT_LEGACY_TERMS_FORBIDDEN
    - GUARD_COMPONENT_MIXED_NAMESPACE_FORBIDDEN
  repo_guards:
    - GUARD_ARTIFACT_NO_MANUAL_EDITS
    - GUARD_WORKSPACE_TEMP_ONLY
    - GUARD_FRIDA_INTERNAL_NO_AGENT
    - GUARD_FRIDA_INBOX_NO_AGENT
    - interfaces_default_public
    - private_interfaces_not_deployed
    - frida_tasks_core_repo_only
    - tasks_dir_forbidden_in_frida_core
    - int_frida_zones_private
  layer_guards:
    - guard_chain_structural
    - schema_version_fixed
    - index_format_symmetric
    - exports_are_authoritative
    - refs_resolve_via_exports
  visual_guards:
    - GUARD_VISUAL_DETERMINISM
    - GUARD_COMPONENT_CHILD_BOUNDARY_NO_INLINE
    - GUARD_COMPONENT_DOMAIN_BLOCK_SELECTOR_DRIVEN
    - GUARD_COMPONENT_VISUAL_BOUNDARY_FIRST
    - visual_overlay_only
    - visual_on_demand
    - visual_determinism
  session_guards:
    - GUARD_SESSION_EXCLUSIVE
    - GUARD_SESSION_REPORT_REQUIRED
    - agent_session_exclusive
  template_guards:
    - GUARD_TEMPLATE_INTEGRITY
    - GUARD_BOOTSTRAP_EXPLICIT_ONLY
    - GUARD_BOOTSTRAP_ZERO_DEPLOY_ONLY
    - GUARD_BOOTSTRAP_COMPONENT_RESTORE_IDEMPOTENT
  antitask_guards:
    - GUARD_ANTITASK_VALIDATE_PHASE
