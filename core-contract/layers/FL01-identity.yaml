# ─── FRIDA LAYER FL01: IDENTITY & META ───────────────────────────────────────

CONTRACT_META:
  _visibility: private
  id: frida-contract-meta
  version: 5.2.0
  owner: frida-core
  updated_at: "2026-03-09"
  scope:
    repository: hanszel/frida
    package: "@sistemado/frida"
    purpose: >-
      Schema-driven generation engine, zone enforcement, visual overlay extraction,
      agent session control, and warm-first Frida bootstrap/reconcile with explicit demo seeding mode.
    interface_term: "In Frida, 'interface' means a management-layer normative contract block that defines an allowed operation class, repository scope, mutation scope, required concepts, rules, invariants, guards, and verification/reporting expectations for agent-facing execution."
    playbook_term: "In Frida, 'playbook' means a derived instruction document that operationalizes one or more interfaces. A playbook is not a normative source of truth."
    surface_term: "In Frida, 'surface' means only an ownership, deployment, and access contour. A surface does not become authoritative merely by existing at a path."
    interface_visibility_default: "FRIDA_INTERFACE_* blocks are public unless `_visibility: private` is explicitly set."
    layer_prefix_rule: "Frida core contract layers use FL##-*.yaml; Frida-managed app contract layers use AL##-*.yaml."
    layer_number_format: "Two digits exactly (`FL01`, `AL02`)."
    app_template_term: "A template is a named Frida-shipped derivative app-contract seed; `template_app_basic` materializes Frida bootstrap and contract rules as the neutral zero-start baseline, is not a source of truth, and while it remains inside repo `frida` it is not a legal application-contract execution input for the visualizer."
    app_extension_term: "An app extension is a named optional app-contract layer activated only by linking its AL## file in the target app contract index."
    instruction_surface_classes:
      engine_invariant_instruction_surfaces:
        meaning: "Engine-generated or engine-static instruction surfaces whose exact paths and content are strict Frida invariants."
        examples:
          - "AGENTS.md"
          - ".frida/contract/AGENTS.md"
          - "zone AGENTS.md"
          - ".frida/contract/specs/ROUTER.xml"
          - ".frida/contract/profiles/*.xml"
      interface_instruction_surfaces:
        meaning: "Seeded baseline instruction documents that implement public interfaces in target repos and remain user-owned in form after initial deployment."
        ownership_model: seed_then_user_owned
        examples:
          - ".frida/contract/playbooks/AGENT-app-contract-update.md"
          - ".frida/contract/playbooks/AGENT-app-contract-repair.md"
      derived_templates:
        meaning: "Shipped baseline materials derived from Frida rules and bootstrap policy, never normative sources."
        examples:
          - "templates/template_app_basic/**"
    interface_boundaries:
      self_contract_management:
        block: FRIDA_INTERFACE_SELF_CONTRACT_MANAGEMENT
        repository_scope: frida_repo_only
        mutation_scope: frida_contract_only
        deployment_scope: not_deployed_to_target_repo
      update_app_by_spec:
        block: FRIDA_INTERFACE_UPDATE_APP_BY_SPEC
        repository_scope: target_app_repo_only
        mutation_scope: target_app_contract_only
        deployment_scope: public
      update_app_by_code:
        block: FRIDA_INTERFACE_UPDATE_APP_BY_CODE
        repository_scope: target_app_repo_only
        mutation_scope: target_app_contract_only
        deployment_scope: public
  source_ref: FRIDA_CORE_CONTRACT

CONTRACT_UNIQUENESS:
  _visibility: private
  id: frida-contract-uniqueness-policy
  version: 1.0.0
  first_rule: true
  rule: "Any contract entity MUST be declared exactly once."
  control:
    enforcement: hard
    fail_on_duplicate: true
    warning_code: CONTRACT_DUPLICATE_ENTITY
  strictness_freeze:
    change_requires_explicit_owner_instruction: true
    note: "Strictness level changes require explicit owner approval."
  projection_rule:
    allow_projection_via_source_ref: true
    note: "Blocks may reference other blocks via source_ref without duplication."

