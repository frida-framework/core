GLOSSARY:
  routeId: Internal ID of generated route (UUID)
  skeleton: Asynchronous Baseline. A transient state containing llm_segments (boundary-driven waypoints) and a unique ID. Served as a placeholder while full details are built by updRouteDetails.
  skeleton_raw: 'LLM response stored for debugging and downstream processing. Format: { llm_segments: [...], llm_raw: string }'
  details_status: 'Route details build status. Values: idle | running | ready | error. Strict state machine with atomic transitions.'
  details_attempts: Number of updRouteDetails execution attempts. Increments on each trigger. Used for retry debugging.
  details_started_at: Timestamp when details_status first set to 'running'. NULL if never started.
  details_last_attempt_at: Timestamp of most recent updRouteDetails attempt. NULL if never attempted.
  updRouteDetails: 'Async route builder: validates llm_segments waypoints via Mapbox -> generates polyline -> creates route_assembly.assembled_segments. Idempotent, lock-based.'
  details_rev: Increments on every successful updRouteDetails. Triggers timeline update.
  geometry_rev: Increments only when geometry_hash changes. Triggers map update.
  geometry_hash: Deterministic hash of route geometry to detect changes
  route_line_map_geometry: 'Technical rendering points (100-200) for map gradient color-coding. Each item: {index, lat, lng, complexity|null}.'
  micro_points: DEPRECATED term for route_line_map_geometry. MUST NOT be used.
  ui_waypoint: 'Structural node: Origin, Destination, or Road Junction (highway change). Defines segment boundaries. NO tactical maneuvers (turns).'
  road_junction: Point where step.ref changes. Marks the transition between two major road segments.
  cache_ground: 'Validated road segment attributes (Beauty 1-10, Complexity 1-10). Key: (boundary_a, mid_coord, boundary_b). Persistent knowledge.'
  topology_segment: 'Section of road between two junctions. Container for sub-segments. Key format: MEX135D [MEX150 x OAX175].'
  visual_skeleton: Procedural curvy line displayed during loading. Pure aesthetics, no real geometry data.
  llm_segments: 'LLM-proposed boundary-driven segments. Each segment: { from_waypoint_lat/lng, to_waypoint_lat/lng, road_ref, title_ru, estimated_km, expected_beauty, expected_complexity }. Stored in skeleton_raw, validated by Mapbox.'
  progress_stage: 'Route loading stage. Values: skeleton | polyline | waypoints | segments. Progressive UI updates.'
  boundary_trigger: 'Event that creates a segment boundary: highway_change (mandatory), scenery_change, serpentine_cluster, difficulty_jump (strong), road_character_change (weak).'
  serpentine_cluster: 'Sustained twisty section that a rider would remember. Detection: gradient-based edge detection (v2). Achieves boundary precision ±0.5-1 km. See ROUTE_PIPELINE_CANON.serpentine for algorithm details. Detector outputs PotentialWaypoint with trigger serpentine_start/serpentine_end; internal zone data stays inside detector.'
  Polyline: Array of PolylinePoint. Route geometry from Mapbox.
  PolylinePoint: '[lng, lat] tuple. Single coordinate in Mapbox format.'
  Waypoint: 'Structural node in route. Schema: { id: string, lat: number, lng: number, type: ''origin''|''destination''|''road-junction'', title_ru: string, hint_ru?: string }. Created from PotentialWaypoint after filtering/merging.'
  PotentialWaypoint: 'Candidate waypoint from detector. Schema: { lat: number, lng: number, trigger: string, priority: 0-10, confidence: 0-1, metadata?: object }. Metadata may contain detector-specific info (e.g., complexity for serpentine triggers).'
  Segment: 'Road section between two adjacent Waypoints. Schema: { segment_index: number, from_lat, from_lng, to_lat, to_lng, road_ref?, title_ru, distance_km, beauty: 1-10, complexity: 1-10, kind, turniness: 0-1, decision_density: 0-1 }. Derived from Waypoints - never exists independently.'
  RouteLineMapGeometry: 'Array of technical rendering points for map gradient. Schema: [{ index: number, lat: number, lng: number, complexity: number|null }]. 100-200 points per route.'
  canon: 1:1 data artifact extracted from wiki contract:* blocks
  guard: Normative constraint. Statement stored only in GUARDS; elsewhere only ID refs
  zone: File system area with defined permissions (read-only, read-write)
  profile: Agent role definition with permissions and constraints
  invariant: Development rule that must always hold
  AppHeader: Global top bar containing branding and primary actions.
  AppStage: Main area below the AppHeader.
  Side-by-Side: Layout mode where AppStage is split vertically into two panes.
  TimelinePane: Left pane of the Side-by-Side layout, containing the Timeline component.
  route_algorithm_optimization: 'Изменение механики генерации маршрута: правки кода детекторов/генератора/пайплайна, изменение набора параметров (params.schema) или изменение семантики параметров. Требует обновления contract:WAYPOINT_SYSTEM_CANON (version/date, schema) и при необходимости contract:ROUTE_PIPELINE_CANON.'
  route_algorithm_tuning: 'Настройка алгоритма: изменение только значений таблицы параметров (presets/experiments) без изменения механики (логики) и без изменения params.schema. Единственная допустимая поверхность настройки — waypoint-config.ts параметры.'
  cityBoundaryFilter: Filter for blurred serpentine boundaries near cities. When serpentine starts from origin city or ends at destination city, the boundary between 'city' and 'serpentine' is blurred. Filter removes serpentine_start within bufferKm from origin and serpentine_end within bufferKm from destination. Long zones (>= minClearBoundaryZoneKm) have clear boundaries and are not filtered. Origin/destination used as natural serpentine boundaries.
  tailTrimming: DEPRECATED (v1.5). Previously used for trimming serpentine zone tails via trimZoneTails function. Replaced by gradient-based edge detection which naturally finds precise boundaries without post-processing. Parameter tailLengthRatio is still used to scale WINDOW_SIZE.
  registry_city: 'City that is present in the Mexico city registry datasets (mx_cities_gates_dataset and/or mx_cities_casetas_dataset).

    Defined strictly by presence of a city_id in the datasets. This is the normative definition (no "big city" heuristics).

    '
  mx_cities_gates_dataset: 'Human-authored YAML dataset: resources/mx_cities_gates.yaml.

    Build-only input. Contains cities[] with city_id and exit_corridors[].gate {lat,lng}.

    Runtime MUST NOT parse this YAML.

    '
  mx_cities_casetas_dataset: 'Human-authored YAML dataset: resources/mx_cities_casetas.yaml (same schema as gates).

    Build-only input. Runtime MUST NOT parse this YAML.

    '
  city_polygon_index_artifact: 'Build artifact generated from BOTH YAML datasets.

    Location: resources/_generated/city_polygon_index.(ts|json).

    Single runtime source of truth for registry cities list and their city polygons.

    '
  city_polygon_index_schema: "Normative schema for city_polygon_index_artifact:\n{ version: number, generated_at: string, city_ids: string[],\n  cities: Array<{ city_id: string, polygon: PolylinePoint[], bbox?: {minLat,maxLat,minLng,maxLng} }> }\ncity_ids MUST equal cities[].city_id set (same membership).\ncities[] MUST be sorted by city_id asc for determinism.\n"
  start_finish_regime: 'Normative rules for defining origin/destination urban exclusion zones ("blind zones") used by Waypoint generator.

    Uses city polygons from city_polygon_index_artifact when origin/destination lies inside a registry city polygon;

    otherwise uses fallback circle radius (km) from waypoint params.'
DATABASE_SCHEMA:
  cache_ground:
    table: cache_ground
    purpose: Validated road segment attributes. Source of truth for beauty/complexity.
    columns:
      id:
        type: uuid
        constraint: primary key default gen_random_uuid()
      boundary_a:
        type: point
        constraint: not null
        notes: Start coordinate of segment
      mid_coord:
        type: point
        constraint: not null
        notes: Disambiguator - middle point of the path. Unique identifier when combined with boundaries.
      boundary_b:
        type: point
        constraint: not null
        notes: End coordinate of segment
      road_ref:
        type: text
        notes: Road reference number (e.g., MX-135D). NULL if unknown.
      road_type:
        type: text
        enum:
        - motorway
        - mountain
        - urban
        - rural
        - path
        notes: General road classification
      raw_beauty:
        type: int
        notes: 1-10, objective score derived from validated sources (not LLM)
      raw_complexity:
        type: int
        notes: 1-10, objective score derived from Mapbox geometry analysis
      source:
        type: text
        enum:
        - mapbox
        - osm
        - manual
        notes: Origin of the validated data
      created_at:
        type: timestamptz
        constraint: default now()
    indexes:
    - name: idx_cache_ground_path
      type: unique
      columns: boundary_a, mid_coord, boundary_b
      notes: Unique path identifier - disambiguates alternative routes between same endpoints
    - name: idx_cache_ground_mid_spatial
      type: gist
      columns: mid_coord
      notes: Spatial index for intersection queries
  cache_llm_eval:
    table: cache_llm_eval
    purpose: Raw LLM responses for debugging and reprocessing. Hypothesis storage.
    columns:
      id:
        type: uuid
        constraint: primary key default gen_random_uuid()
      boundary_a:
        type: point
        constraint: not null
        notes: Query start coordinate
      boundary_b:
        type: point
        constraint: not null
        notes: Query end coordinate
      prompt_hash:
        type: text
        notes: Hash of prompt used - for tracking prompt versions
      model:
        type: text
        notes: LLM model id
      raw_response:
        type: text
        notes: Full raw LLM response
      created_at:
        type: timestamptz
        constraint: default now()
  route:
    table: route
    purpose: Route metadata + skeleton placeholder
    columns:
      id:
        type: uuid
        constraint: primary key default gen_random_uuid()
      origin:
        type: jsonb
        constraint: not null
        format: '{label, lat, lng}'
      destination:
        type: jsonb
        constraint: not null
        format: '{label, lat, lng}'
      is_skeleton:
        type: bool
        constraint: not null default true
      details_status:
        type: text
        enum:
        - idle
        - running
        - ready
        - error
        constraint: not null default 'idle'
      details_error:
        type: text
        notes: Reason string if details build failed
      skeleton_raw:
        type: jsonb
        notes: Stores llm_segments + raw LLM text for debugging
      details_rev:
        type: int
        constraint: not null default 0
      geometry_rev:
        type: int
        constraint: not null default 0
      details_attempts:
        type: int
        constraint: not null default 0
      details_started_at:
        type: timestamptz
        notes: Timestamp when details first started
      details_last_attempt_at:
        type: timestamptz
        notes: Timestamp of most recent attempt
      created_at:
        type: timestamptz
        constraint: not null default now()
      updated_at:
        type: timestamptz
        constraint: not null default now()
      expires_at:
        type: timestamptz
        constraint: not null default (now() + interval '24 hours')
        notes: TTL for anonymous routes
    indexes:
    - idx_route_expires on route(expires_at)
    rls:
    - Public read/write (anonymous access)
  route_assembly:
    table: route_assembly
    purpose: Materialized JOIN of cache layers. Ready-to-serve route data.
    columns:
      route_id:
        type: uuid
        constraint: not null references route(id) on delete cascade
      rev:
        type: int
        constraint: not null
        notes: Equals route.details_rev after update
      assembled_polyline:
        type: jsonb
        constraint: not null
        format: '[{lat, lng}, ...]'
        notes: Merged geometry from cache_polyline segments
      assembled_segments:
        type: jsonb
        constraint: not null
        format: '[{segment_index, from_lat, from_lng, to_lat, to_lng, road_ref, title_ru, distance_km, beauty, complexity, kind, turniness, decision_density}, ...]'
        notes: "Segments with rider-adjusted scores.\nbeauty/complexity: base from cache_ground, modified by rider_experience.\nkind: Segment type, one of:\n  - monotonous_highway: Скучная скоростная трасса (turniness < 0.2)\n  - urban_navigation: Городской трафик\n  - cruise: Спокойная дорога без особенностей\n  - twisty_forest: Приятная извилистость (turniness 0.3-0.7)\n  - serious_serpentine: Сложный серпантин (turniness > 0.7)\n  - nav: Навигационный узел (decision_density > 0.3)\nturniness: 0-1, average curvature metric for the segment.\ndecision_density: 0-1, concentration of navigation decisions.\n"
      route_line_map_geometry:
        type: jsonb
        format: '[{index, lat, lng, complexity}, ...]'
        notes: 'Technical rendering points (100-200 per route) for map color-coding. complexity: number|null.'
      waypoints:
        type: jsonb
        format: '[{id, type, lat, lng, title_ru, hint_ru, anchor}, ...]'
        notes: 'Types: ''origin''|''destination''|''road-junction''. Structural nodes only (no turns). Anchor: {anchorPartIndex} (PolylinePartIndex).'
      summary:
        type: jsonb
        constraint: not null
        format: '{distance_km, duration_min, ...}'
      created_at:
        type: timestamptz
        constraint: not null default now()
    primary_key: (route_id, rev)
    indexes:
    - idx_route_assembly_rev on route_assembly(route_id, rev desc)
    rls:
    - Public read (anonymous access)
WAYPOINT_SYSTEM_CANON:
  version: '1.7'
  date: '2026-02-04'
  source_notes:
  - Unified canon to prevent agent drift.
  - 'Single tuning surface: waypoint-config.ts parameters. Do not tune by changing logic.'
  - Detector internal structures (zones, indices) do not leak outside detector boundary.
  - Added start/finish regime and city polygon build artifact; banned runtime YAML parsing.
  change_control:
    terms:
      tuning_ref: route_algorithm_tuning
      optimization_ref: route_algorithm_optimization
    tuning:
      allowed_changes:
      - 'Change preset values (presets: exp-XXX-* experiments and promotion into main presets).'
      - Change numeric/string values inside waypoint-config.ts only.
      required_location:
      - supabase/functions/v2-upd-route-details/waypoint-config.ts
      forbidden_changes:
      - MUST NOT modify generator/detector logic files.
      - MUST NOT change params.schema (parameter surface).
      - MUST NOT add/remove/rename parameters.
      - MUST NOT edit pipeline stage behavior (ROUTE_PIPELINE_CANON).
      fail_fast:
      - If task requires any forbidden change -> HALT and request an OPTIMIZATION task.
    optimization:
      allowed_changes:
      - Modify generator/detector logic and/or pipeline stages.
      - Add/remove/rename parameters (requires schema update).
      required_canon_updates:
      - Update params.schema if parameter surface changes.
      - Update ROUTE_PIPELINE_CANON if stage/process changes.
  types:
    PolylinePoint: '[lng, lat] tuple'
    Polyline: PolylinePoint[]
    Waypoint: '{ id, lat, lng, type, title_ru, hint_ru }'
    PotentialWaypoint: '{ lat, lng, trigger, priority(0-10), confidence(0-1), metadata? }'
  triggers_priority:
    system:
    - trigger: origin
      priority: 10
    - trigger: destination
      priority: 10
    - trigger: user_poi
      priority: 10
    structural:
    - trigger: highway_change
      priority: 8
    difficulty:
    - trigger: serpentine_start
      priority: 7
    - trigger: serpentine_end
      priority: 7
    - trigger: difficulty_jump
      priority: 7
    aesthetics:
    - trigger: scenery_change
      priority: 5
    quality:
    - trigger: surface_change
      priority: 4
  indexing_systems:
    MapBoxCoordinateIndex:
      used_by:
      - serpentine detector (internal only)
      note: Internal detector index over directions.coordinates. NOT exposed outside detector. Detector converts to lat/lng before emitting PotentialWaypoint.
    MapBoxDirectionsStepIndex:
      note: Not used as waypoint anchor. Step is a hint only.
    PolyLinePartIndex:
      used_by:
      - segment anchors
      - route_line_map_geometry projection
      note: Index into assembled_polyline; used for slicing polyline and mapping gradient.
  detector_boundaries:
    principle: Detectors emit PotentialWaypoint[] only. Internal structures (zones, indices, intermediate calculations) stay inside detector.
    serpentine_detector:
      internal:
      - zones array
      - sustainedZones
      - switchbackZones
      - startIndex
      - endIndex
      - computeTurninessProfile
      - smoothProfile
      - computeGradient
      - detectEdges
      - assembleZonesFromEdges
      output: PotentialWaypoint[] with trigger serpentine_start or serpentine_end. Metadata includes complexity, distanceFromOriginKm, zoneLengthKm for downstream filtering.
    highway_change_detector:
      internal:
      - step indices
      - ref tracking state
      output: PotentialWaypoint[] with trigger highway_change
  resilience:
    minimal_contract:
      required:
      - 'origin: { lat, lng, label }'
      - 'destination: { lat, lng, label }'
      optional: All other inputs are optional.
    detector_contract:
    - Each detector returns PotentialWaypoint[] (may be empty).
    - Detectors do not throw. On errors they return [] + warning.
    - Detectors do not expose internal data structures.
    generator_guarantee:
    - Waypoint generator always returns at least [origin, destination].
    - Waypoint generator MUST remove any non-[origin|destination|user_poi] waypoints located within urban exclusion zones near origin and destination (even if emitted by detectors).
    - Waypoint generator MUST sort potentials by route position (polylineIndex) BEFORE any filtering/merging operations.
    - 'Decisions of cityBoundaryFilter are FINAL: serpentine tails rule MUST NOT restore removed potentials.'
    start_finish_regime:
      purpose: Deterministic definition of origin/destination urban exclusion zones (blind zones) to enforce urbanExclusion rules.
      definitions:
        registry_city: See GLOSSARY.registry_city
      build_inputs:
      - resources/mx_cities_gates.yaml
      - resources/mx_cities_casetas.yaml
      build_output:
        artifact_term: city_polygon_index_artifact
        path: resources/_generated/city_polygon_index.(ts|json)
        runtime_rule: Runtime MUST read ONLY the build artifact; MUST NOT parse YAML inputs.
      build_validation:
      - Build MUST fail on any coordinate with 2 decimal digits.
      - 3 decimals allowed as draft; MUST NOT be auto-padded.
      polygon_construction:
        input_points: All unique gate points (lat/lng) for a given city_id from BOTH datasets.
        algorithm: convex_hull
        determinism:
        - Deduplicate points by exact (lat,lng).
        - Sort points by (lng asc, lat asc) before hull computation.
        - If <3 unique points -> polygon omitted for this city_id (fallback applies).
        - cities[] sorted by city_id asc in output artifact.
      membership:
        rule: Registry city membership is defined ONLY by presence of city_id in datasets; city_ids is derived from artifact.
      lookup:
        rule: If origin/destination point-in-polygon matches any city polygon -> that polygon is the urban exclusion zone.
        tie_breaker: If multiple polygons contain point -> choose the polygon with smallest area.
      fallback:
        rule: If no polygon matched OR polygon missing -> use circle zone around point.
        radius_params:
          origin: originUrbanExclusionKm
          destination: destinationUrbanExclusionKm
        defaults:
        - Standard preset MUST default originUrbanExclusionKm=10 and destinationUrbanExclusionKm=10.
      invariants:
      - UrbanExclusion MUST be evaluated against the zone from this regime.
      - No alternative heuristics for city boundaries are allowed outside this regime.
      - Runtime MUST NOT parse YAML datasets; only build scripts may.
  params:
    single_source_of_truth: supabase/functions/v2-upd-route-details/waypoint-config.ts
    schema:
      filters:
      - minConfidence
      - minPriority
      spacing:
      - minDistanceKm
      - minStepDistance
      - maxWaypoints
      merging:
      - sameTriggerMergeDistance
      serpentineTails:
      - maxGapKm
      - tailLengthRatio
      - minRestZoneLengthKm
      - enforceMonotonicity (DEPRECATED - not used in gradient edge detection)
      cityBoundaryFilter:
      - bufferKm
      - minClearBoundaryZoneKm
      highwayChange:
      - minStepDistanceMetersForRef
      - persistSteps
      - persistDistanceMeters
      - minStepsBetweenAcceptedChanges
      - ignoreManeuversWithoutRef
      - normalize.canonicalizeMxPrefix
      - normalize.keepDSuffix
      - anchorSearchWindowPartIndex
      urbanExclusion:
      - originUrbanExclusionKm
      - destinationUrbanExclusionKm
      - 'allowTriggersInUrbanExclusion (MUST include: [''origin'',''destination'',''user_poi''])'
  presets:
  - name: detailed
    intent: maximum detail
    hint: 50-100 points, 3-5 km segments
  - name: standard
    intent: balanced default
    hint: 20-50 points, 5-10 km segments
  - name: simplified
    intent: coarse overview
    hint: 10-20 points, 20-50 km segments
  tuning_process:
    experiments_prefix: exp-XXX-*
    steps:
    - Copy standard preset into new exp-XXX preset.
    - Change exactly one parameter.
    - Test on route set.
    - Record outcome in preset comment.
    - Promote into main presets if successful.
ROUTE_PIPELINE_CANON:
  version: '1.3'
  date: '2026-02-04'
  scope:
    function_dir: supabase/functions/v2-upd-route-details/
  principles:
  - 'Minimal contract: origin + destination only. Everything else optional.'
  - Defensive processing on each stage.
  - 'Graceful degradation: route still builds when enrichments are missing.'
  - 'Detector internals do not leak: only PotentialWaypoint[] crosses detector boundary.'
  stages:
  - id: 0.routeWaypoints
    name: Route waypoints baseline
    output: routeWaypoints = [origin, ...intermediates?, destination]
    notes:
    - Optional enrichment sources may be disabled and MUST NOT block the pipeline.
  - id: 1.mapbox_directions
    name: Mapbox Directions
    input: routeWaypoints (>=2)
    output:
      coordinates: PolylinePoint[]
      legs: Leg[]
      distanceMeters: number
      durationSeconds: number
    failure: Mapbox unavailable -> critical error (throw).
  - id: 2.detect_potentials
    name: Independent detectors -> PotentialWaypoint[]
    output: PotentialWaypoint[] (merged from all detectors)
    detectors:
      serpentine:
        input: polyline (directions.coordinates) + serpentineTails config
        output: PotentialWaypoint[] with trigger serpentine_start/serpentine_end. Metadata includes complexity, distanceFromOriginKm, zoneLengthKm.
        internal: Zone detection via gradient edge analysis stays inside detector. Not exposed.
        process:
        - Compute turniness profile along route (WINDOW_SIZE based on tailLengthRatio)
        - Smooth profile (SMOOTHING_WINDOW=5)
        - Compute gradient of smoothed profile (SAMPLING_STEP=5)
        - 'Detect edges: up-edges (zone start) and down-edges (zone end) via gradient threshold'
        - Assemble zones from edge pairs (filter by minRestZoneLengthKm)
        - Merge fragmented zones (maxGapKm)
        - Emit PotentialWaypoint pairs (start/end) with metadata
        failure: No serpentines -> [] ; detector error -> [] + warning.
      highway_change:
        input: steps[] (hint) + polyline (anchoring)
        output: PotentialWaypoint[] with trigger highway_change
        rules:
        - Step index is not a waypoint anchor.
        - 'RoadRefSet extraction priority: step.ref -> step.codes/routeCodes -> banner instructions -> parse from step.name (low confidence).'
        - Config-driven normalization (MX/MEX, D suffix).
        - 'Ignore short connectors: step.distanceMeters < minStepDistanceMetersForRef.'
        - 'Persistence: new ref must hold persistSteps or persistDistanceMeters.'
        - 'Debounce: minStepsBetweenAcceptedChanges between accepted changes.'
        - 'Anchor: step maneuver location + nearest PolyLinePartIndex (search window).'
        failure: No ref/codes -> [] ; one highway whole route -> [] ; error -> [] + warning.
      system:
        output: PotentialWaypoint[] with origin + destination (priority 10, confidence 1.0)
  - id: 3.generate_waypoints_and_segments
    name: Waypoint + Segment generation
    input:
    - PotentialWaypoint[] (from all detectors)
    - Polyline
    - WaypointGenerationParams (waypoint-config.ts)
    process:
    - Sort potentials by position along route (polylineIndex or nearest-point) BEFORE any filtering/merging
    - Filter by confidence + priority
    - Apply cityBoundaryFilter (see GLOSSARY)
    - Serpentine tails rule (monotonicity + rest thresholds) using metadata.complexity — MUST NOT restore potentials removed by cityBoundaryFilter
    - Load city_polygon_index_artifact and compute origin/destination urban exclusion zones per WAYPOINT_SYSTEM_CANON.start_finish_regime; apply urbanExclusion filter (remove non-allowlist triggers inside these zones)
    - Merge same trigger within sameTriggerMergeDistance
    - Apply spacing (minDistanceKm, minStepDistance)
    - Limit maxWaypoints
    - Generate Waypoint[] and Segment[] together
    output:
    - Waypoint[]
    - Segment[]
    invariants:
    - segments.length == waypoints.length - 1
    - segments[].complexity derived from PotentialWaypoint[].metadata.complexity where trigger is serpentine_*
    - 'cityBoundaryFilter decisions are FINAL: serpentine tails rule MUST NOT restore removed potentials'
    - 'Segment complexity uses stateful propagation: activeComplexity=1 baseline, set by serpentine_start, reset by serpentine_end; segments between inherit activeComplexity'
    guarantees:
    - Always returns at least [origin, destination] and one segment
    - Stage 3 MUST NOT parse YAML datasets; only reads build artifact.
  - id: 4.route_line_map_geometry
    name: RouteLineMapGeometry generation (map gradient)
    input:
      required:
      - Polyline
      optional:
      - Segment[]
    output: RouteLineMapGeometry
    rule:
    - Does not compute complexity from geometry. Projects existing Segment[].complexity data.
    modes:
      canonical: Segment[] present -> complexity from Segment[].complexity
      none: no Segment[] -> complexity = null for all points
    failure: Error -> empty array; map shows no gradient.
  - id: 5.database_write
    name: Database write with partial updates allowed
    policy:
    - Write what exists; never block on missing enrichments.
    - When Segment[] exist, route_line_map_geometry is overwritten with canonical projection.
    variants:
      partial:
        writes:
        - assembled_polyline
        - waypoints
        - assembled_segments
        - route_line_map_geometry (canonical)
      ready:
        writes:
        - assembled_polyline
        - waypoints
        - assembled_segments
        - route_line_map_geometry
        - summary
    revs:
    - details_rev++ on each successful update
    - geometry_rev++ only if polyline changed
  terminology:
    allowed:
    - Polyline
    - PolylinePoint
    - Waypoint
    - PotentialWaypoint
    - Segment
    - RouteLineMapGeometry
    forbidden:
    - boundary (API term; allowed only inside detectors)
    - micropoint (deprecated; use RouteLineMapGeometry)
    - coordinate / point (ambiguous; specify PolylinePoint or lat/lng)
    - step index (not used as anchor)
    - serpentineZones (internal to detector; use PotentialWaypoint with serpentine_* trigger)
    - sustainedZones (internal to detector)
    - switchbackZones (internal to detector)
    - startIndex / endIndex (internal to detector; use lat/lng)
    - SerpentineZone (not a canonical type)
  file_structure:
    root: supabase/functions/v2-upd-route-details/
    mandatory_files:
    - index.ts
    - types.ts
    - waypoint-config.ts
    - waypoint-detection.ts
    - waypoint-generator.ts
    - serpentine-detector-v2.ts
    - highway-change-detector.ts
    - route-line-map-geometry.ts
    - mapbox.ts
    - geometry-hash.ts
  dependencies:
    forbidden:
    - waypoint-generator imports detectors
    - detectors import each other
    - any module imports detector internal types (zones, indices)
    allowed_flow: all detectors -> PotentialWaypoint[] -> waypoint-detection -> waypoint-generator
RESOURCES:
  v2-preview:
    provider: supabase
    function: v2-preview
    adapter: routeService.createRoute
    auth:
      requires: false
    schemas:
      params: '{ origin: {label, lat, lng}, destination: {label, lat, lng}, departure_date, outbound_style, locale, include_tolls_metric }'
      returns: '{ routeId: uuid }'
    mode: SKELETON-ONLY
    notes: 'Skeleton-only: returns routeId, triggers async details build.'
  updRouteDetails:
    provider: supabase
    function: v2-upd-route-details
    adapter: routeService.updRouteDetails
    auth:
      requires: false
    schemas:
      params: '{ routeId: uuid }'
      returns: '{ success: boolean, details_rev: number, geometry_rev: number }'
    idempotent: true
    lock_based: true
  getRouteMeta:
    provider: supabase
    function: v2-route-meta
    adapter: routeService.getRouteMeta
    auth:
      requires: false
    schemas:
      params: '{ routeId: uuid }'
      returns: '{ id, origin, destination, is_skeleton, details_status, details_error?, details_rev, geometry_rev, details_attempts, details_started_at?, details_last_attempt_at?, updated_at }'
    notes: Polling endpoint. Returns route table metadata only.
  getRouteDetails:
    provider: supabase
    function: v2-route-details
    adapter: routeService.getRouteDetails
    auth:
      requires: false
    schemas:
      params: '{ routeId: uuid, rev?: number }'
      returns: '{ rev, polyline_points, waypoints, route_line_map_geometry, segments, summary }'
    notes: 'Fetch specific revision from route_assembly table.

      route_line_map_geometry: 100-200 technical rendering points for map color-coding.

      '
  setWorkspace:
    provider: supabase
    function: v2-workspace-upsert
    adapter: workspaceService.setWorkspace
    auth:
      requires: true
  getWorkspace:
    provider: supabase
    function: v2-workspace-get
    adapter: workspaceService.getWorkspace
    auth:
      requires: false
  getCurrentUser:
    provider: service-layer
    adapter: authService.getCurrentUser
    auth:
      requires: false
  signIn:
    provider: service-layer
    adapter: authService.signIn
    auth:
      requires: false
  signOut:
    provider: service-layer
    adapter: authService.signOut
    auth:
      requires: true
  geocodeForward:
    provider: mapbox
    api: geocoding
    adapter: mapboxService.geocodeForward
    purpose: Convert place name to coordinates
  geocodeReverse:
    provider: mapbox
    api: geocoding-reverse
    adapter: mapboxService.geocodeReverse
    purpose: Convert coordinates to place name
  getDirections:
    provider: mapbox
    api: directions
    adapter: mapboxService.getDirections
    purpose: Get route geometry for Map rendering
APPLICATIONS:
  wizard:
    route: /
    description: Route planning wizard with origin/destination input
    usesResources:
    - v2-preview
    - getCurrentUser
    - signIn
    - signOut
    - geocodeForward
    - geocodeReverse
    exits:
      generateRoute:
        trigger: ui:wizard.generate
        calls: v2-preview
        provides:
          routeId: uuid
        transition: wizard->route
  routePage:
    route: /route/:routeId
    description: Route visualization with timeline and map
    usesResources:
    - getRouteMeta
    - getRouteDetails
    - updRouteDetails
    - getCurrentUser
    - signIn
    - signOut
    - getDirections
    exits:
      reset:
        trigger: ui:route.reset
        transition: route->wizard
TRANSITIONS:
  wizard->route:
    from: wizard
    to: routePage
    via:
      routeId: uuid
    triggerRef: APPLICATIONS.wizard.exits.generateRoute
  route->wizard:
    from: routePage
    to: wizard
    via: {}
    triggerRef: APPLICATIONS.routePage.exits.reset
MOUNT_POINTS:
  slots:
    wizard:
      fileRef: PATHS.slots.wizardPage
      stubMarkerRef: PATHS.slotMarkers.wizard.stub
      mountedMarkerRef: PATHS.slotMarkers.wizard.mounted
    timeline:
      fileRef: PATHS.slots.timeline
      stubMarkerRef: PATHS.slotMarkers.timeline.stub
      mountedMarkerRef: PATHS.slotMarkers.timeline.mounted
  invariants:
  - mount.slot.baseline.before
  - mount.slot.mounted.after
MAPPER_PLAN:
  version: '0.3'
  artifacts:
    rootIndexHtml:
      kind: html-doc
      sourceRef: PATHS.app.styleIndexTemplate
      outputRef: PATHS.app.rootIndexHtml
    wizardModule:
      kind: react-module
      sourceDirRef: PATHS.canon.wizardDir
      outputDirRef: PATHS.mount.components
      exportName: WizardApp
    timelineModule:
      kind: react-module
      sourceDirRef: PATHS.canon.timelineDir
      outputDirRef: PATHS.mount.components
      exportName: TimelineApp
  phases:
  - id: reset
    kind: reset-to-baseline
  - id: style.sync-index
    kind: copy-file
  - id: wizard.process
    kind: pipeline
  - id: timeline.process
    kind: pipeline
  - id: bind
    kind: pipeline
  - id: validate
    kind: validate-repo
FRIDA_META:
  version: '1.0'
  date: '2026-01-10'
  status: active
  portability: standalone
  dependencies:
    runtime: []
    build:
    - tsx
    - yaml
    - handlebars
    - glob
  purpose: "Universal AI development framework.\nProvides: agent profiling, zone-based permissions, \ncontext generation, antipattern enforcement.\n"
  exports:
    kernel: zerohuman-frida-kernel.md (this file)
    generator: scripts/frida-gen.ts
    templates_frida: scripts/templates/frida/**
    templates_docs: scripts/docs-gen/templates/**
    workflow: .github/workflows/canon-sync.yml
FRIDA_PRINCIPLES:
  development_sequence:
    name: Canon → Antipattern → Development
    steps:
      1_CANON:
        what: Formal description of WHAT must exist
        where: Wiki contract:* blocks
        mandatory: true
      2_ANTIPATTERN:
        what: Formal description of WHAT IS FORBIDDEN
        where: Generated AGENTS.md files, policy docs
        mandatory: true
        generated_from: ZONES, GUARDS, INVARIANTS
      3_DEVELOPMENT:
        what: Implementation strictly within canon and antipattern
        precondition: Antipattern must exist BEFORE development starts
    violation: Skipping steps = architecture violation
  single_source_of_truth:
    location: Wiki
    rule: All contract:* blocks live ONLY in wiki
    artifacts: Generated 1:1, no manual edits
    enforcement: CI checks for drift
  context_minimization:
    principle: Agent reads only relevant constraints
    mechanism: Nested AGENTS.md pattern
    benefit: Reduced token usage, focused context
  fail_fast:
    principle: Block development if antipattern missing
    mechanism: Pre-task validation in agent protocol
    benefit: Prevent architectural violations early
FRIDA_PROTOCOL:
  agent_lifecycle:
    1_ROUTE:
      trigger: User provides task description
      action: Match keywords against TASK_PROFILES
      output: Selected profile ID
    2_LOAD_PROFILE:
      input: Profile ID
      action: Load .specs/profiles/{id}.xml
      output: Permissions, invariants, constraints
    3_VALIDATE_ANTIPATTERN:
      action:
      - Resolve target zone via contract:ZONES (most specific matching path).
      - Read canonical Zone AGENTS.md at `{zone.agentsPath}/AGENTS.md`.
      - 'If missing → HALT: request contract update + run frida:gen.'
      notes:
      - Do NOT assume AGENTS.md must exist in leaf directory. Canonical location is zone.agentsPath.
      - 'Optional upward search is allowed only within zone boundary if explicitly enabled (default: OFF).'
    4_EXECUTE:
      constraints:
      - Read only from security.read_allow paths
      - Write only to security.edit_allow paths
      - Never touch security.forbid paths
      invariants: Check all profile invariants before/after
    5_VERIFY:
      action: Run npm run verify
      on_fail: Rollback, report violation
  interaction_modes:
    architect:
      role: System Architect
      trigger: High-level feature request or business intent
      protocol:
        1_ANALYZE: Identify affected domain (App vs Kernel)
        2_TRANSLATE: Convert intent to contract changes
        3_CONTEXT_ENGINEER: Review agent capabilities for task
        4_PROPOSE: Output exact wiki changes needed
        5_NO_CHATTER: Explain contract changes, not code
      goal: Minimize human cognitive load
    developer:
      role: Implementation Agent
      trigger: Specific coding task with profile assigned
      protocol:
        1_READ_AGENTS_MD: Load zone-specific constraints
        2_CHECK_PERMISSIONS: Verify file access allowed
        3_IMPLEMENT: Write code within boundaries
        4_VERIFY: Run verification commands
      goal: Execute within strict boundaries
  forbidden_actions:
  - pattern: Edit files outside edit_allow
    response: REDIRECT to correct location
  - pattern: Import from forbidden zones
    response: HALT with guard violation
  - pattern: Skip antipattern check
    response: HALT with missing antipattern error
  - pattern: Add functionality not in canon
    response: HALT with scope violation
FRIDA_RUN_REPORTING:
  version: '1.0'
  policy:
    required_on:
    - SUCCESS
    - HALTED
    output_format:
      carrier: markdown fenced code block
      language: yaml
    invariants:
    - Report MUST include profile_id.
    - Report MUST include changed files list (modified/created/deleted). Use empty arrays if none.
    - Report MUST include verification.result (PASS|FAIL|SKIPPED) and commands list.
    - If status=HALTED, report MUST include decision_trace and recovery.
  schemas:
    SuccessReport:
      frida_report: 1
      status: SUCCESS
      task_ref: string | optional
      profile_id: string
      zone_id: string | optional
      working_dir: string | optional
      inputs:
        prompt_summary: string (1-2 sentences)
        canon_files_read: string[] (only files actually read)
        constraints_adopted: string[]
      changes:
        modified: string[]
        created: string[]
        deleted: string[]
      verification:
        commands: string[]
        result: PASS|FAIL|SKIPPED
        notes: string | optional
      summary:
        what_done: string[]
        risks_or_debt: string[] | optional
        followups: string[] | optional
    HaltReport:
      frida_report: 1
      status: HALTED
      halt_code: string
      summary: string
      profile_id: string | optional
      zone_id: string | optional
      working_dir: string | optional
      decision_trace: object[] (step, input, decision, why, result)
      recovery: string[]
FRIDA_SCHEMAS:
  Zone:
    description: Defines a file system zone with permissions
    required:
    - path
    properties:
      path:
        type: string
        description: Glob pattern for zone files
        example: src/components/**
      readOnly:
        type: boolean
        default: false
      whyReadOnly:
        type: string
      consequence:
        type: string
      redirectPath:
        type: string
      howToChange:
        type: string
      forbiddenOps:
        type: array[string]
      purpose:
        type: string
      agentsPath:
        type: string
        description: Where to generate AGENTS.md
      agentsTemplate:
        type: string
        enum:
        - readonly
        - mapper
        - notouch
        - service
  TaskProfile:
    description: Defines an agent role with permissions
    required:
    - description
    - keywords
    - role
    - security
    properties:
      description:
        type: string
      keywords:
        type: array[string]
      role:
        type: string
        enum:
        - FRONTEND_AGENT
        - BACKEND_AGENT
        - DESIGN_AGENT
        - QA_AGENT
        - ARCHITECT_AGENT
      security:
        type: object
        properties:
          read_allow:
            type: array[string]
          edit_allow:
            type: array[string]
          forbid:
            type: array[string]
          edit_forbid:
            type: array[string]
          forbiddenAction:
            type: string
            enum:
            - REDIRECT
            - HALT
            default: REDIRECT
          redirects:
            type: array[Redirect]
      invariants:
        type: array[string]
        description: IDs referencing INVARIANTS block
  Invariant:
    description: Development rule that must always hold
    required:
    - id
    - text
    properties:
      id:
        type: string
        pattern: '[A-Z]+_[0-9]+'
      text:
        type: string
        description: MUST/MUST NOT statement
      category:
        type: string
        enum:
        - architecture
        - data
        - visual
        - security
  Guard:
    description: Normative constraint with enforcement
    required:
    - id
    - kind
    - statement
    properties:
      id:
        type: string
      kind:
        type: string
        enum:
        - meta
        - structural
        - prohibition
        - invariant
        - consistency
        - policy
      statement:
        type: string
FRIDA_GENERATOR:
  purpose: Generate agent context from contract data
  command: npm run frida:gen
  script: scripts/frida-gen.ts
  inputs:
    primary:
    - path: contract/canon.cbmd.yaml
      contains: ZONES, TASK_PROFILES, INVARIANTS, GUARDS
  outputs:
    bootloader:
      path: AGENTS.md
      template: templates/frida/bootloader.hbs
    router:
      path: .specs/ROUTER.xml
      template: templates/frida/router.xml.hbs
    profiles:
      path: .specs/profiles/{profile_id}.xml
      template: templates/frida/profile.xml.hbs
    zone_agents:
      path: '{zone.agentsPath}/AGENTS.md'
      templates:
        readonly: docs-gen/templates/agents-readonly-zone.hbs
        mapper: docs-gen/templates/agents-mapper.hbs
        notouch: docs-gen/templates/agents-no-touch.hbs
        service: docs-gen/templates/agents-service-layer.hbs
    policy_docs:
    - path: docs/policy/BOUNDARIES.md
      template: docs-gen/templates/boundaries.hbs
    - path: docs/policy/IMMUTABILITY.md
      template: docs-gen/templates/immutability.hbs
    reference:
      path: docs/reference/API_REFERENCE.md
      template: docs-gen/templates/api-reference.hbs
  algorithm:
    1_LOAD: Read contract/canon.cbmd.yaml, validate required blocks
    2_NORMALIZE: Apply path normalization (aliases, deprecated)
    3_RESOLVE: Expand invariant references in profiles
    4_GENERATE: Apply Handlebars templates in order
    5_WRITE: Atomic writes with AUTO-GENERATED header
FRIDA_GENERATOR_SPEC:
  language: TypeScript
  runner: tsx
  structure:
    config:
      ROOT_DIR: path.resolve(__dirname, '..')
      CONTRACT_PATH: contract/canon.cbmd.yaml
      WIKI_DIR: ../{project}.wiki
      TEMPLATES_FRIDA: scripts/templates/frida
      TEMPLATES_DOCS: scripts/docs-gen/templates
      SPECS_DIR: .specs
      PROFILES_DIR: .specs/profiles
      AUTO_GENERATED_HEADER: <!-- AUTO-GENERATED FROM CONTRACT - DO NOT EDIT MANUALLY -->
    classes:
      PathNormalizer:
        purpose: Normalize paths using aliases and deprecated mappings
        constructor: Takes PATHS block from contract
        methods:
          normalize: Returns { canonical, deprecated } for input path
          getCount: Returns number of mappings
    functions:
      loadContract:
        returns: Contract object from YAML
        validates: ZONES, TASK_PROFILES, INVARIANTS exist
      extractZones:
        input: contract.ZONES
        returns: Array of Zone objects with formatted names
      isZoneCovered:
        input: allowedPath, zonePath, agentsPath
        purpose: Check if zone is covered by allowed path pattern
        algorithm: "Extract prefixes from paths (remove glob wildcards)\nCheck if:\n  - Zone path matches allowed (e.g. 'src/services/**' covers 'src/services/**')\n  - AGENTS.md path matches allowed (e.g. 'scripts/mapper/**' covers 'scripts/mapper/AGENTS.md')\n  - Subpath matches (e.g. 'src/mount/wizard/**' covers zone 'src/mount/**')\n"
        returns: boolean
      processProfile:
        input: profile id, data, contract, normalizer
        actions:
        - Normalize all paths in security block
        - 'AUTO-ADD AGENTS.md paths: For each zone covered by profile''s allowed paths, add ''{zone.agentsPath}/AGENTS.md'' to read_allow'
        - Resolve invariant IDs to full text
        - Join keywords array to comma-separated string
        - Log count of auto-added AGENTS.md paths
        returns: Processed profile for template
        note: This ensures agents can always read AGENTS.md files in zones they work with
      generateZoneAgents:
        input: zones array, contract
        actions:
        - For each zone with agentsPath
        - Select template by agentsTemplate field
        - Build context object for template
        - Write to {agentsPath}/AGENTS.md
        templates:
          readonly: zoneName, forbiddenOps, whyReadOnly, consequence, howToChange
          mapper: zoneName, purpose, constraints, verification
          notouch: zoneName, whyReadOnly
          service: zoneName, purpose, constraints, verification, contractsRequired, noDirectSupabase, testRequirements
    main_sequence:
    - registerHelpers() - formatPath, join, eq
    - loadContract()
    - validateContract()
    - new PathNormalizer(contract.PATHS)
    - extractZones(contract)
    - profiles = processProfile() for each TASK_PROFILES
    - write bootloader.hbs → AGENTS.md
    - write router.xml.hbs → .specs/ROUTER.xml
    - write profile.xml.hbs → .specs/profiles/{id}.xml for each profile
    - generateZoneAgents(zones, contract)
    - write boundaries.hbs → docs/policy/BOUNDARIES.md
    - write immutability.hbs → docs/policy/IMMUTABILITY.md
    - write api-reference.hbs → docs/reference/API_REFERENCE.md
    - print summary
    handlebars_helpers:
      formatPath: Replace backslashes with forward slashes
      join: Join array with delimiter
      eq: Equality comparison for conditionals
FRIDA_TPL_BOOTLOADER:
  file: scripts/templates/frida/bootloader.hbs
  purpose: Root AGENTS.md - entry point for all agents
  variables:
  - generatedAt
  - profileCount
  - zoneCount
  content: "# FRIDA AGENT PROTOCOL (v3.0)\n\n\U0001F6D1 **STOP AND READ.** This repository operates under the FRIDA Framework.\nYou MUST follow the bootstrapping sequence below before executing ANY task.\n\n---\n\n## PHASE 1: INITIALIZATION\n\n1. **ACKNOWLEDGE ROLE:** You are an AI development agent operating within defined boundaries.\n2. **LOAD ROUTER:** Read `.specs/ROUTER.xml` immediately.\n3. **IDENTIFY CONTEXT:**\n   - Analyze your current task/prompt\n   - Match keywords against profiles in ROUTER.xml\n   - If no match found → use profile `governance`\n\n## PHASE 2: CONTEXT LOADING\n\n1. **READ PROFILE:** Load the XML file from `.specs/profiles/{profile_id}.xml`\n2. **ADOPT CONSTRAINTS:** \n   - `<allowed_paths>` define where you CAN read/write\n   - `<forbidden_paths>` are ABSOLUTE — never access these\n   - `<invariants>` MUST be satisfied\n\n3. **READ ZONE AGENTS.MD (CANONICAL):**\n   - Resolve zone using contract:ZONES (most specific match for your working path)\n   - Read `{zone.agentsPath}/AGENTS.md`\n\
    \   - If missing → HALT and request contract update + `npm run frida:gen`\n   \n   > **NOTE:** AGENTS.md is not required to exist in the leaf directory of your task.\n   > The canonical location is `{zone.agentsPath}` as defined in contract:ZONES.\n\n## PHASE 3: EXECUTION\n\n0. **DEPLOYMENT RULE:** Never deploy Edge Functions manually. Only push changes. Deployment is performed by GitHub Actions workflows.\n\n1. Perform task using ONLY allowed paths\n2. Verify output against profile invariants\n3. Run `npm run verify` before completing\n\n## PHASE 4: COMPLETION\n\n1. **EMIT FRIDA RUN REPORT** (see contract:FRIDA_RUN_REPORTING)\n   - MUST emit on both SUCCESS and HALT\n   - Use YAML format in markdown fenced code block\n   - Include changed files list and verification status\n2. Keep a short human summary after the YAML block\n3. Note any constraint violations encountered\n4. Suggest contract updates if needed\n\n---\n\n## Quick Reference\n\n| Profile | Keywords | Role |\n|---------|----------|------|\n\
    {{#each profiles}}\n| {{id}} | {{keywords}} | {{role}} |\n{{/each}}\n\n---\n\n## Development Sequence"
FRIDA_TPL_ROUTER:
  file: scripts/templates/frida/router.xml.hbs
  purpose: Maps keywords to profile files
  variables:
  - profiles: Array of { id, role, keywords }
  content: "<frida_router>\n  <protocol>\n    1. ANALYZE user prompt for keywords.\n    2. MATCH keywords to a <profile>.\n    3. READ the file specified in 'context_path'.\n    4. ADOPT the role and constraints.\n    5. EXECUTE task.\n  </protocol>\n\n  <profiles>\n    {{#each profiles}}\n    <profile id=\"{{id}}\">\n      <role>{{role}}</role>\n      <keywords>{{keywords}}</keywords>\n      <context_path>.specs/profiles/{{id}}.xml</context_path>\n    </profile>\n    {{/each}}\n  </profiles>\n</frida_router>"
FRIDA_TPL_PROFILE:
  file: scripts/templates/frida/profile.xml.hbs
  purpose: Per-agent permissions and constraints
  variables:
  - id, role, description
  - security: '{ read_allow, edit_allow, forbid, edit_forbid, forbiddenAction, redirects }'
  - resolvedInvariants: Array of { id, text }
  - contexts: Optional context variations
  content: "<agent_instruction id=\"{{id}}\">\n  <role>{{role}}</role>\n  <description>{{description}}</description>\n  \n  {{#if context}}\n  <active_context>{{context}}</active_context>\n  {{/if}}\n  \n  <security_clearance>\n    <allowed_paths>\n      {{#each security.read_allow}}\n      <path mode=\"read\">{{this}}</path>\n      {{/each}}\n      {{#each security.edit_allow}}\n      <path mode=\"edit\">{{this}}</path>\n      {{/each}}\n    </allowed_paths>\n    <forbidden_paths action=\"{{security.forbiddenAction}}\">\n      {{#each security.forbid}}\n      <path>{{this}}</path>\n      {{/each}}\n      {{#each security.edit_forbid}}\n      <path mode=\"no-edit\">{{this}}</path>\n      {{/each}}\n    </forbidden_paths>\n    {{#if security.redirects}}\n    {{#if security.redirects.length}}\n    <redirects>\n      {{#each security.redirects}}\n      <redirect from=\"{{from}}\" to=\"{{to}}\">\n        <reason>{{reason}}</reason>\n        {{#if guide}}<guide>{{guide}}</guide>{{/if}}\n    \
    \  </redirect>\n      {{/each}}\n    </redirects>\n    {{/if}}\n    {{/if}}\n  </security_clearance>\n\n  <invariants>\n    {{#each resolvedInvariants}}\n    <invariant id=\"{{id}}\">{{text}}</invariant>\n    {{/each}}\n  </invariants>\n\n  {{#if contexts}}\n  <available_contexts>\n    {{#each contexts}}\n    <context id=\"{{@key}}\">\n      <trigger>{{trigger}}</trigger>\n      <additional_permissions>\n        {{#each additional_read}}\n        <path mode=\"read\">{{this}}</path>\n        {{/each}}\n        {{#each additional_edit}}\n        <path mode=\"edit\">{{this}}</path>\n        {{/each}}\n      </additional_permissions>\n      <reason>{{reason}}</reason>\n    </context>\n    {{/each}}\n  </available_contexts>\n  {{/if}}\n\n  <workflow_constraints>\n    <constraint>Do NOT hallucinate files outside of allowed_paths.</constraint>\n    <constraint>Check invariants before outputting code.</constraint>\n    <constraint>If path is forbidden, check for redirect before halting.</constraint>\n\
    \  </workflow_constraints>\n</agent_instruction>"
