INVARIANTS:
  geo_auto:
    id: GEO_01
    text: MUST auto-detect origin on mount via navigator.geolocation
    category: data
  geo_fallback:
    id: GEO_02
    text: MUST fallback to 'El Angel' coords (19.4326, -99.1332) on geolocation error OR if user-provided coordinates are outside Mexico borders
    category: data
  mapper_only:
    id: ARCH_01
    text: MUST NOT edit src/mount directly. Edit scripts/mapper/surgeon-*.ts instead
    category: architecture
  backend_boundary:
    id: ARCH_02
    text: UI MUST call backend only via SERVICE_LAYER (src/services). UI MUST NOT import Supabase client directly. UI MUST NOT bypass service layer.
    category: architecture
  timeline_data_source:
    id: DATA_01
    text: Timeline MUST render data passed via props/adapter. MUST remove any static mock data from source.
    category: data
  timeline_map_sync:
    id: UX_01
    text: Timeline selection MUST drive Map highlighting in read-only mode. No persistence, no backend side effects.
    category: visual
  visual_mimicry:
    id: VIS_01
    text: MUST analyze visual source (dist/aistudio) and replicate EXTERNAL APPEARANCE. Do not blind-copy CSS.
    category: visual
  data_reality:
    id: DATA_02
    text: Services MUST fail with error rather than return mock/fallback data. No 'fake it till you make it'.
    category: data
  cache_zero:
    id: ARCH_03
    text: Frontend/session caching is FORBIDDEN. UI MUST fetch fresh data per request. Does NOT apply to backend cache_ground (persistent topology knowledge).
    category: architecture
  repo_clean:
    id: ARCH_04
    text: Active code MUST NOT import from 'legacy/'. Legacy code MUST be isolated.
    category: architecture
  no_scope_creep:
    id: ARCH_05
    text: MUST NOT add functionality not specified in task. Minimal implementation only.
    category: architecture
  error_explicit:
    id: DATA_03
    text: All async operations MUST have explicit error handling. No silent failures.
    category: data
  route_tuning_config_only:
    id: ARCH_07
    text: Route tuning MUST change only waypoint-config.ts parameter values (presets/experiments). Route tuning MUST NOT modify waypoint generator/detector mechanics. If mechanics change is needed -> HALT and request route_algorithm_optimization task.
    category: architecture
  index_from_template:
    id: ARCH_06
    text: Root /index.html MUST be regenerated from dist/aistudio/style/index.html on every mapper run. Manual edits forbidden.
    category: architecture
  deploy_github_actions_only:
    id: DEPLOY_01
    text: MUST NOT deploy Edge Functions manually. Deployment is performed only by GitHub Actions.
    category: security
  skeleton_ui_no_intermediate:
    id: SKEL_01
    text: UI MUST NOT display intermediate points when is_skeleton=true. Only origin and destination on map.
    category: data
  upd_route_minimal_calls:
    id: SKEL_03
    text: updRouteDetails MUST minimize external API calls. Use llm_segments waypoints for Mapbox routing.
    category: architecture
  segments_boundary_driven:
    id: SKEL_04
    text: Segments MUST be created by boundary triggers (highway_change, scenery_change, serpentine_cluster), NOT by distance or time quotas.
    category: data
  details_rev_timeline:
    id: SKEL_05
    text: Timeline updates ONLY when details_rev changes. Map unaffected if geometry_rev unchanged.
    category: visual
  geometry_rev_map:
    id: SKEL_06
    text: Map updates ONLY when geometry_rev changes. No viewport reset on same geometry.
    category: visual
  upd_route_atomicity:
    id: SKEL_07
    text: updRouteDetails MUST write details atomically in single transaction.
    category: data
  upd_route_lock:
    id: SKEL_08
    text: Concurrent updRouteDetails MUST be rejected with 409 if status='running'.
    category: architecture
  segment_waypoint_primacy:
    id: ROUTE_01
    text: Waypoints первичны. Сегменты — производные (отрезки между waypoints). Добавление waypoint = разделение. Удаление waypoint = объединение.
    category: data
MAPPER_COMPONENTS:
  description: Components processed by mapper in kaTai
  version: '0.6'
  components:
    wizard:
      sourceRef: PATHS.canon.wizardDir
      outputRef: PATHS.mount.components/wizard
      styleRef: PATHS.canon.wizardVisualDir
      slotRef: PATHS.slots.wizardPage
      exportName: WizardApp
    timeline:
      sourceRef: PATHS.canon.timelineDir
      outputRef: PATHS.mount.components/timeline
      styleRef: null
      slotRef: PATHS.slots.timeline
      exportName: TimelineApp
  forbidden:
    mockData:
    - INITIAL_POINTS
    - INITIAL_SEGMENTS
    imports:
      wizard:
      - generateRoute from geminiService
      timeline:
      - calculateSegmentDetails from geminiService
    state:
      wizard:
      - routeData
      - setRouteData
      timeline:
      - handleCalculateSegment
      - isCalculating
  required:
    wizard:
      props:
      - onComplete
      - onError
      exports:
      - WizardApp
    timeline:
      props:
      - routeId
      - onSave
      - onShare
      - onReset
      exports:
      - TimelineApp
TOOLING:
  scripts:
    mapper:
      command: npm run mapper:all
      runs:
      - scripts/mapper/surgeon-wizard.ts
      - scripts/mapper/surgeon-timeline.ts
      - scripts/mapper/styler-wizard.ts
      - scripts/mapper/styler-timeline.ts
    frida:
      command: npm run frida:gen
    verify:
      command: npm run verify
  ci:
    workflows:
      canon_sync:
        file: .github/workflows/canon-sync.yml
      verify:
        file: .github/workflows/verify.yml
INTERACTION_PROTOCOL:
  architect_mode:
    steps:
      1_ANALYZE: Identify affected domain
      2_TRANSLATE: Convert intent to contract changes
      3_CONTEXT_ENGINEER: Review agent capabilities
      4_CONSISTENCY_CHECK: Verify contract-to-task consistency
      5_PROPOSE: Output exact wiki changes
  developer_mode:
    steps:
      1_LOAD_PROFILE: Read profile XML
      2_READ_AGENTS_MD: Read zone-specific AGENTS.md
      3_CHECK_PERMISSIONS: Verify edit_allow
      4_CHECK_INVARIANTS: Review profile invariants
      5_IMPLEMENT: Minimal implementation
      6_VERIFY: Run npm run verify
FUNCTIONS_REGISTRY:
  edge_functions:
    v2-preview:
      path: supabase/functions/v2-preview/
      entry: index.ts
      purpose: Creates route skeleton with LLM segmentation, triggers async details build
    v2-upd-route-details:
      path: supabase/functions/v2-upd-route-details/
      entry: index.ts
      purpose: Async route details builder (lock-based, idempotent). Validates waypoints via Mapbox, generates polyline and segments.
    v2-route-meta:
      path: supabase/functions/v2-route-meta/
      entry: index.ts
      purpose: Polling endpoint for route build status and revision tracking
    v2-route-details:
      path: supabase/functions/v2-route-details/
      entry: index.ts
      purpose: Returns assembled route data (polyline, waypoints, segments) by revision
  notes:
  - Добавляй сюда все новые supabase/functions/** при создании.
  - Этот реестр используется для генерации reference docs.
  - 'Deployment: только через GitHub Actions (см. contract:GUARDS.deploy.edge.github-actions-only).'
