  - zoneName
  - whyReadOnly
  content: '# {{zoneName}} - AGENTS.md


    ## ABSOLUTE PROHIBITION


    **DO NOT TOUCH ANY FILES IN THIS DIRECTORY**


    ## REASON


    {{whyReadOnly}}


    These files are:

    - Generated by external process

    - Synchronized automatically

    - Not part of manual development workflow


    ## IF YOU NEED TO CHANGE SOMETHING


    These files cannot be changed directly. If you need to modify behavior:


    1. Check if the change should be in the mapper layer

    2. Check if the change should be in the contract (wiki)

    3. Consult with the team before attempting any modifications


    **Any manual edits will be lost on next sync.**


    ## COMPLETION REPORT


    After finishing (or halting), you MUST emit FRIDA Run Report (contract:FRIDA_RUN_REPORTING). Include changed files and verification status.'
FRIDA_TPL_AGENTS_SERVICE:
  file: scripts/docs-gen/templates/agents-service.hbs
  purpose: AGENTS.md for service layer zone
  variables:
  - zoneName: string (formatted from zone key)
  - purpose: string (from zone.purpose)
  - constraints: Array of strings (from zone.constraints)
  - verification: string (from zone.verification)
  - contractsRequired: boolean
  - noDirectSupabase: boolean
  - testRequirements: Array of strings
  content: "# {{zoneName}} - AGENTS.md\n\n{{#if purpose}}\n## PURPOSE\n\n{{purpose}}\n{{/if}}\n\n## ARCHITECTURE RULES\n\n{{#if contractsRequired}}\n### Contracts Required\n\nAll service functions must use typed contracts from `src/services/v2/contracts/`.\n\n**Pattern:**\n```typescript\nimport type { WorkspaceData } from '../contracts/workspace';\n\nexport async function getWorkspace(params): Promise<WorkspaceData> {\n  // implementation\n}"
FRIDA_TPL_BOUNDARIES:
  file: scripts/docs-gen/templates/boundaries.hbs
  purpose: Human-readable zone boundaries documentation
  variables:
  - zones: Array of Zone objects
  content: "# Boundaries\n\nThis document defines the boundaries between different zones in the codebase.\n\n## Zones\n\n{{#each zones}}\n### {{name}}\n\n**Path:** `{{formatPath path}}`  \n**Status:** {{#if readOnly}}READ-ONLY{{else}}READ-WRITE{{/if}}\n\n{{#if readOnly}}\n**Why read-only:** {{whyReadOnly}}\n\n**Forbidden operations:**\n{{#each forbiddenOps}}\n- {{this}}\n{{/each}}\n\n**How to make changes:** {{#if redirectPath}}Modify `{{formatPath redirectPath}}` instead{{else}}Follow designated process{{/if}}\n{{/if}}\n\n---\n{{/each}}\n\n## Cross-Zone Rules\n\n1. **No imports from read-only zones to read-write zones** - Read-only zones are source-of-truth\n2. **No legacy imports in active zones** - Use `/legacy/**` only for archived code\n3. **UI never imports Supabase directly** - Always go through SERVICE_LAYER\n\n## Enforcement\n\nThese boundaries are enforced by:\n- `npm run verify` gates\n- Pre-commit hooks  \n- CI checks on pull requests"
FRIDA_TPL_IMMUTABILITY:
  file: scripts/docs-gen/templates/immutability.hbs
  purpose: Documentation of read-only zones
  variables:
  - readOnlyZones: Array of Zone objects with readOnly=true
  content: '# Immutability


    This document describes read-only zones and the reasons for their immutability.


    ## Read-Only Zones


    {{#each readOnlyZones}}

    ### {{name}}


    **Path:** `{{formatPath path}}`


    #### Why read-only?


    {{whyReadOnly}}


    #### What happens if you edit these files?


    {{consequence}}


    #### How to make legitimate changes?


    {{howToChange}}


    ---

    {{/each}}


    ## General Principle


    Read-only zones serve as **sources of truth** that are managed by automated processes.


    Manual edits to these zones:

    1. Will be **overwritten** on next sync/build

    2. Create **inconsistency** with source of truth

    3. Make **debugging harder**'
FRIDA_TPL_API_REFERENCE:
  file: scripts/docs-gen/templates/api-reference.hbs
  purpose: API documentation from contract:RESOURCES
  variables:
  - resources: Object from contract:RESOURCES
  content: "# API Reference\n\nThis document provides a comprehensive reference for all resources and APIs.\n\n{{#each resources}}\n## {{@key}}\n\n**Provider:** `{{provider}}`  \n{{#if function}}**Function:** `{{function}}`{{/if}}  \n{{#if adapter}}**Adapter:** `{{adapter}}`{{/if}}\n\n{{#if schemas.params}}**Parameters:** `{{schemas.params}}`{{/if}}  \n{{#if schemas.returns}}**Returns:** `{{schemas.returns}}`{{/if}}\n\n{{#if notes}}**Notes:** {{notes}}{{/if}}\n\n---\n{{/each}}\n\n## Using This Reference\n\nThis reference is auto-generated from contract:RESOURCES in wiki.\nTo update: edit `zerohuman-contract-app.md`, run `npm run frida:gen`."
FRIDA_SYNC_WORKFLOW:
  file: .github/workflows/canon-sync.yml
  purpose: Synchronize wiki contract:* blocks to repository
  trigger: See 'content' block below (single source of truth)
  sources:
  - zerohuman-contract-app.md
  - zerohuman-frida-kernel.md
  - zerohuman-contract-project.md
  output: contract/canon.cbmd.yaml
  content: "name: Canon Sync (wiki -> /contract)\n\non:\n  schedule:\n    - cron: \"17 * * * *\"\n  push:\n    branches: [main]\n    paths:\n      - \"contract/**\"\n\npermissions:\n  contents: write\n\nconcurrency:\n  group: canon-sync\n  cancel-in-progress: false\n\njobs:\n  sync:\n    if: github.event_name == 'schedule' || github.actor != 'github-actions[bot]'\n    runs-on: ubuntu-latest\n\n    steps:\n      - name: Checkout repo\n        uses: actions/checkout@v4\n        with:\n          ref: main\n          fetch-depth: 0\n\n      - name: Align workspace with origin/main\n        run: |\n          set -euo pipefail\n          git fetch origin main\n          git switch main\n          git reset --hard origin/main\n\n      - name: Clone wiki\n        run: |\n          rm -rf /tmp/wiki\n          git clone --depth 1 \"https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git\" /tmp/wiki\n\n      - name: Generate canonArtifact from wiki\n        run:\
    \ |\n          python -m pip install --quiet pyyaml\n          python - <<'PY'\n          import re\n          from pathlib import Path\n          import yaml\n\n          sources = [\n            \"zerohuman-contract-app.md\", \n            \"zerohuman-frida-kernel.md\", \n            \"zerohuman-contract-project.md\"\n          ]\n          \n          wiki_root = Path(\"/tmp/wiki\")\n          out = Path(\"contract/canon.cbmd.yaml\")\n          blocks = {}\n          \n          start_re = re.compile(r\"^\\s*```yaml\\s+contract:([A-Za-z0-9_.-]+)\\s*$\")\n          end_re = re.compile(r\"^\\s*```\\s*$\")\n\n          for filename in sources:\n            fpath = wiki_root / filename\n            if not fpath.exists():\n               print(f\"⚠️ Warning: {filename} not found, skipping.\")\n               continue\n            \n            lines = fpath.read_text(encoding=\"utf-8\").splitlines()\n            i = 0\n            while i < len(lines):\n              m = start_re.match(lines[i])\n\
    \              if not m:\n                i += 1\n                continue\n\n              key = m.group(1)\n              if key in blocks:\n                raise SystemExit(f\"❌ Duplicate block '{key}' in {filename}\")\n\n              i += 1\n              buf = []\n              while i < len(lines) and not end_re.match(lines[i]):\n                buf.append(lines[i])\n                i += 1\n\n              if i >= len(lines):\n                raise SystemExit(f\"❌ Unclosed fence for {key}\")\n\n              raw = \"\\n\".join(buf).strip()\n              data = yaml.safe_load(raw) if raw else {}\n              blocks[key] = data if data else {}\n              i += 1\n\n          out.parent.mkdir(parents=True, exist_ok=True)\n          out.write_text(yaml.safe_dump(blocks, sort_keys=False, allow_unicode=True), encoding=\"utf-8\")\n          print(f\"✅ Wrote {out} with {len(blocks)} blocks.\")\n          PY\n\n      - name: Detect diff\n        id: diff\n        run: |\n       \
    \   if [ -n \"$(git status --porcelain -- contract/canon.cbmd.yaml)\" ]; then\n            echo \"changed=true\" >> \"$GITHUB_OUTPUT\"\n          else\n            echo \"changed=false\" >> \"$GITHUB_OUTPUT\"\n          fi\n\n      - name: Commit and push\n        if: steps.diff.outputs.changed == 'true'\n        run: |\n          git config user.name \"github-actions[bot]\"\n          git config user.email \"41898282+github-actions[bot]@users.noreply.github.com\"\n          git add contract/canon.cbmd.yaml\n          git commit -m \"chore(canon): sync from wiki\"\n          git push origin HEAD:main"
FRIDA_RECOVERY:
  purpose: Restore Frida tooling files from this wiki document
  trigger: Files missing, corrupted, or porting to new project
  procedure:
    step_1_templates:
      description: Extract and write template files
      source_blocks:
      - FRIDA_TPL_BOOTLOADER
      - FRIDA_TPL_ROUTER
      - FRIDA_TPL_PROFILE
      - FRIDA_TPL_AGENTS_READONLY
      - FRIDA_TPL_AGENTS_MAPPER
      - FRIDA_TPL_AGENTS_NOTOUCH
      - FRIDA_TPL_AGENTS_SERVICE
      - FRIDA_TPL_BOUNDARIES
      - FRIDA_TPL_IMMUTABILITY
      - FRIDA_TPL_API_REFERENCE
      action: "For each FRIDA_TPL_* block:\n  1. Read the 'file' field → target path\n  2. Read the 'content' field → file content (it's a multiline string after |)\n  3. Create directories if needed\n  4. Write content to target path\n"
      example: "Block FRIDA_TPL_BOOTLOADER has:\n  file: \"scripts/templates/frida/bootloader.hbs\"\n  content: |  \n    # FRIDA AGENT PROTOCOL...\n\nAction: write the content to scripts/templates/frida/bootloader.hbs\n"
    step_2_workflow:
      description: Extract and write GitHub workflow
      source_block: FRIDA_SYNC_WORKFLOW
      action: '1. Read ''file'' field → ".github/workflows/canon-sync.yml"

        2. Read ''content'' field → workflow YAML

        3. Write to .github/workflows/canon-sync.yml

        '
    step_3_generator:
      description: Write generator script from specification
      source_block: FRIDA_GENERATOR_SPEC
      action: "1. Read FRIDA_GENERATOR_SPEC block\n2. Write TypeScript code that implements:\n   - Config constants from 'structure.config'\n   - PathNormalizer class from 'structure.classes.PathNormalizer'\n   - Functions from 'structure.functions'\n   - Main sequence from 'structure.main_sequence'\n   - Handlebars helpers from 'structure.handlebars_helpers'\n3. Save to scripts/frida-gen.ts\n"
      note: This is the only file that requires code generation, not copy
    step_4_dependencies:
      description: Install npm dependencies
      action: "npm install tsx yaml handlebars glob --save-dev\n\nAdd to package.json scripts:\n  \"frida:gen\": \"tsx scripts/frida-gen.ts\"\n"
    step_5_verify:
      description: Test the restored tooling
      action: "npm run frida:gen\n\nExpected output:\n  - AGENTS.md in project root\n  - .specs/ROUTER.xml\n  - .specs/profiles/*.xml\n  - Zone AGENTS.md files\n  - docs/policy/*.md\n  - docs/reference/API_REFERENCE.md\n"
  file_mapping:
    templates_frida:
      FRIDA_TPL_BOOTLOADER: scripts/templates/frida/bootloader.hbs
      FRIDA_TPL_ROUTER: scripts/templates/frida/router.xml.hbs
      FRIDA_TPL_PROFILE: scripts/templates/frida/profile.xml.hbs
    templates_docs:
      FRIDA_TPL_AGENTS_READONLY: scripts/docs-gen/templates/agents-readonly.hbs
      FRIDA_TPL_AGENTS_MAPPER: scripts/docs-gen/templates/agents-mapper.hbs
      FRIDA_TPL_AGENTS_NOTOUCH: scripts/docs-gen/templates/agents-notouch.hbs
      FRIDA_TPL_AGENTS_SERVICE: scripts/docs-gen/templates/agents-service.hbs
      FRIDA_TPL_BOUNDARIES: scripts/docs-gen/templates/boundaries.hbs
      FRIDA_TPL_IMMUTABILITY: scripts/docs-gen/templates/immutability.hbs
      FRIDA_TPL_API_REFERENCE: scripts/docs-gen/templates/api-reference.hbs
    workflow:
      FRIDA_SYNC_WORKFLOW: .github/workflows/canon-sync.yml
    generator:
      FRIDA_GENERATOR_SPEC: scripts/frida-gen.ts
FRIDA_NOTES:
  design_decisions:
  - decision: XML for profiles, not JSON/YAML
    reason: Better IDE support, explicit structure, familiar to agents
  - decision: Nested AGENTS.md pattern
    reason: Context minimization, agents read closest file
  - decision: Wiki as single source
    reason: Human-editable, versioned, diff-friendly
  - decision: Templates stored in wiki as YAML content blocks
    reason: Full reproducibility from wiki alone
  reproducibility:
    principle: Wiki contains everything needed to rebuild tooling
    includes:
    - Data schemas (FRIDA_SCHEMAS)
    - Generator specification (FRIDA_GENERATOR_SPEC)
    - All templates (FRIDA_TPL_*)
    - Sync workflow (FRIDA_SYNC_WORKFLOW)
    excludes:
    - Actual TypeScript code (derived from spec)
FRIDA_BOOTSTRAP:
  purpose: Specification for the 'frida:gen' script. Enables regeneration of Agent Context.
  source_of_truth: Frida Kernel (TASK_PROFILES, INVARIANTS)
  target_artifacts:
  - .specs/ROUTER.xml
  - .specs/profiles/*.xml
  - AGENTS.md
  algorithm:
    1_LOAD: Read Contract. Extract YAML blocks TASK_PROFILES, INVARIANTS.
    2_ROUTER: Generate ROUTER.xml mapping keywords to profile files.
    3_PROFILES: Generate per-agent XML with <permissions> and expanded <constraints>.
    4_BOOT: Update AGENTS.md with protocol and router link.
META:
  version: '0.12'
  date: '2026-01-18'
  status: active
  sourceOfTruth: wiki
  composition:
  - 'Domain Model: [[zerohuman-contract-app]]'
  - 'AI Framework: [[zerohuman-frida-kernel]]'
  - 'Project Config: [[zerohuman-contract-project]]'
  scope:
  - 'UI: Wizard + Route Page (FullscreenMap + OverlayTimeline)'
  - 'Route: v2-preview ASYNC-DETAILS (Skeleton-only creation)'
  - 'Route Page layout: Static Host (Map+Actions) + Mounted Timeline'
  - 'LLM: Motorcycle Scenic Segmenter, Mapbox: geometry executor'
  - 'State machine: idle | running | ready | error (strict transitions)'
  - 'Segmentation: Topology Cache (Road Ref + Junctions) + Progressive Loading'
  guardRefs:
  - canon.source.wiki
  - canon.artifact.no-manual-edits
  - canon.not.runtime
DOCS:
  humanWiki:
    canonicalPage: zerohuman-contract-app
    homePage: Home
    relatedPages:
    - zerohuman-frida-kernel
    - zerohuman-contract-project
  sourceOfTruth:
    kind: wiki
    ruleGuardRef: canon.source.wiki
  canon:
    artifactRef: PATHS.contract.canonArtifact
    ruleGuardRef: canon.artifact.no-manual-edits
    generationRule: 'canon.cbmd.yaml is generated from wiki contract:* blocks.

      Sources: zerohuman-contract-app.md, zerohuman-frida-kernel.md, zerohuman-contract-project.md

      '
  procedures:
    SYNC:
      intent: Refresh /contract/** from wiki (source of truth)
      triggers:
      - kind: schedule
        ref: contract:FRIDA_SYNC_WORKFLOW.content (canonical cron)
      - kind: push
        paths:
        - contract/**
      reads:
      - GitHub wiki repo (<repo>.wiki.git)
      - zerohuman-contract-app.md
      - zerohuman-frida-kernel.md
      - zerohuman-contract-project.md
      writes:
      - contract/canon.cbmd.yaml
      outputPolicy:
      - 'If diff exists: commit with message ''chore(canon): sync from wiki'''
      - No enrichment. No interpretation.
    CHECK:
      intent: Prevent drift by auditing repo against canonArtifact
      triggers:
      - kind: ci
        events:
        - pull_request
        - push
      validates:
      - contract:VALIDATION_RULES_FRIDA.repoGuards
  format:
    name: CBMD
    version: '0.3'
  notes:
  - Canon is governance data. Not imported by application at runtime.
  - Wiki → repo sync only. Reverse direction only for bootstrap/recovery.
LAYERS:
  UI:
    responsibilities:
    - UI rendering
    - State orchestration
    - User interaction handling
  SERVICE_LAYER:
    responsibilities:
    - Transport (HTTP, WebSocket)
    - Type definitions
    - Logging
    - Error normalization
  BUSINESS_LOGIC:
    responsibilities:
    - Edge Functions
    - Domain rules
    - Data validation
  DATABASE:
    responsibilities:
    - Persistence
    - Row Level Security
  callGraph:
    allowed:
    - UI -> SERVICE_LAYER
    - SERVICE_LAYER -> BUSINESS_LOGIC
    - BUSINESS_LOGIC -> DATABASE
    forbidden:
    - UI -> BUSINESS_LOGIC
    - UI -> DATABASE
    - SERVICE_LAYER -> DATABASE
PATHS:
  canon:
    wizardDir: /dist/aistudio/wizard
    wizardVisualDir: /dist/aistudio/style
    timelineDir: /dist/aistudio/timeline
    wizard: /src/mount/components/wizard
    timeline: /src/mount/components/timeline
    map: /src/components/map/Map.tsx
    debugPanel: /src/components/debug/DebugPanel.tsx
  sources:
    aistudioRoot: /dist/aistudio
    aistudioStyleIndex: /dist/aistudio/style/index.html
  tooling:
    mapperScriptsRoot: /scripts/mapper
    fridaGenerator: /scripts/frida-gen.ts
    docsGenerator: /scripts/docs-gen/generate-derived-docs.ts
  app:
    rootIndexHtml: /index.html
    styleIndexTemplate: /dist/aistudio/style/index.html
  slots:
    wizardPage: /src/pages/WizardPage.tsx
    timeline: /src/pages/RoutePage/Timeline.tsx
    indexCss: /src/index.css
  mount:
    root: /src/mount
    pages: /src/mount/pages
    components: /src/mount/components
    styles: /src/mount/styles
    assets: /src/mount/assets
  contract:
    canonArtifact: /contract/canon.cbmd.yaml
  specs:
    root: /.specs
    router: /.specs/ROUTER.xml
    profiles: /.specs/profiles
  slotMarkers:
    wizard:
      stub: WizardPageStub
      mounted: WizardAppMount
    timeline:
      stub: TimelineStub
      mounted: TimelineApp
GUARDS:
  version: '0.6'
  guards:
  - id: canon.source.wiki
    kind: meta
    statement: Source of truth is ONLY contract:* blocks in wiki pages.
  - id: canon.artifact.no-manual-edits
    kind: meta
    statement: Files in /contract/** are generated. No manual edits.
  - id: canon.not.runtime
    kind: meta
    statement: Canon and artifacts are not imported by application at runtime.
  - id: repo.docs.only-md
    kind: structural
    statement: Docs zone allows only markdown documents.
  - id: layers.callgraph
    kind: structural
    statement: Inter-layer calls must follow LAYERS.callGraph.
  - id: contract.refs.resources-exist
    kind: structural
    statement: All resourceRef references in contract:* blocks MUST resolve to an existing resource definition.
  - id: contract.refs.transitions-exist
    kind: structural
    statement: All transitionRef references in contract:* blocks MUST resolve to an existing transition in the declared state machines.
  - id: contract.refs.triggerref-resolve
    kind: structural
    statement: All triggerRef references in contract:* blocks MUST resolve to an existing trigger definition (boundary triggers, mapper triggers, CI triggers).
  - id: contract.refs.paths-exist
    kind: structural
    statement: All PATHS.* references in contract:* blocks MUST resolve to existing filesystem paths in the repository.
  - id: repo.no-legacy-refs
    kind: prohibition
    statement: Active code MUST NOT reference legacy/ directory.
  - id: data.no-legacy-access
    kind: prohibition
    statement: Active services and queries MUST NOT access databases or tables with names starting with 'legacy'.
  - id: repo.no-forbidden-tokens
    kind: prohibition
    statement: Forbidden tokens (mock/initial) MUST NOT exist in mounted code.
  - id: mock.initial.strip
    kind: prohibition
    statement: Mock initial conditions MUST be stripped during surgeon phase.
  - id: ui.no-direct-supabase
    kind: prohibition
    statement: UI MUST NOT import Supabase client directly. Use service layer.
  - id: index.html.no-manual-edits
    kind: prohibition
    statement: Root /index.html MUST NOT be edited manually. Regenerated by mapper from AI Studio template.
  - id: deploy.edge.github-actions-only
    kind: policy
    statement: Edge Functions MUST be deployed ONLY via GitHub Actions workflows. Direct/manual deploy is forbidden.
  - id: deploy.edge.no-direct-cli
    kind: prohibition
    statement: Agents MUST NOT attempt direct Edge Functions deployment (CLI, API, dashboard). Only push code; CI deploys.
  - id: upd-route-details.tuning.config-only
    kind: policy
    statement: Route tuning MUST modify only supabase/functions/v2-upd-route-details/waypoint-config.ts (preset/parameter values). Route tuning MUST NOT modify generator/detector mechanics. If mechanics change is required -> HALT and request route_algorithm_optimization.
  - id: v2-preview.skeleton-only
    kind: policy
    statement: v2-preview MUST return only routeId and trigger async details build. No inline route data.
  - id: v2-preview.status-running
    kind: policy
    statement: Concurrent updRouteDetails MUST be rejected with 409 if status='running'.
  - id: v2-preview.llm-empty-reject
    kind: policy
    statement: v2-preview MUST reject requests when LLM returns empty llm_segments.
  - id: v2-preview.return-routeid-only
    kind: policy
    statement: 'v2-preview response schema: { routeId: uuid } only. No route data inline.'
  - id: skeleton.road-refs-count
    kind: policy
    statement: Skeleton llm_segments MUST contain at least one road_ref for the route.
  - id: skeleton.road-refs-format
    kind: policy
    statement: road_ref format MUST be normalized (MEX prefix, D suffix where applicable).
  - id: skeleton.ui.only-origin-destination
    kind: invariant
    statement: UI MUST NOT display intermediate points when is_skeleton=true. Only origin and destination on map.
  - id: upd-route-details.minimal-calls
    kind: invariant
    statement: updRouteDetails MUST minimize external API calls. Use llm_segments waypoints for Mapbox routing.
  - id: upd-route-details.atomicity
    kind: invariant
    statement: updRouteDetails MUST write details atomically in single transaction.
  - id: upd-route-details.lock-atomic
    kind: invariant
    statement: Concurrent updRouteDetails MUST be rejected with 409 if status='running'.
  - id: upd-route-details.idempotent-ready
    kind: policy
    statement: updRouteDetails MUST be idempotent. Re-running on ready route returns existing data.
  - id: ui.retry-button-on-error
    kind: policy
    statement: UI MUST show retry button when details_status='error'.
  - id: ui.loading-indicator-skeleton
    kind: policy
    statement: UI MUST show loading indicator while details_status='running' or is_skeleton=true.
  - id: timeline.update-on-details-rev
    kind: invariant
    statement: Timeline updates ONLY when details_rev changes. Map unaffected if geometry_rev unchanged.
  - id: map.update-on-geometry-rev
    kind: invariant
    statement: Map updates ONLY when geometry_rev changes. No viewport reset on same geometry.
  - id: mount.slot.baseline.before
    kind: policy
    statement: Before mounting, slot MUST contain baseline stub component.
  - id: mount.slot.mounted.after
    kind: policy
    statement: After mounting, slot MUST contain mounted component with correct export name.
  - id: upd-route-details.waypoints.no-urban-near-ends
    kind: policy
    statement: 'Waypoint generator MUST NOT emit intermediate waypoints inside origin/destination urban exclusion zones. Allowed inside these zones only: origin, destination, user_poi. Any other detected potential waypoints in these zones MUST be removed.'
  - id: canon.observability.run-report-required
    kind: policy
    statement: Agents MUST emit FRIDA Run Report on both SUCCESS and HALT (see contract:FRIDA_RUN_REPORTING). Report MUST include changed files list and verification status.
VALIDATION_RULES_APP:
  v2PreviewGuards:
  - guardRef: v2-preview.skeleton-only
  - guardRef: v2-preview.status-running
  - guardRef: v2-preview.llm-empty-reject
  - guardRef: v2-preview.return-routeid-only
  skeletonGuards:
  - guardRef: skeleton.road-refs-count
  - guardRef: skeleton.road-refs-format
  - guardRef: skeleton.ui.only-origin-destination
  - guardRef: upd-route-details.minimal-calls
  - guardRef: upd-route-details.atomicity
  - guardRef: upd-route-details.lock-atomic
  - guardRef: upd-route-details.idempotent-ready
  - guardRef: upd-route-details.waypoints.no-urban-near-ends
  uiGuards:
  - guardRef: ui.retry-button-on-error
  - guardRef: ui.loading-indicator-skeleton
  - guardRef: timeline.update-on-details-rev
  - guardRef: map.update-on-geometry-rev
  mountGuards:
  - guardRef: mount.slot.baseline.before
  - guardRef: mount.slot.mounted.after
VALIDATION_RULES_FRIDA:
  contractConsistency:
  - guardRef: contract.refs.resources-exist
  - guardRef: contract.refs.transitions-exist
  - guardRef: contract.refs.triggerref-resolve
  - guardRef: contract.refs.paths-exist
  repoGuards:
  - guardRef: canon.source.wiki
  - guardRef: canon.artifact.no-manual-edits
  - guardRef: canon.not.runtime
  - guardRef: repo.docs.only-md
  - guardRef: repo.no-legacy-refs
  - guardRef: data.no-legacy-access
  - guardRef: repo.no-forbidden-tokens
  - guardRef: mock.initial.strip
  - guardRef: index.html.no-manual-edits
  - guardRef: deploy.edge.github-actions-only
  - guardRef: deploy.edge.no-direct-cli
  layerGuards:
  - guardRef: layers.callgraph
  - guardRef: ui.no-direct-supabase
ZONES:
  uiComponents:
    path: src/components/**
    readOnly: false
    purpose: Handwritten host UI components and glue. Generated UI lives in src/mount/**.
    agentsPath: src/components
    agentsTemplate: mapper
    constraints:
    - 'Host-only: may import from src/mount/**. src/mount/** MUST NOT import from src/components/**.'
    - Must follow LAYERS.callGraph and ui.no-direct-supabase.
    verification: npm run -s verify
  mountedCode:
    path: src/mount/**
    readOnly: true
    whyReadOnly: Output of mapper transformation
    consequence: Overwritten on every mapper run
    redirectPath: scripts/mapper/
    howToChange: Modify surgeon-*.ts or styler-*.ts
    forbiddenOps:
    - any direct edits
    agentsPath: src/mount
    agentsTemplate: readonly
  mapperScripts:
    path: scripts/mapper/**
    readOnly: false
    purpose: Surgical transformation of AI Studio code to kaTai services
    agentsPath: scripts/mapper
    agentsTemplate: mapper
    constraints:
    - Only modify mapping logic, not component structure
    - Keep visual output identical to AI Studio version
    - Test with npm run mapper:all after changes
    verification: npm run mapper:all && npm run -s verify
  aiStudioGenerated:
    path: dist/aistudio/**
    readOnly: true
    whyReadOnly: External sync from AI Studio platform
    consequence: Complete loss of AI Studio synchronization
    howToChange: Update in AI Studio, sync to repo
    forbiddenOps:
    - any edits
    - any modifications
    - any file operations
    agentsPath: dist/aistudio
    agentsTemplate: notouch
  serviceLayer:
    path: src/services/**
    readOnly: false
    purpose: Transport adapters, typing, business logic interface
    agentsPath: src/services
    agentsTemplate: service
    constraints:
    - Use contracts/** for type definitions
    - No direct Supabase imports in UI
    - All functions must have tests
    verification: npm run -s verify
    contractsRequired: true
    noDirectSupabase: true
    testRequirements:
    - Unit tests for all service functions
    - Mock external dependencies
    guardRefs:
    - layers.callgraph
    - ui.no-direct-supabase
  supabaseFunctions:
    path: supabase/functions/**
    readOnly: false
    purpose: Edge Functions for business logic
    agentsPath: supabase/functions
    agentsTemplate: service
    constraints:
    - Follow Edge Function patterns
    - Use shared types from contracts
    - Handle errors explicitly
    - DO NOT deploy functions manually. Push code only; GitHub Actions deploys.
    verification: supabase functions serve
  agentTasks:
    path: tasks/**
    readOnly: false
    purpose: Task inbox and packs for agents. Tasks are immutable instructions. Agents may only update README checklists.
    agentsPath: tasks
    agentsTemplate: mapper
    constraints:
    - Agents MUST NOT edit tasks/TASK-*.md (tasks are immutable).
    - Agents MAY edit only tasks/**/README.md (checklists / progress).
    - 'If a task needs change: create a new task file; do not patch old one.'
    - On SUCCESS, agent MUST append the same SuccessReport YAML block to tasks/**/README.md under section 'Agent Run Log' (if section missing — create it).
    verification: n/a
  resourcesData:
    path: resources/*.yaml
    readOnly: true
    whyReadOnly: Human-authored datasets. Build-only inputs.
    agentsPath: resources
    agentsTemplate: readonly
    constraints:
    - Build-only. Runtime/edge functions MUST NOT parse these YAML files.
    - Any schema change requires canon update (GLOSSARY + start_finish_regime).
    verification: npm run build
  resourcesGenerated:
    path: resources/_generated/**
    readOnly: false
    purpose: Build artifacts used by runtime (edge functions) and pipeline. Deterministic, machine-generated.
    agentsPath: resources/_generated
    agentsTemplate: service
    constraints:
    - Only build scripts may write. Runtime reads.
    - Artifacts MUST be deterministic (same input => same bytes).
