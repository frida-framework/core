GUARDS:
  version: "1.0"
  date: "1970-01-01"
  globalGuardRefs: []
  guards: []

ZONE_RESOLUTION:
  scope:
    execution: Resolve execution zone for a concrete target path.
  constraints:
    - Execution zone source of truth is contract:ZONES only.
    - Root fallback zone MUST resolve "." through the generic "**" path pattern.

VERIFICATION_POLICY:
  zoneVerification:
    requirements:
      - Verification command MUST be one-shot (finite execution).
      - Verification command MUST be deterministic and non-interactive.
      - Verification command MUST return process exit code for pass/fail.
    noOpValues:
      - n/a

ZONES:
  workspaceRoot:
    owner: Platform
    path: "**"
    readOnly: false
    purpose: Generic root fallback zone for repository-level tasks and root-path resolution.
    agentsPath: "."
    agentsTemplate: mapper
    constraints:
      - Use this zone only when no more specific zone matches.
    verification: npx frida-core check zone --path .
    guardRefs: []
  docs:
    owner: Docs
    path: "docs/**"
    readOnly: false
    purpose: Human-authored documentation.
    agentsPath: "docs"
    agentsTemplate: mapper
    constraints:
      - Keep onboarding and policy docs in markdown.
    verification: n/a
    guardRefs: []
  sourceCode:
    owner: App
    path: "src/**"
    readOnly: false
    purpose: Primary repository source code.
    agentsPath: "src"
    agentsTemplate: mapper
    constraints:
      - Keep app logic outside .frida managed surfaces.
      - In standalone visualizer development repositories, src/** is a code-only surface. Frida governs workflow here but is not the recipient of implementation activity.
      - Do not reshape src/** around .frida/**, app-contract authoring, or FRIDA ecosystem embedding unless an explicit later integration task authorizes it.
    verification: n/a
    guardRefs: []
  scripts:
    owner: Platform
    path: "scripts/**"
    readOnly: false
    purpose: Repository tooling and verification scripts.
    agentsPath: "scripts"
    agentsTemplate: service
    constraints:
      - Prefer one-shot deterministic verification commands.
    verification: n/a
    guardRefs: []
  tests:
    owner: QA
    path: "tests/**"
    readOnly: false
    purpose: Automated tests.
    agentsPath: "tests"
    agentsTemplate: mapper
    constraints:
      - Keep tests deterministic and non-interactive.
    verification: n/a
    guardRefs: []
  tasks:
    owner: Platform
    path: "tasks/**"
    readOnly: false
    purpose: Immutable task packs plus the normative task status registry.
    agentsPath: "tasks"
    agentsTemplate: mapper
    constraints:
      - Task packs are immutable; create new files instead of editing existing task instructions.
      - "`tasks/index.yaml` is the only normative task status registry."
    verification: n/a
    guardRefs: []
  agentInbox:
    owner: Platform
    path: "tasks/inbox/**"
    readOnly: false
    purpose: Inbox for architecture and governance requests.
    agentsPath: "tasks/inbox"
    agentsTemplate: mapper
    constraints:
      - Keep inbox items self-contained and acceptance-oriented.
    verification: n/a
    guardRefs: []
  agentSessions:
    owner: Platform
    path: "tasks/sessions/**"
    readOnly: false
    purpose: Append-only session telemetry.
    agentsPath: "tasks/sessions"
    agentsTemplate: mapper
    constraints:
      - New run means new session report file.
      - Sessions are evidence only and do not define normative task status.
    verification: n/a
    guardRefs: []
  tempWorkspace:
    owner: Platform
    path: ".temp/**"
    readOnly: false
    purpose: Ephemeral scratch area for agent-created temporary artifacts.
    agentsPath: ".temp"
    agentsTemplate: service
    constraints:
      - Temporary files must stay under .temp/.
    verification: n/a
    guardRefs: []
  appContractInbox:
    owner: Platform
    path: ".frida/inbox/app-contract/**"
    readOnly: false
    purpose: Canonical target app contract source-of-truth and writable mutation surface for app-contract interfaces.
    agentsPath: ".frida/inbox/app-contract"
    agentsTemplate: service
    constraints:
      - Use this zone only for direct app-contract authoring.
      - Treat `.frida/inbox/app-contract/**` as SSOT; `.frida/contract/app/**` is a derived mirror.
      - Store scratch notes and temporary migration artifacts only under `.temp/**`.
    verification: npx frida-core check contract-set
    guardRefs: []
  fridaInternalArtifacts:
    owner: Platform
    path: ".frida/**"
    readOnly: true
    whyReadOnly: Internal FRIDA artifacts generated from package and contract state.
    consequence: Manual edits are overwritten by bootstrap or generation.
    howToChange: Update the source contract or bootstrap package, then rerun FRIDA.
    forbiddenOps:
      - any direct edits
    agentsPath: ".frida"
    agentsTemplate: notouch
    guardRefs: []

TASK_PROFILES:
  app_core:
    description: Generic application development profile for frontend and host-side repository work.
    keywords:
      - app
      - frontend
      - react
      - component
      - page
      - ui
      - feature
      - hook
      - refactor
      - typescript
    role: APP_AGENT
    security:
      read_allow:
        - src/**
        - scripts/**
        - docs/**
        - tasks/**
        - .temp/**
      edit_allow:
        - tasks/index.yaml
        - src/**
        - scripts/**
        - docs/**
        - tasks/README.md
        - tasks/**/README.md
        - .temp/**
      create_allow:
        - tasks/sessions/*.md
        - .frida/reports/*.yaml
      forbid:
        - .frida/**
      edit_forbid:
        - tasks/TASK-*.md
        - tasks/**/TASK-*.md
    invariants:
      - no_scope_creep
      - temp_dot_temp_only
      - temp_ephemeral_session
