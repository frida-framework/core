PATHS:
  agents:
    bootloaderFile: AGENTS.md
  frida:
    rootDir: .frida
    reportsDir: .frida/reports
    contract:
      rootDir: .frida/contract
      appDir: .frida/contract/app
      fridaDir: .frida/contract/frida
      specsDir: .frida/contract/specs
      profilesDir: .frida/contract/profiles
      bootloaderFile: .frida/contract/AGENTS.md
      docs:
        rootDir: .frida/contract/docs
        policyDir: .frida/contract/docs/policy
        referenceDir: .frida/contract/docs/reference
        policyBoundariesFile: .frida/contract/docs/policy/BOUNDARIES.md
        policyImmutabilityFile: .frida/contract/docs/policy/IMMUTABILITY.md
        referenceApiFile: .frida/contract/docs/reference/API_REFERENCE.md
      artifacts:
        rootDir: .frida/contract/artifacts
        irFile: .frida/contract/artifacts/frida.ir.json
        permissionsFile: .frida/contract/artifacts/frida.permissions.json
        graphFile: .frida/contract/artifacts/frida.graph.mmd
    inbox:
      rootDir: .frida/inbox
      appContractDir: .frida/inbox/app-contract
      appContractIndexFile: .frida/inbox/app-contract/contract.index.yaml
      wikiRawDir: .frida/inbox/wiki-raw
  scripts:
    rootDir: scripts
    verify:
      rootDir: scripts/verify
      checkAgentsContractSetFile: scripts/verify/check-agents-contract-set.mjs
  tooling:
    visualizerDir: templates/tooling/visualizer
  visual:
    overlayDir: .frida/contract/visual
    overlayFile: .frida/contract/visual/canon-overlay.json
  deps:
    fridaCore:
      rootDir: node_modules/@sistemado/frida
      contractSchemaFile: node_modules/@sistemado/frida/schemas/frida-contract.schema.json
  temp:
    rootDir: .temp

PATH_SURFACES:
  roots:
    fridaRoot:
      pathRef: PATHS.frida.rootDir
      authority: FRIDA_CONTRACT
      lifecycle: frida_generated
    scriptsRoot:
      pathRef: PATHS.scripts.rootDir
      authority: APP_REPO
      lifecycle: authorable
    depsFridaCore:
      pathRef: PATHS.deps.fridaCore.rootDir
      authority: EXTERNAL_PACKAGE
      lifecycle: external_package
    tempRoot:
      pathRef: PATHS.temp.rootDir
      authority: APP_REPO
      lifecycle: authorable
  overrides:
    rootAgentsBootloader:
      pathRef: PATHS.agents.bootloaderFile
      authority: FRIDA_CONTRACT
      lifecycle: frida_generated
    checkAgentsContractSetWrapper:
      pathRef: PATHS.scripts.verify.checkAgentsContractSetFile
      authority: FRIDA_CONTRACT
      lifecycle: frida_generated

FRIDA_CONFIG:
  version: "1.0"
  paths:
    canon_inputFileRef: PATHS.frida.inbox.appContractIndexFile
    agents_bootloaderFileRef: PATHS.agents.bootloaderFile
    specs_rootRef: PATHS.frida.contract.specsDir
    profiles_rootRef: PATHS.frida.contract.profilesDir
    docs_policyDirRef: PATHS.frida.contract.docs.policyDir
    docs_referenceDirRef: PATHS.frida.contract.docs.referenceDir
    frida_internalRef: PATHS.frida.rootDir
  reporting:
    collect_in_repo: true
    repo_path: ".frida/reports"
    file_ext: ".yaml"
    filename_pattern: "<unixtime_ms>_<profile_id>_<task_or_run>.yaml"
    exists_check: false
  visual:
    overlay_pathRef: PATHS.visual.overlayFile

meta:
  schemaVersion: "7.0"
  mode: schema
  contractArtifactRef: PATHS.frida.inbox.appContractIndexFile

core:
  contracticalSourceBlocks:
    - PATHS
    - PATH_SURFACES
    - FRIDA_CONFIG
    - GUARDS
    - ZONES
    - TASK_PROFILES
    - INVARIANTS
    - meta
    - core
  selectorGrammar: jsonpath-lite
  generatorPipelineContracts:
    - validate
    - resolve_sources
    - generate_artifacts
  pathRefs:
    contractArtifact: PATHS.frida.inbox.appContractIndexFile
  outputContracts:
    - PATHS.agents.bootloaderFile
    - PATHS.frida.contract.specsDir
    - PATHS.frida.contract.profilesDir
    - PATHS.frida.contract.docs.policyBoundariesFile
    - PATHS.frida.contract.docs.referenceApiFile
