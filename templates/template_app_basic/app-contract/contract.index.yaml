# Derivative baseline app contract shipped with Frida.
# It materializes Frida bootstrap and contract rules for a neutral target application seed.
# It is intentionally minimal, immediately generatable, and not a source of truth for Frida semantics.
# Activate shipped extensions only by adding their layer links below.

schema_version: "1.0"
contract_id: "APP_CONTRACT_TEMPLATE"
version: "0.1.0"
date: "1970-01-01"

contract_index:
  layers:
    - id: shared
      path: layers/AL01-shared.yaml
      purpose: Minimal FRIDA runtime paths, reporting config, and schema metadata.
      blocks:
        - PATHS
        - FRIDA_CONFIG
        - meta
        - core
        - PATH_STATUS
    - id: agent-framework
      path: layers/AL02-agent-framework.yaml
      purpose: Generic zones, profiles, guards, invariants, and verification semantics.
      blocks:
        - GUARDS
        - ZONE_RESOLUTION
        - VERIFICATION_POLICY
        - ZONES
        - TASK_PROFILES
        - INVARIANTS
    - id: host-root
      path: layers/AL03-host-root.yaml
      purpose: Explicit zero-depth host anchor for L1 topology and mounting.
      blocks:
        - app_host_root

